<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercantil ERP - Gestão Integrada</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mercantil: {
                            blue: '#1E3A8A', 
                            light: '#3B82F6',
                            orange: '#EA580C',
                            dark: '#0F172A',
                            gray: '#F8FAFC'
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Biblioteca SheetJS (XLSX) para importação/exportação de planilhas e CSVs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: inherit; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .table-input {
            width: 100%;
            padding: 4px 8px;
            font-size: 0.875rem;
            background-color: transparent;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }
        .table-input:focus {
            border-bottom-color: #3b82f6;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-200">
    
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; color: #475569;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: #1E3A8A; margin-bottom: 20px;"></i>
            <h2 style="margin: 0; font-size: 1.5rem; font-weight: 700;">Iniciando Mercantil ERP...</h2>
            <p style="margin-top: 10px; font-size: 0.9rem;">Carregando módulos de sistema e banco de dados local.</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- HOOK CUSTOMIZADO PARA LOCALSTORAGE ---
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    if (!item || item === 'null' || item === 'undefined') return initialValue;
                    const parsed = JSON.parse(item);
                    
                    if (Array.isArray(parsed)) {
                        let isCorrupted = false;
                        parsed.forEach((obj, idx) => {
                            if (obj && typeof obj === 'object' && !obj.id) {
                                obj.id = `FIX-${Date.now()}-${Math.random().toString(36).substr(2, 5)}-${idx}`;
                                isCorrupted = true;
                            }
                        });
                        if (isCorrupted) window.localStorage.setItem(key, JSON.stringify(parsed));
                    }

                    if (Array.isArray(initialValue) && !Array.isArray(parsed)) {
                        return initialValue;
                    }
                    
                    return parsed !== null ? parsed : initialValue;
                } catch (error) {
                    console.error("Erro ao ler LocalStorage", error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error("Erro ao salvar no localStorage", error);
                }
            };
            return [storedValue, setValue];
        };

        // --- UTILS ---
        const copyToClipboard = (text, showToast) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast(`Copiado: ${text}`, 'success')).catch(() => showToast('Erro ao copiar', 'error'));
            } else {
                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast(`Copiado: ${text}`, 'success');
                } catch (err) {
                    showToast('Erro ao copiar', 'error');
                }
            }
        };

        // --- COMPONENTES UI COMPARTILHADOS ---
        const Modal = ({ title, children, onClose, onSave }) => (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 fade-in p-4 backdrop-blur-sm">
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden border dark:border-slate-700">
                    <div className="flex justify-between items-center p-5 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900">
                        <h3 className="text-xl font-bold text-mercantil-dark dark:text-white">{title}</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-red-500 transition"><i className="fas fa-times text-xl"></i></button>
                    </div>
                    <div className="p-6 overflow-y-auto flex-1 dark:text-slate-200 custom-scroll">
                        {children}
                    </div>
                    {onSave && (
                        <div className="p-5 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-slate-200 rounded-lg hover:bg-gray-300 dark:hover:bg-slate-600 font-medium transition">Cancelar</button>
                            <button onClick={onSave} className="px-6 py-2 bg-mercantil-orange text-white rounded-lg hover:bg-orange-700 font-medium shadow-md transition">Salvar Alterações</button>
                        </div>
                    )}
                </div>
            </div>
        );

        const AutoForm = ({ config, initialData, onSave, onCancel }) => {
            const [data, setData] = useState(initialData || {});
            return (
                <form onSubmit={e => { e.preventDefault(); onSave(data); }} className="space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {config.map(f => (
                            <div key={f.name} className={f.full ? 'col-span-1 md:col-span-4' : (f.half ? 'col-span-1 md:col-span-2' : 'col-span-1')}>
                                <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 uppercase tracking-wider">{f.label}</label>
                                <div className="flex gap-2">
                                    {f.type === 'select' ? (
                                        <select required={f.required} className="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})}>
                                            <option value="">Selecione...</option>
                                            {f.options && f.options.map((o, idx) => <option key={idx} value={o}>{o}</option>)}
                                        </select>
                                    ) : f.type === 'textarea' ? (
                                        <textarea required={f.required} className="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})} rows="3" placeholder={f.placeholder || ''} />
                                    ) : (
                                        <input required={f.required} type={f.type||'text'} step={f.step} className="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})} readOnly={f.readOnly} placeholder={f.placeholder || ''} />
                                    )}
                                    {f.button && (
                                        <button type="button" onClick={() => f.action(setData)} className="bg-mercantil-blue text-white px-4 py-2 rounded shadow hover:bg-blue-800 whitespace-nowrap text-sm font-bold flex items-center transition">
                                            <i className={`${f.icon || "fas fa-bolt"} mr-2`}></i> {f.button}
                                        </button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="flex justify-end gap-3 pt-6 mt-4 border-t border-gray-200 dark:border-slate-700">
                        <button type="button" onClick={onCancel} className="px-5 py-2 border border-gray-300 dark:border-slate-600 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition font-medium">Cancelar</button>
                        <button type="submit" className="px-6 py-2 bg-mercantil-orange text-white rounded-lg hover:bg-orange-700 shadow-md font-medium flex items-center transition"><i className="fas fa-save mr-2"></i> Salvar Registro</button>
                    </div>
                </form>
            );
        };

        const BaseManager = ({ title, icon, data, columns, formConfig, onSave, onDelete, onValidate, showToast }) => {
            const [editModal, setEditModal] = useState(null);
            const [search, setSearch] = useState('');
            
            const filtered = Array.isArray(data) ? data.filter(item => 
                item && typeof item === 'object' && Object.values(item).some(val => 
                    val !== null && val !== undefined && String(val).toLowerCase().includes(search.toLowerCase())
                )
            ) : [];

            const handleSave = (formData) => {
                if(onValidate && !onValidate(formData)) return;
                const finalData = { ...formData, id: formData.id || `ID-${Date.now()}-${Math.random().toString(36).substr(2,5)}` };
                onSave(finalData);
                setEditModal(null);
            };

            const handleExportCSV = () => {
                if (!data || data.length === 0) return showToast('Nenhum dado para exportar', 'error');
                const keysToExport = ['id', ...Array.from(new Set(data.flatMap(Object.keys))).filter(k => k !== 'id')];
                const csvContent = [
                    keysToExport.join(','),
                    ...data.map(item => keysToExport.map(k => `"${(item[k]||'').toString().replace(/"/g, '""')}"`).join(','))
                ].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${title.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                showToast('CSV exportado com sucesso!', 'success');
            };

            return (
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 flex flex-col h-full fade-in">
                    <div className="p-5 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex flex-col lg:flex-row justify-between items-center gap-4 rounded-t-xl">
                        <h2 className="text-xl font-bold text-mercantil-dark dark:text-white flex items-center gap-3">
                            <div className="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-gray-200 dark:border-slate-700 flex items-center justify-center text-mercantil-blue"><i className={icon}></i></div>
                            {title}
                        </h2>
                        <div className="flex flex-col sm:flex-row w-full lg:w-auto gap-3">
                            <div className="relative w-full sm:w-64">
                                <i className="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                                <input type="text" placeholder="Buscar registros..." className="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-800 dark:border-slate-600 dark:text-white text-sm" value={search} onChange={e=>setSearch(e.target.value)} />
                            </div>
                            <button onClick={handleExportCSV} className="bg-green-600 hover:bg-green-800 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm flex items-center justify-center whitespace-nowrap text-sm">
                                <i className="fas fa-file-csv mr-2"></i>Exportar CSV
                            </button>
                            <button onClick={() => setEditModal({})} className="bg-mercantil-blue hover:bg-blue-800 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm flex items-center justify-center whitespace-nowrap text-sm">
                                <i className="fas fa-plus mr-2"></i>Novo
                            </button>
                        </div>
                    </div>
                    <div className="overflow-x-auto flex-1 p-0">
                        <table className="w-full text-sm text-left dark:text-slate-300">
                            <thead className="text-xs text-gray-600 dark:text-gray-400 uppercase bg-gray-100 dark:bg-slate-700">
                                <tr>
                                    {columns.map(c => <th key={c.field} className="px-4 py-3">{c.header}</th>)}
                                    <th className="px-4 py-3 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.length === 0 ? <tr><td colSpan={columns.length + 1} className="text-center py-8 text-gray-500">Nenhum registro encontrado.</td></tr> :
                                filtered.map((item, idx) => (
                                    <tr key={item.id || idx} className="border-b dark:border-slate-700 hover:bg-blue-50 dark:hover:bg-slate-700 transition">
                                        {columns.map(c => (
                                            <td key={c.field} className="px-4 py-3 font-medium text-sm">
                                                {c.render ? c.render(item[c.field], item) : item[c.field]}
                                            </td>
                                        ))}
                                        <td className="px-4 py-3 text-right whitespace-nowrap">
                                            <button onClick={()=>setEditModal(item)} className="text-blue-600 hover:text-blue-900 dark:text-blue-400 dark:hover:text-blue-300 p-2 mx-1 rounded transition" title="Editar"><i className="fas fa-edit"></i></button>
                                            <button onClick={()=>{if(window.confirm('Excluir este registro?')) onDelete(item.id);}} className="text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300 p-2 mx-1 rounded transition" title="Excluir"><i className="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editModal && (
                        <Modal title={editModal.id ? `Editar: ${title}` : `Novo Registro: ${title}`} onClose={()=>setEditModal(null)}>
                            <AutoForm config={formConfig} initialData={editModal} onSave={handleSave} onCancel={()=>setEditModal(null)} />
                        </Modal>
                    )}
                </div>
            );
        };

        // --- COMPONENTE GESTÃO DE FRETES ---
        const FretesManager = ({ data, onSaveData, showToast }) => {
            const [tab, setTab] = useState('consulta');
            const [query, setQuery] = useState('');
            const [weight, setWeight] = useState('');
            const [results, setResults] = useState([]);
            const [searched, setSearched] = useState(false);

            const handleSearch = (e) => {
                e.preventDefault();
                setSearched(true);
                const q = query.trim();
                
                if (!q) { setResults(data); return; }

                const cleanQuery = q.replace(/\D/g, '');
                const isNumericSearch = cleanQuery.length >= 7;

                const res = data.filter(row => {
                    let matchRegion = false;
                    if (isNumericSearch) {
                        const queryCepNum = parseInt(cleanQuery.substring(0, 8), 10);
                        const startCep = parseInt((row.cepStart || '').replace(/\D/g, ''), 10);
                        const endCep = parseInt((row.cepEnd || '').replace(/\D/g, ''), 10);
                        if (!isNaN(startCep) && !isNaN(endCep) && queryCepNum >= startCep && queryCepNum <= endCep) matchRegion = true;
                    } else {
                        const cityStr = (row.city || '').toLowerCase();
                        if (cityStr.includes(q.toLowerCase())) matchRegion = true;
                    }
                    if (!matchRegion) return false;
                    if (weight) {
                        const wMin = parseFloat((row.weightMin || '').replace(',', '.'));
                        const wMax = parseFloat((row.weightMax || '').replace(',', '.'));
                        const wQuery = parseFloat(weight.replace(',', '.'));
                        if (!isNaN(wQuery)) {
                            if (!isNaN(wMin) && wQuery < wMin) return false;
                            if (!isNaN(wMax) && wQuery > wMax) return false;
                        }
                    }
                    return true;
                });
                setResults(res);
            };

            const updateRow = (id, field, value) => {
                const newData = data.map(row => row.id === id ? { ...row, [field]: value } : row);
                onSaveData(newData);
            };

            const addRow = () => {
                const newId = data.length > 0 ? Math.max(...data.map(d => d.id || 0)) + 1 : 1;
                onSaveData([{ id: newId, city: '', cepStart: '', cepEnd: '', weightMin: '', weightMax: '', price: '' }, ...data]);
                showToast('Nova linha adicionada no topo.');
            };

            const removeRow = (id) => {
                if(window.confirm("Remover esta regra de frete?")) {
                    onSaveData(data.filter(row => row.id !== id));
                    showToast('Linha removida.', 'success');
                }
            };

            // Adaptação para aceitar Universal (XLSX, XLS, CSV) na base de fretes
            const handleImportUniversal = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (typeof XLSX === 'undefined') {
                    showToast("Biblioteca de planilhas não carregada.", "error");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const fileData = evt.target.result;
                        const workbook = XLSX.read(fileData, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                        const startIndex = json[0] && json[0][0] && String(json[0][0]).toLowerCase().includes('munic') ? 1 : 0;
                        
                        const newData = [];
                        for (let i = startIndex; i < json.length; i++) {
                            const row = json[i];
                            if (!row || row.length === 0 || !row[0]) continue;
                            
                            newData.push({
                                id: Date.now() + i,
                                city: String(row[0] || '').trim(),
                                cepStart: String(row[1] || '').trim(),
                                cepEnd: String(row[2] || '').trim(),
                                weightMin: String(row[3] || '').trim(),
                                weightMax: String(row[4] || '').trim(),
                                price: String(row[5] || '').trim()
                            });
                        }

                        if (newData.length > 0) {
                            if(window.confirm(`Deseja SUBSTITUIR a base atual pelos ${newData.length} novos registros? (Cancelar irá ADICIONAR aos existentes)`)){
                                onSaveData(newData);
                            } else {
                                onSaveData([...newData, ...data]);
                            }
                            showToast(`${newData.length} registros importados com sucesso!`);
                        } else {
                            showToast("Planilha vazia ou em formato não reconhecido.", "error");
                        }
                    } catch (error) {
                        console.error(error);
                        showToast("Erro ao processar o arquivo.", "error");
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };

            const handleExport = () => {
                if (typeof XLSX === 'undefined') { showToast("Biblioteca não carregada.", "error"); return; }
                const exportData = [['Município', 'Faixa CEP Inicial', 'Faixa CEP Final', 'Peso Mínimo (kg)', 'Peso Máximo (kg)', 'Valor do Frete (R$)']];
                data.forEach(row => exportData.push([row.city, row.cepStart, row.cepEnd, row.weightMin, row.weightMax, row.price]));

                const ws = XLSX.utils.aoa_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Fretes");
                XLSX.writeFile(wb, `Base_Fretes_${new Date().toISOString().split('T')[0]}.xlsx`);
                showToast("Planilha de fretes exportada!");
            };

            return (
                <div className="flex flex-col h-full fade-in space-y-6">
                    <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 flex flex-wrap gap-2">
                        <button onClick={() => setTab('consulta')} className={`px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${tab === 'consulta' ? 'bg-mercantil-blue text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-300 dark:hover:bg-slate-600'}`}>
                            <i className="fas fa-search mr-2"></i> Consulta Cotação
                        </button>
                        <button onClick={() => setTab('gestao')} className={`px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${tab === 'gestao' ? 'bg-mercantil-blue text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-300 dark:hover:bg-slate-600'}`}>
                            <i className="fas fa-database mr-2"></i> Gestão da Base (Excel)
                        </button>
                    </div>

                    {tab === 'consulta' && (
                        <div className="space-y-6 fade-in">
                            <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700">
                                <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-6 flex items-center gap-2">
                                    <i className="fas fa-truck text-mercantil-orange"></i> Buscar Cotação de Frete
                                </h2>
                                
                                <form onSubmit={handleSearch} className="flex flex-col md:flex-row gap-4">
                                    <div className="flex-1">
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">CEP ou Bairro/Município</label>
                                        <div className="relative">
                                            <i className="fas fa-map-marker-alt absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                            <input type="text" value={query} onChange={e=>setQuery(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:text-white" placeholder="Ex: 30123-456 ou Belo Horizonte" />
                                        </div>
                                    </div>
                                    <div className="w-full md:w-48">
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Peso Opc. (kg)</label>
                                        <div className="relative">
                                            <i className="fas fa-box absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                            <input type="number" step="0.01" value={weight} onChange={e=>setWeight(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:text-white" placeholder="Ex: 5.5" />
                                        </div>
                                    </div>
                                    <div className="flex items-end">
                                        <button type="submit" className="w-full md:w-auto px-6 py-3 rounded-lg font-bold text-white bg-mercantil-orange hover:bg-orange-700 transition-colors shadow-sm flex items-center justify-center gap-2">
                                            <i className="fas fa-search"></i> Calcular
                                        </button>
                                    </div>
                                </form>
                            </div>

                            {searched && (

                                                    </div>

                                                        <span className="block text-xs font-bold text-green-700 dark:text-green-400 uppercase tracking-wider mb-1">Valor do Frete</span>
                                                        <span className="text-2xl font-bold text-green-700 dark:text-green-400 flex items-center justify-center gap-1">R$ {result.price || 'A Combinar'}</span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {tab === 'gestao' && (
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 flex flex-col flex-1 min-h-[500px] fade-in overflow-hidden">
                            <div className="p-4 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div>
                                    <h2 className="text-lg font-bold text-gray-800 dark:text-white">Editor da Base de Dados</h2>
                                    <p className="text-xs text-gray-500 dark:text-gray-400">Edite na tabela. Salve como planilha para não perder os dados.</p>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    <input type="file" id="file-input-frete" accept=".csv, .xlsx, .xls" className="hidden" onChange={handleImportUniversal} />

                                        <i className="fas fa-upload"></i> Importar (XLSX/CSV)
                                    </button>
                                    <button onClick={handleExport} className="flex items-center gap-2 px-3 py-2 bg-mercantil-blue text-white rounded-md text-sm font-bold hover:bg-blue-800 transition-colors shadow-sm">

                                    </button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-auto custom-scroll p-0">
                                <table className="w-full min-w-[800px] text-left border-collapse dark:text-slate-300">
                                    <thead className="bg-gray-100 dark:bg-slate-700 sticky top-0 z-10 shadow-sm text-gray-600 dark:text-gray-300">
                                        <tr>
                                            <th className="px-4 py-3 text-xs font-bold uppercase w-12 text-center">#</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase">Município / Região</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase">CEP Inicial</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase">CEP Final</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase text-right">Peso Mín (kg)</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase text-right">Peso Máx (kg)</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase text-right">Valor (R$)</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase w-16 text-center">Ação</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-200 dark:divide-slate-700">
                                        {data.length === 0 ? <tr><td colSpan="8" className="px-4 py-12 text-center text-gray-500">Nenhuma base importada.</td></tr> :
                                         data.map((row, index) => (
                                            <tr key={row.id} className="hover:bg-gray-50 dark:hover:bg-slate-750 transition-colors group">
                                                <td className="px-4 py-2 text-sm text-gray-400 text-center">{index + 1}</td>
                                                <td className="px-2 py-2"><input type="text" className="table-input dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.city||''} onChange={(e)=>updateRow(row.id, 'city', e.target.value)} placeholder="Região" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input font-mono text-xs dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.cepStart||''} onChange={(e)=>updateRow(row.id, 'cepStart', e.target.value)} placeholder="00000-000" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input font-mono text-xs dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.cepEnd||''} onChange={(e)=>updateRow(row.id, 'cepEnd', e.target.value)} placeholder="99999-999" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input text-right dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.weightMin||''} onChange={(e)=>updateRow(row.id, 'weightMin', e.target.value)} placeholder="0" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input text-right dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.weightMax||''} onChange={(e)=>updateRow(row.id, 'weightMax', e.target.value)} placeholder="10" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input text-right font-bold text-green-600 dark:text-green-400 dark:bg-slate-900 dark:border-slate-700 rounded p-1" value={row.price||''} onChange={(e)=>updateRow(row.id, 'price', e.target.value)} placeholder="15.00" /></td>
                                                <td className="px-4 py-2 text-center">
                                                    <button onClick={()=>removeRow(row.id)} className="p-1.5 text-gray-400 hover:text-red-500 rounded transition" title="Remover"><i className="fas fa-trash"></i></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <div className="p-4 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 rounded-b-xl flex justify-between items-center">
                                <span className="text-sm text-gray-500 dark:text-gray-400 font-bold">Total de registros: {data.length}</span>
                                <button onClick={addRow} className="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-600 text-mercantil-blue dark:text-blue-400 rounded-md text-sm font-bold hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
                                    <i className="fas fa-plus"></i> Adicionar Linha
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- APLICAÇÃO PRINCIPAL ---
        const App = () => {
            const [toast, setToast] = useState({ visible: false, message: '', type: 'success' });
            
            const showToast = (message, type = 'success') => {
                setToast({ visible: true, message, type });
                setTimeout(() => setToast(t => ({ ...t, visible: false })), 4000);
            };

            const [darkMode, setDarkMode] = useLocalStorage('mrc_theme_dark', false);
            const [activeMenu, setActiveMenu] = useState('dashboard');
            
            const [produtos, setProdutos] = useLocalStorage('mrc_produtos', []);
            const [kits, setKits] = useLocalStorage('mrc_kits', []);
            const [atendimentos, setAtendimentos] = useLocalStorage('mrc_atendimentos', []);
            const [qualidade, setQualidade] = useLocalStorage('mrc_qualidade', []);
            const [marketing, setMarketing] = useLocalStorage('mrc_marketing', []);
            const [gerencia, setGerencia] = useLocalStorage('mrc_gerencia', []);
            const [compliance, setCompliance] = useLocalStorage('mrc_compliance', []);
            const [fretes, setFretes] = useLocalStorage('mrc_fretes', []);
            const [lastBackup, setLastBackup] = useLocalStorage('mrc_last_backup_time', null);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const forceSystemBackup = () => {
                    const fullSystemDump = { produtos, kits, atendimentos, qualidade, marketing, gerencia, compliance, fretes };
                    localStorage.setItem('mrc_auto_backup_dump', JSON.stringify(fullSystemDump));
                    setLastBackup(new Date().toISOString());
                };
                const intervalId = setInterval(() => {
                    if (!lastBackup) { forceSystemBackup(); } 
                    else {
                        const lastTime = new Date(lastBackup).getTime();
                        const nowTime = new Date().getTime();
                        if ((nowTime - lastTime) >= 10800000) forceSystemBackup(); // 3 horas
                    }
                }, 60000);
                return () => clearInterval(intervalId);
            }, [produtos, kits, atendimentos, qualidade, marketing, gerencia, compliance, fretes, lastBackup, setLastBackup]);

            const saveStateRecord = (data, stateArray, setter) => {
                const arr = [...(stateArray || [])];
                const idx = arr.findIndex(i => i.id === data.id);
                if(idx >= 0) arr[idx] = data; else arr.unshift(data);
                setter(arr);
                showToast('Registro salvo com sucesso!');
            };

            const deleteStateRecord = (id, stateArray, setter) => {
                setter(stateArray.filter(i => i.id !== id));
                showToast('Registro excluído!', 'success');
            };

            // --- IMPORTAÇÃO UNIVERSAL (SheetJS) PARA PRODUTOS E KITS ---
            const handleUploadUniversal = (e, type) => {
                const file = e.target.files[0];
                if(!file) return;

                if (typeof XLSX === 'undefined') {
                    showToast("Biblioteca de planilhas não carregada.", "error");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                        
                        if(json.length === 0) { showToast('Arquivo vazio ou formato inválido.', 'error'); return; }

                        const processedData = json.map((row, index) => {
                            let obj = { ...row };
                            // Garante IDs consistentes
                            if (!obj.id && !obj.ID) obj.id = `IMP-${Date.now()}-${index}-${Math.random().toString(36).substr(2, 5)}`;
                            if (obj.ID) { obj.id = obj.ID; delete obj.ID; } 
                            
                            // Normalização básica de strings
                            if(typeof obj.Observações === 'string') obj.Observações = obj.Observações.replace(/\\n/g, '\n');
                            if(typeof obj['EAN/GTIN'] === 'string') obj['EAN/GTIN'] = obj['EAN/GTIN'].replace(/\\n/g, '\n');
                            return obj;
                        });

                        if(type === 'produtos') {
                            if(window.confirm(`Substituir a base de Produtos atual pelos ${processedData.length} novos? (Cancelar irá adicionar)`)) {
                                setProdutos(processedData);
                            } else { setProdutos([...processedData, ...produtos]); }
                        } else {
                            if(window.confirm(`Substituir a base de Kits atual pelos ${processedData.length} novos? (Cancelar irá adicionar)`)) {
                                setKits(processedData);
                            } else { setKits([...processedData, ...kits]); }
                        }
                        showToast(`${processedData.length} ${type} processados com sucesso!`, 'success');
                    } catch (error) {
                        console.error(error);
                        showToast('Erro ao ler arquivo. Formato não suportado.', 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = ''; 
            };

            // --- CONFIGURAÇÕES DE FORMULÁRIOS DINÂMICAS ---
            
            // Opções dinâmicas para o CRM baseadas nos cadastros existentes
            const produtoOptions = produtos && produtos.length > 0 
                ? produtos.filter(p => p.SKU).map(p => `${p.SKU} - ${p['Título'] ? p['Título'].substring(0,30) + '...' : 'Sem Título'}`) 
                : [];
                
            const kitOptions = kits && kits.length > 0 
                ? kits.filter(k => k.SKU).map(k => `${k.SKU} - ${k['Título'] ? k['Título'].substring(0,30) + '...' : 'Sem Título'}`) 
                : [];
                
            const freteOptions = fretes && fretes.length > 0 
                ? fretes.filter(f => f.city).map(f => `${f.city} (CEP: ${f.cepStart} a ${f.cepEnd}) - R$ ${f.price || '0,00'}`) 
                : [];

            const crmConfig = [
                { name: 'protocolo', label: 'Protocolo de Atendimento *', type: 'text', readOnly: true, button: 'Gerar Protocolo Oficial', icon: 'fas fa-fingerprint', full: true, required: true, placeholder: 'Clique no botão para autenticar',
                  action: (set) => {
                      showToast('Conectando ao World Time API...', 'info');
                      fetch('https://worldtimeapi.org/api/timezone/America/Sao_Paulo')
                        .then(res => res.json())
                        .then(d => {
                            const dt = new Date(d.datetime);
                            const p = `PRT-${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}-${String(dt.getHours()).padStart(2,'0')}${String(dt.getMinutes()).padStart(2,'0')}${String(dt.getSeconds()).padStart(2,'0')}`;
                            set(prev => ({...prev, protocolo: p, dataHoraOficial: d.datetime}));
                            showToast('Protocolo gerado.', 'success');
                        })
                        .catch(e => {
                            const dt = new Date();
                            const p = `PRT-${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}-${String(dt.getHours()).padStart(2,'0')}${String(dt.getMinutes()).padStart(2,'0')}${String(dt.getSeconds()).padStart(2,'0')}`;
                            set(prev => ({...prev, protocolo: p, dataHoraOficial: dt.toISOString()}));
                        });
                  }
                },
                { name: 'cliente', label: 'Nome / Oficina (Cliente) *', type: 'text', required: true, half: true },
                { name: 'canal', label: 'Canal de Origem *', type: 'select', options: ['WhatsApp', 'Chat Online', 'E-mail', 'Ligação Telefônica', 'Reclame Aqui', 'Consumidor.gov', 'Balcão/Loja Física'], required: true, half: true },
                { name: 'pedido', label: 'Número do Pedido (Marketplace/Site)', type: 'text', half: true, placeholder: 'Ex: PED-12345678' },
                { name: 'motivo', label: 'Motivo / Assunto', type: 'select', options: ['Dúvida Técnica (Motor/Peças)', 'Cotação de Peças Linha Leve/Diesel', 'Atraso na Entrega', 'Garantia / Defeito / Troca', 'Reclamação de Atendimento', 'Elogio / Sugestão'], half: true },
                // Integrações Relacionais
                { name: 'produtoVinculado', label: 'Vincular Produto Cadastrado', type: 'select', options: produtoOptions, half: true },
                { name: 'kitVinculado', label: 'Vincular Kit Cadastrado', type: 'select', options: kitOptions, half: true },
                { name: 'regiaoVinculada', label: 'Região / Frete Relacionado', type: 'select', options: freteOptions, half: true },
                
                { name: 'status', label: 'Status do Atendimento *', type: 'select', options: ['Aberto - Aguardando Resolução', 'Em Andamento', 'Aguardando Cliente', 'Resolvido', 'Cancelado'], required: true, half: true },
                { name: 'descricao', label: 'Relato do Cliente / Ocorrência', type: 'textarea', full: true, required: true }
            ];

            const qualidadeConfig = [
                { name: 'data', label: 'Data da Ocorrência', type: 'date', required: true, half: true },
                { name: 'tipo', label: 'Tipo de Indicador', type: 'select', options: ['Não Conformidade (NC) Interna', 'Falha Logística/Expedição', 'Reclamação de Peça (Garantia)', 'Sugestão de Melhoria', 'Auditoria de Processos'], required: true, half: true },
                { name: 'protocolo', label: 'Vincular Protocolo CRM (Opcional)', type: 'text', placeholder: 'Ex: PRT-20260608...', half: true },
                { name: 'status', label: 'Status da Investigação', type: 'select', options: ['Registrado', 'Em Análise de Causa Raiz', 'Ação Corretiva Aplicada', 'Encerrado com Sucesso'], half: true },
                { name: 'descricao', label: 'Descrição do Desvio', type: 'textarea', full: true, required: true },
                { name: 'acao', label: 'Plano de Ação (Preventiva/Corretiva)', type: 'textarea', full: true }
            ];

            const marketingConfig = [
                { name: 'data', label: 'Data Prevista de Postagem', type: 'date', required: true, half: true },
                { name: 'plataforma', label: 'Plataforma Mídia', type: 'select', options: ['Instagram', 'Facebook', 'TikTok', 'YouTube', 'Blog Site Mercantil'], required: true, half: true },
                { name: 'tipo', label: 'Tipo de Conteúdo', type: 'select', options: ['Imagem / Foto do Estoque', 'Vídeo Técnico / Mecânica', 'Carrossel Promocional', 'Artigo/Texto'], required: true, half: true },
                { name: 'status', label: 'Status da Peça', type: 'select', options: ['Ideia/Pauta', 'Em Produção', 'Aguardando Aprovação', 'Agendado', 'Publicado'], half: true },
                { name: 'conteudo', label: 'Descrição da Pauta', type: 'textarea', full: true, required: true }
            ];

            const gerenciaConfig = [
                { name: 'tipo', label: 'Categoria', type: 'select', options: ['Reunião de Alinhamento', 'Feedback Individual (1:1)', 'Ideia de Melhoria Corporativa', 'Aviso / Comunicado Geral'], required: true, half: true },
                { name: 'data', label: 'Data do Registro', type: 'date', required: true, half: true },
                { name: 'titulo', label: 'Título / Assunto Principal *', type: 'text', required: true, full: true },
                { name: 'envolvidos', label: 'Colaboradores / Departamentos', type: 'text', full: true },
                { name: 'descricao', label: 'Anotações, Pautas e Conclusões', type: 'textarea', full: true }
            ];

            const complianceConfig = [
                { name: 'codigo', label: 'Código do Doc (Ex: POL-001)', type: 'text', required: true, half: true },
                { name: 'titulo', label: 'Nome da Política ou Normativa', type: 'text', required: true, half: true },
                { name: 'versao', label: 'Versão Atual do Documento', type: 'text', half: true },
                { name: 'dataRev', label: 'Data da Última Revisão', type: 'date', required: true, half: true },
                { name: 'status', label: 'Status da Política', type: 'select', options: ['Vigente (Aprovada)', 'Em Revisão', 'Obsoleta'], half: true },
                { name: 'descricao', label: 'Resumo das Diretrizes', type: 'textarea', full: true }
            ];

            const produtosConfig = [
                { name: 'SKU', label: 'SKU *', required: true, half: true }, 
                { name: 'Título', label: 'Título do Produto *', required: true, full: true }, 
                { name: 'Status', label: 'Status', type: 'select', options: ['Ativo', 'Inativo', 'Em rascunho'] }, 
                { name: 'Índice', label: 'Índice' }, 
                { name: 'Material', label: 'Material' }, 
                { name: 'Status Fiscal', label: 'Status Fiscal' }, 
                { name: 'Status Dimensões', label: 'Status Dimensões', half: true }, 
                { name: 'Peso (kg)', label: 'Peso (kg)', type: 'number', step: '0.001', half: true }, 
                { name: 'Comprimento (cm)', label: 'Comp. (cm)', type: 'number', step: '0.1' }, 
                { name: 'Largura (cm)', label: 'Largura (cm)', type: 'number', step: '0.1' }, 
                { name: 'Altura (cm)', label: 'Altura (cm)', type: 'number', step: '0.1' }, 
                { name: 'EAN/GTIN', label: 'EAN/GTIN (Código de Barras)', type: 'textarea', full: true, placeholder: 'Ex: 7891234567890' }, 
                { name: 'Observações', label: 'Observações', type: 'textarea', full: true }
            ];

            const kitsConfig = [
                { name: 'SKU', label: 'SKU do Kit *', required: true, half: true }, 
                { name: 'Título', label: 'Título do Kit *', required: true, full: true }, 
                { name: 'Status', label: 'Status', type: 'select', options: ['Ativo', 'Inativo', 'Em rascunho'] }, 
                { name: 'Índice', label: 'Índice' }, 
                { name: 'Material', label: 'Material' }, 
                { name: 'Status Fiscal', label: 'Status Fiscal' }, 
                { name: 'Status Dimensões', label: 'Status Dimensões', half: true }, 
                { name: 'Peso (kg)', label: 'Peso Total (kg)', type: 'number', step: '0.001', half: true }, 
                { name: 'Comprimento (cm)', label: 'Comp. (cm)', type: 'number', step: '0.1' }, 
                { name: 'Largura (cm)', label: 'Largura (cm)', type: 'number', step: '0.1' }, 
                { name: 'Altura (cm)', label: 'Altura (cm)', type: 'number', step: '0.1' }, 
                { name: 'EAN/GTIN', label: 'EAN/GTIN', type: 'textarea', full: true }, 
                { name: 'Observações', label: 'Observações / Composição', type: 'textarea', full: true }
            ];

            const catalogColumns = [
                { field: 'SKU', header: 'SKU', render: (val) => <span className="font-mono font-bold cursor-pointer hover:text-blue-500" onClick={(e)=>{ e.stopPropagation(); copyToClipboard(val, showToast); }}>{val} <i className="fas fa-copy ml-1"></i></span> },
                { field: 'Título', header: 'Título' },

                                    onValidate={(data) => { if(!data.protocolo) { showToast('Obrigatório gerar o Protocolo de Atendimento oficial antes de salvar!', 'error'); return false; } return true; }}
                                    onSave={(data) => saveStateRecord(data, atendimentos, setAtendimentos)} onDelete={(id) => deleteStateRecord(id, atendimentos, setAtendimentos)}
                                    columns={[ { field: 'protocolo', header: 'Protocolo', render: (val) => <span className="font-mono text-mercantil-blue dark:text-blue-400">{val}</span> }, { field: 'pedido', header: 'Pedido', render: (val) => <span className="font-bold text-xs">{val || '-'}</span> }, { field: 'cliente', header: 'Cliente' }, { field: 'canal', header: 'Canal' }, { field: 'status', header: 'Status', render: (val) => <span className={`px-2 py-1 rounded text-xs font-bold ${val && val.includes('Resolvido') ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{val}</span> } ]} />
                            )}

                            {activeMenu === 'qualidade' && (
                                <BaseManager title="Gestão de Qualidade & NCs" icon="fas fa-medal" data={qualidade} formConfig={qualidadeConfig} showToast={showToast}
                                    onSave={(data) => saveStateRecord(data, qualidade, setQualidade)} onDelete={(id) => deleteStateRecord(id, qualidade, setQualidade)}
                                    columns={[ { field: 'data', header: 'Data' }, { field: 'tipo', header: 'Tipo/Indicador' }, { field: 'protocolo', header: 'Protocolo Ref.', render: (val) => val ? <span className="font-mono text-xs">{val}</span> : '-' }, { field: 'status', header: 'Status', render: (val) => <span className="font-bold text-xs uppercase text-gray-500 dark:text-gray-400">{val}</span> } ]} />
                            )}

                            {activeMenu === 'marketing' && (
                                <BaseManager title="Planejamento de Marketing" icon="fas fa-bullhorn" data={marketing} formConfig={marketingConfig} showToast={showToast}
                                    onSave={(data) => saveStateRecord(data, marketing, setMarketing)} onDelete={(id) => deleteStateRecord(id, marketing, setMarketing)}
                                    columns={[ { field: 'data', header: 'Data Prevista' }, { field: 'plataforma', header: 'Canal Mídia' }, { field: 'tipo', header: 'Formato' }, { field: 'status', header: 'Status', render: (val) => <span className={`px-2 py-1 rounded text-xs font-bold ${val==='Publicado'?'bg-blue-100 text-blue-700':'bg-gray-200 text-gray-700'}`}>{val}</span> } ]} />
                            )}

                            {activeMenu === 'gerencia' && (
                                <BaseManager title="Área da Gerência (Registros Internos)" icon="fas fa-briefcase" data={gerencia} formConfig={gerenciaConfig} showToast={showToast}
                                    onSave={(data) => saveStateRecord(data, gerencia, setGerencia)} onDelete={(id) => deleteStateRecord(id, gerencia, setGerencia)}
                                    columns={[ { field: 'data', header: 'Data' }, { field: 'tipo', header: 'Categoria' }, { field: 'titulo', header: 'Assunto' } ]} />
                            )}

                            {activeMenu === 'compliance' && (
                                <BaseManager title="Políticas & Compliance" icon="fas fa-shield-alt" data={compliance} formConfig={complianceConfig} showToast={showToast}
                                    onSave={(data) => saveStateRecord(data, compliance, setCompliance)} onDelete={(id) => deleteStateRecord(id, compliance, setCompliance)}
                                    columns={[ { field: 'codigo', header: 'Código', render: (val) => <span className="font-mono text-mercantil-orange">{val}</span> }, { field: 'titulo', header: 'Título Documento' }, { field: 'dataRev', header: 'Última Revisão' }, { field: 'status', header: 'Status', render: (val) => <span className={`px-2 py-1 rounded text-xs font-bold ${val==='Vigente (Aprovada)'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>{val}</span> } ]} />
                            )}

                            {activeMenu === 'produtos' && (
                                <BaseManager title="Catálogo de Peças (Produtos)" icon="fas fa-box" data={produtos} formConfig={produtosConfig} showToast={showToast}
                                    onSave={(data) => saveStateRecord(data, produtos, setProdutos)} onDelete={(id) => deleteStateRecord(id, produtos, setProdutos)}
                                    columns={catalogColumns} />
                            )}

                            {activeMenu === 'kits' && (
                                <BaseManager title="Catálogo de Kits" icon="fas fa-boxes-stacked" data={kits} formConfig={kitsConfig} showToast={showToast}
                                    onSave={(data) => saveStateRecord(data, kits, setKits)} onDelete={(id) => deleteStateRecord(id, kits, setKits)}
                                    columns={catalogColumns} />
                            )}
                            
                            {activeMenu === 'fretes' && (
                                <FretesManager data={fretes} onSaveData={setFretes} showToast={showToast} />
                            )}

                            {activeMenu === 'dados' && <ImportExport />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
