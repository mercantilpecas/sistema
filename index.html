<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercantil ERP - Gestão Integrada (Cloud)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mercantil: {
                            blue: '#1E3A8A', 
                            light: '#3B82F6',
                            orange: '#EA580C',
                            dark: '#0F172A',
                            gray: '#F8FAFC'
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background-color: inherit; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .table-input {
            width: 100%;
            padding: 4px 8px;
            font-size: 0.875rem;
            background-color: transparent;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }
        .table-input:focus {
            border-bottom-color: #3b82f6;
            outline: none;
        }
        .custom-scroll { overflow-y: auto; }
        
        /* Estilos do Editor de Texto Rico */
        .rich-editor-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-editor-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-editor-content a { color: #3b82f6; text-decoration: underline; }
        
        /* Captcha Visual */
        .captcha-box {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px);
        }
        .dark .captcha-box {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-200">
    
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; color: #475569;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: #1E3A8A; margin-bottom: 20px;"></i>
            <h2 style="margin: 0; font-size: 1.5rem; font-weight: 700;">Iniciando Mercantil ERP...</h2>
            <p style="margin-top: 10px; font-size: 0.9rem;">Sincronizando módulos de sistema e banco de dados em nuvem.</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- INICIALIZAÇÃO DO SUPABASE ---
        const supabaseUrl = 'https://binjojpmcobdwdfofwtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpbmpvanBtY29iZHdkZm9md3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTg5MzcsImV4cCI6MjA5NjU5NDkzN30.-GvQXCJqGZ9uyf2nmc84mnPImUuhmKYDbZaRGLGhcww';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- HOOK CUSTOMIZADO PARA SUPABASE (COM FALLBACK PARA CONFIGURAÇÕES LOCAIS) ---
        function useLocalStorage(key, initialValue) {
            const isLocalOnly = key === 'mrc_theme_dark' || key === 'mrc_last_backup_time';
            const tipo = key.replace('mrc_', ''); 

            const [storedValue, setStoredValue] = useState(() => {
                if (isLocalOnly) {
                    try {
                        const item = window.localStorage.getItem(key);
                        if (!item || item === 'null' || item === 'undefined') return initialValue;
                        return JSON.parse(item);
                    } catch (error) { return initialValue; }
                }
                return initialValue;
            });

            useEffect(() => {
                if (isLocalOnly) return;
                
                let isMounted = true;
                
                const fetchFromSupabase = async () => {
                    const { data, error } = await supabase
                        .from('data')
                        .select('dados')
                        .eq('tipo', tipo);
                    
                    if (!error && data && isMounted) {
                        setStoredValue(data.map(item => item.dados));
                    }
                };
                fetchFromSupabase();

                const channel = supabase.channel(`public:data:tipo=eq.${tipo}`)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'data', filter: `tipo=eq.${tipo}` }, payload => {
                        fetchFromSupabase();
                    })
                    .subscribe();

                return () => {
                    isMounted = false;
                    supabase.removeChannel(channel);
                };
            }, [tipo, isLocalOnly]);

            const setValue = async (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    
                    if (isLocalOnly) {
                        setStoredValue(valueToStore);
                        window.localStorage.setItem(key, JSON.stringify(valueToStore));
                        return;
                    }

                    let sanitizedValue = valueToStore;
                    if (Array.isArray(valueToStore)) {
                        sanitizedValue = valueToStore.map((item, idx) => {
                            if (item && typeof item === 'object' && !item.id && !item.ID) {
                                return { ...item, id: `FIX-${Date.now()}-${Math.random().toString(36).substr(2, 5)}-${idx}` };
                            }
                            return item;
                        });
                    }

                    const oldValue = Array.isArray(storedValue) ? storedValue : [];
                    setStoredValue(sanitizedValue);

                    if (!Array.isArray(sanitizedValue)) return;

                    const newIds = new Set(sanitizedValue.map(v => String(v.id || v.ID)));
                    const deletedItems = oldValue.filter(v => !newIds.has(String(v.id || v.ID)));

                    const oldMap = new Map(oldValue.map(v => [String(v.id || v.ID), JSON.stringify(v)]));
                    const upsertData = [];
                    
                    for (let item of sanitizedValue) {
                        const id = String(item.id || item.ID);
                        const strItem = JSON.stringify(item);
                        
                        if (oldMap.get(id) !== strItem) {
                            upsertData.push({ id, tipo, dados: item });
                        }
                    }

                    if (upsertData.length > 0) {
                        await supabase.from('data').upsert(upsertData);
                    }
                    
                    for (let item of deletedItems) {
                        const id = String(item.id || item.ID);
                        await supabase.from('data').delete().eq('id', id).eq('tipo', tipo);
                    }

                } catch (error) {
                    console.error("Erro de sincronização com Supabase:", error);
                }
            };

            return [storedValue, setValue];
        }

        // --- UTILS ---
        const copyToClipboard = (text, showToast) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast(`Copiado: ${text}`, 'success')).catch(() => showToast('Erro ao copiar', 'error'));
            } else {
                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast(`Copiado: ${text}`, 'success');
                } catch (err) {
                    showToast('Erro ao copiar', 'error');
                }
            }
        };

        // --- COMPONENTE: LOGO MERCANTIL ---
        const LogoMercantil = () => (
            <div className="relative flex items-center justify-center w-10 h-10 shrink-0">
                <img 
                    src="https://raw.githubusercontent.com/mercantil/logo/main/2.png" 
                    alt="Mercantil Logo" 
                    className="w-10 h-10 rounded-full object-cover shadow-sm z-10 border-2 border-transparent"
                    onError={(e) => {
                        e.target.style.display = 'none';
                        e.target.nextElementSibling.style.display = 'flex';
                    }}
                />
                <div style={{ display: 'none' }} className="absolute inset-0 rounded-full bg-white text-mercantil-orange items-center justify-center font-bold text-xl shadow-md border-2 border-mercantil-orange z-0">
                    M
                </div>
            </div>
        );

        // --- COMPONENTE: EDITOR DE TEXTO RICO (BLOCO DE NOTAS) ---
        const RichTextEditor = ({ value, onChange, placeholder }) => {
            const editorRef = useRef(null);
            
            useEffect(() => {
                if (editorRef.current && value !== editorRef.current.innerHTML && document.activeElement !== editorRef.current) {
                    editorRef.current.innerHTML = value || '';
                }
            }, [value]);

            const handleInput = () => {
                if (editorRef.current) {
                    onChange(editorRef.current.innerHTML);
                }
            };

            const execCmd = (cmd, arg = null) => {
                document.execCommand(cmd, false, arg);
                if (editorRef.current) editorRef.current.focus();
                handleInput();
            };

            const insertEmoji = (emoji) => {
                execCmd('insertText', emoji);
            };

            return (
                <div className="border border-gray-300 dark:border-slate-600 rounded-lg overflow-hidden flex flex-col bg-white dark:bg-slate-900 focus-within:ring-2 focus-within:ring-mercantil-light transition-all">
                    <div className="bg-gray-100 dark:bg-slate-800 border-b border-gray-300 dark:border-slate-600 p-2 flex gap-1 flex-wrap items-center">
                        <button type="button" onClick={() => execCmd('bold')} className="p-1.5 px-2.5 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 rounded transition"><i className="fas fa-bold"></i></button>
                        <button type="button" onClick={() => execCmd('italic')} className="p-1.5 px-2.5 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 rounded transition"><i className="fas fa-italic"></i></button>
                        <button type="button" onClick={() => execCmd('underline')} className="p-1.5 px-2.5 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 rounded transition"><i className="fas fa-underline"></i></button>
                        <div className="w-px h-5 bg-gray-300 dark:bg-slate-600 mx-1"></div>
                        <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-1.5 px-2.5 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 rounded transition" title="Lista"><i className="fas fa-list-ul"></i></button>
                        <button type="button" onClick={() => execCmd('insertOrderedList')} className="p-1.5 px-2.5 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 rounded transition" title="Lista Numerada"><i className="fas fa-list-ol"></i></button>
                        <div className="w-px h-5 bg-gray-300 dark:bg-slate-600 mx-1"></div>
                        <div className="flex gap-1 items-center">
                            {['😀', '👍', '⚠️', '🔥', '✅', '💡', '📌', '📦'].map(e => (
                                <button type="button" key={e} onClick={() => insertEmoji(e)} className="p-1 hover:bg-gray-200 dark:hover:bg-slate-700 rounded text-base transition">{e}</button>
                            ))}
                        </div>
                    </div>
                    <div 
                        ref={editorRef}
                        contentEditable 
                        onInput={handleInput}
                        onBlur={handleInput}
                        data-placeholder={placeholder}
                        className="p-4 min-h-[150px] outline-none text-sm text-gray-800 dark:text-slate-200 rich-editor-content empty:before:content-[attr(data-placeholder)] empty:before:text-gray-400"
                    />
                </div>
            );
        };

        // --- COMPONENTE: VÍNCULOS COMERCIAIS (Apenas Produtos e Kits) ---
        const ItensVinculadosManager = ({ value = [], onChange, produtosOptions = [], kitsOptions = [] }) => {
            const [tipo, setTipo] = useState('Produto');
            const [selecionado, setSelecionado] = useState('');
            const [qtd, setQtd] = useState(1);

            const handleAdd = () => {
                if (!selecionado || qtd <= 0) return;
                const newVal = [...(Array.isArray(value) ? value : []), { tipo, item: selecionado, qtd }];
                onChange(newVal);
                setSelecionado('');
                setQtd(1);
            };

            const handleRemove = (idx) => {
                const newVal = (Array.isArray(value) ? value : []).filter((_, i) => i !== idx);
                onChange(newVal);
            };

            const options = tipo === 'Produto' ? produtosOptions : kitsOptions;

            return (
                <div className="border border-gray-200 dark:border-slate-700 rounded-lg p-4 bg-white dark:bg-slate-800 shadow-sm mt-1">
                    <div className="flex flex-wrap gap-2 mb-3">
                        {(Array.isArray(value) ? value : []).map((v, i) => (
                            <span key={i} className="inline-flex items-center gap-2 px-3 py-1.5 bg-gray-50 dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-md text-xs font-bold text-gray-700 dark:text-gray-200 shadow-sm transition">
                                <span className={v.tipo === 'Produto' ? 'text-mercantil-light dark:text-blue-400' : 'text-mercantil-orange dark:text-orange-400'}>
                                    <i className={v.tipo === 'Produto' ? 'fas fa-box mr-1' : 'fas fa-boxes-stacked mr-1'}></i>{v.tipo}:
                                </span>
                                <span className="truncate max-w-[250px]" title={v.item}>{v.item}</span>
                                <span className="bg-gray-200 dark:bg-slate-600 px-2 py-0.5 rounded-full text-mercantil-dark dark:text-white">Qtd: {v.qtd}</span>
                                <button type="button" onClick={() => handleRemove(i)} className="text-red-500 hover:text-red-700 transition ml-1"><i className="fas fa-times-circle"></i></button>
                            </span>
                        ))}
                        {(Array.isArray(value) ? value : []).length === 0 && (
                            <span className="text-xs text-gray-400 dark:text-gray-500 italic">Nenhum item adicionado até o momento.</span>
                        )}
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end bg-gray-50 dark:bg-slate-900 p-3 rounded-lg border border-gray-200 dark:border-slate-700">
                        <div className="md:col-span-3">
                            <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Tipo de Item</label>
                            <select value={tipo} onChange={e => {setTipo(e.target.value); setSelecionado('');}} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-light outline-none dark:bg-slate-800 dark:border-slate-600 dark:text-white text-sm">
                                <option value="Produto">Produto / Peça</option>
                                <option value="Kit">Kit Montado</option>
                            </select>
                        </div>
                        <div className="md:col-span-6">
                            <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Selecione o {tipo}</label>
                            <select value={selecionado} onChange={e => setSelecionado(e.target.value)} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-light outline-none dark:bg-slate-800 dark:border-slate-600 dark:text-white text-sm">
                                <option value="">Selecione na lista...</option>
                                {options.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                            </select>
                        </div>
                        <div className="md:col-span-2">
                            <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Quantidade</label>
                            <input type="number" min="1" value={qtd} onChange={e => setQtd(parseInt(e.target.value)||1)} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-light outline-none dark:bg-slate-800 dark:border-slate-600 dark:text-white text-sm" />
                        </div>
                        <div className="md:col-span-1">
                            <button type="button" onClick={handleAdd} disabled={!selecionado} className="w-full bg-mercantil-blue text-white p-2 rounded hover:bg-blue-800 disabled:bg-gray-400 disabled:dark:bg-slate-700 flex items-center justify-center transition shadow-sm h-[38px]" title="Adicionar à lista">
                                <i className="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- FUNÇÃO AUXILIAR GLOBAL PARA VÍNCULOS ---
        const getGlobalLinkOptions = (tipo, db) => {
            switch(tipo) {
                case 'Produtos': return (db.produtos||[]).filter(p=>p.SKU).map(p => ({ id: p.SKU, label: `${p.SKU} - ${p['Título']?.substring(0,30)}` }));
                case 'Kits': return (db.kits||[]).filter(k=>k.SKU).map(k => ({ id: k.SKU, label: `${k.SKU} - ${k['Título']?.substring(0,30)}` }));
                case 'CRM (Atendimentos)': return (db.atendimentos||[]).filter(a=>a.protocolo).map(a => ({ id: a.protocolo, label: `${a.protocolo} - ${a.cliente}` }));
                case 'Devoluções': return (db.devolucoes||[]).filter(d=>d.protocolo).map(d => ({ id: d.protocolo, label: `${d.protocolo} - ${d.cliente}` }));
                case 'Qualidade': return (db.qualidade||[]).filter(q=>q.data).map(q => ({ id: q.id, label: `NC: ${q.data} - ${q.tipo}` }));
                case 'Marketing': return (db.marketing||[]).filter(m=>m.data).map(m => ({ id: m.id, label: `Pauta: ${m.data} - ${m.plataforma}` }));
                case 'Fretes': return (db.fretes||[]).filter(f=>f.city).map(f => ({ id: f.id, label: `Frete: ${f.city} (${f.cepStart})` }));
                case 'Tarefas': return (db.tarefas||[]).filter(t=>t.titulo).map(t => ({ id: t.id, label: `Tarefa: ${t.titulo?.substring(0,30)}` }));
                case 'Notas': return (db.notas||[]).filter(n=>n.titulo).map(n => ({ id: n.id, label: `Nota: ${n.titulo?.substring(0,30)}` }));
                default: return [];
            }
        };

        // --- COMPONENTE: VÍNCULOS GLOBAIS (Qualquer Área do Sistema) ---
        const VinculosGlobaisManager = ({ value = [], onChange, db }) => {
            const [tipo, setTipo] = useState('');
            const [selecionado, setSelecionado] = useState('');

            const handleAdd = () => {
                if (!tipo || !selecionado) return;
                const option = getGlobalLinkOptions(tipo, db).find(o => o.id === selecionado);
                if (option) {
                    const currentVals = Array.isArray(value) ? value : [];
                    if (!currentVals.some(v => v.tipo === tipo && v.id === selecionado)) {
                        onChange([...currentVals, { tipo, id: selecionado, label: option.label }]);
                    }
                }
                setSelecionado('');
            };

            const handleRemove = (idx) => {
                const currentVals = Array.isArray(value) ? value : [];
                onChange(currentVals.filter((_, i) => i !== idx));
            };

            return (
                <div className="border border-gray-200 dark:border-slate-700 rounded-lg p-4 bg-white dark:bg-slate-800 shadow-sm mt-1 w-full">
                    <div className="flex flex-wrap gap-2 mb-3">
                        {(Array.isArray(value) ? value : []).map((v, i) => (
                            <span key={i} className="inline-flex items-center gap-2 px-3 py-1.5 bg-gray-50 dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-md text-xs font-bold text-gray-700 dark:text-gray-200 shadow-sm transition">
                                <span className="text-mercantil-light dark:text-blue-400">
                                    <i className="fas fa-link mr-1"></i>{v.tipo}:
                                </span>
                                <span className="truncate max-w-[250px]" title={v.label || v.id}>{v.label || v.id}</span>
                                <button type="button" onClick={() => handleRemove(i)} className="text-red-500 hover:text-red-700 transition ml-1"><i className="fas fa-times-circle"></i></button>
                            </span>
                        ))}
                        {(Array.isArray(value) ? value : []).length === 0 && (
                            <span className="text-xs text-gray-400 dark:text-gray-500 italic">Nenhum vínculo adicionado até o momento.</span>
                        )}
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end bg-gray-50 dark:bg-slate-900 p-3 rounded-lg border border-gray-200 dark:border-slate-700">
                        <div className="md:col-span-4">
                            <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Área / Módulo</label>
                            <select value={tipo} onChange={e => {setTipo(e.target.value); setSelecionado('');}} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-light outline-none dark:bg-slate-800 dark:border-slate-600 dark:text-white text-sm">
                                <option value="">Selecione a área...</option>
                                <option value="Produtos">Produtos / Peças</option>
                                <option value="Kits">Kits</option>
                                <option value="CRM (Atendimentos)">CRM (Atendimentos)</option>
                                <option value="Devoluções">Devoluções</option>
                                <option value="Qualidade">Qualidade (NCs)</option>
                                <option value="Tarefas">Tarefas</option>
                                <option value="Notas">Bloco de Notas</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Fretes">Fretes</option>
                            </select>
                        </div>
                        <div className="md:col-span-6">
                            <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Selecione o Registro</label>
                            <select value={selecionado} onChange={e => setSelecionado(e.target.value)} disabled={!tipo} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-light outline-none dark:bg-slate-800 dark:border-slate-600 dark:text-white text-sm disabled:bg-gray-200 disabled:dark:bg-slate-700">
                                <option value="">{tipo ? 'Selecione na lista...' : 'Escolha a área primeiro'}</option>
                                {tipo && getGlobalLinkOptions(tipo, db).map((opt, i) => <option key={i} value={opt.id}>{opt.label}</option>)}
                            </select>
                        </div>
                        <div className="md:col-span-2">
                            <button type="button" onClick={handleAdd} disabled={!selecionado} className="w-full bg-mercantil-blue text-white p-2 rounded hover:bg-blue-800 disabled:bg-gray-400 disabled:dark:bg-slate-700 flex items-center justify-center transition shadow-sm h-[38px]" title="Vincular">
                                <i className="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENTES UI COMPARTILHADOS ---
        const Modal = ({ title, children, onClose, onSave, extraButtons }) => (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 fade-in p-4 backdrop-blur-sm">
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden border dark:border-slate-700">
                    <div className="flex justify-between items-center p-5 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900">
                        <h3 className="text-xl font-bold text-mercantil-dark dark:text-white">{title}</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-red-500 transition"><i className="fas fa-times text-xl"></i></button>
                    </div>
                    <div className="p-6 overflow-y-auto flex-1 dark:text-slate-200 custom-scroll">
                        {children}
                    </div>
                    {(onSave || extraButtons) && (
                        <div className="p-5 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="w-full sm:w-auto flex justify-center">{extraButtons}</div>
                            <div className="flex flex-col-reverse sm:flex-row gap-3 w-full sm:w-auto">
                                <button onClick={onClose} className="w-full sm:w-auto px-5 py-2 border border-gray-300 dark:border-slate-600 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-200 dark:hover:bg-slate-700 font-medium transition text-center">Cancelar</button>
                                {onSave && <button onClick={onSave} className="w-full sm:w-auto px-6 py-2 bg-mercantil-orange text-white rounded-lg hover:bg-orange-700 font-medium shadow-md transition text-center">Salvar Alterações</button>}
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );

        const AutoForm = ({ config, initialData, onSave, onCancel, db }) => {
            const [data, setData] = useState(initialData || {});
            return (
                <form onSubmit={e => { e.preventDefault(); onSave(data); }} className="space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {config.map(f => {
                            const colClass = f.full ? 'col-span-1 md:col-span-4' : 
                                             f.threeQuarters ? 'col-span-1 md:col-span-3' : 
                                             f.half ? 'col-span-1 md:col-span-2' : 
                                             'col-span-1';
                            return (
                                <div key={f.name} className={colClass}>
                                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 uppercase tracking-wider">{f.label}</label>
                                    
                                    {f.type === 'vinculos_comerciais' ? (
                                        <ItensVinculadosManager 
                                            value={data[f.name]} 
                                            onChange={v => setData({...data, [f.name]: v})} 
                                            produtosOptions={f.produtos} 
                                            kitsOptions={f.kits} 
                                        />
                                    ) : f.type === 'vinculos_globais' ? (
                                        <VinculosGlobaisManager 
                                            value={data[f.name]} 
                                            onChange={v => setData({...data, [f.name]: v})} 
                                            db={db}
                                        />
                                    ) : (
                                        <div className="flex flex-col sm:flex-row gap-2 w-full">
                                            {f.type === 'select' ? (
                                                <select required={f.required} className="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-mercantil-light outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})}>
                                                    <option value="">Selecione...</option>
                                                    {f.options && f.options.map((o, idx) => <option key={idx} value={o}>{o}</option>)}
                                                </select>
                                            ) : f.type === 'textarea' ? (
                                                <textarea required={f.required} className="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-mercantil-light outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})} rows="3" placeholder={f.placeholder || ''} />
                                            ) : (
                                                <input required={f.required} type={f.type||'text'} min={f.min} step={f.step} className="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-mercantil-light outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})} readOnly={f.readOnly} placeholder={f.placeholder || ''} />
                                            )}
                                            {f.button && (
                                                <button type="button" onClick={() => f.action(setData)} className="w-full sm:w-auto bg-mercantil-blue text-white px-4 py-2 rounded shadow hover:bg-blue-800 whitespace-nowrap text-sm font-bold flex items-center justify-center transition">
                                                    <i className={`${f.icon || "fas fa-bolt"} mr-2`}></i> {f.button}
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-6 mt-4 border-t border-gray-200 dark:border-slate-700 w-full">
                        <button type="button" onClick={onCancel} className="w-full sm:w-auto px-5 py-2 border border-gray-300 dark:border-slate-600 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition font-medium text-center">Cancelar</button>
                        <button type="submit" className="w-full sm:w-auto px-6 py-2 bg-mercantil-orange text-white rounded-lg hover:bg-orange-700 shadow-md font-medium flex justify-center items-center transition text-center"><i className="fas fa-save mr-2"></i> Salvar Registro</button>
                    </div>
                </form>
            );
        };

        // --- COMPONENTE GESTÃO DE TAREFAS (KANBAN) ---
        const TarefasManager = ({ tarefas, setTarefas, db, showToast }) => {
            const [modalData, setModalData] = useState(null);
            const [tempVinculos, setTempVinculos] = useState([]);
            const [currentVinculoTipo, setCurrentVinculoTipo] = useState('');
            const [currentVinculoId, setCurrentVinculoId] = useState('');
            
            const [responsaveis, setResponsaveis] = useState([]);
            const [novoResponsavel, setNovoResponsavel] = useState('');

            const openTaskModal = (task = null) => {
                if (task) {
                    setModalData(task);
                    let initialVinculos = task.vinculos ? [...task.vinculos] : [];
                    if (initialVinculos.length === 0 && task.vinculoTipo && task.vinculoId) {
                        initialVinculos.push({ tipo: task.vinculoTipo, id: task.vinculoId, label: task.vinculoId });
                    }
                    setTempVinculos(initialVinculos);
                    
                    let resps = [];
                    if (Array.isArray(task.responsaveis)) resps = [...task.responsaveis];
                    else if (task.responsavel) resps = [task.responsavel];
                    setResponsaveis(resps);
                } else {
                    setModalData({ status: 'Pendente', prioridade: 'Média' });
                    setTempVinculos([]);
                    setResponsaveis([]);
                }
                setCurrentVinculoTipo('');
                setCurrentVinculoId('');
                setNovoResponsavel('');
            };

            const addVinculo = () => {
                if (!currentVinculoTipo || !currentVinculoId) return;
                const option = getGlobalLinkOptions(currentVinculoTipo, db).find(o => o.id === currentVinculoId);
                if (option) {
                    if (!tempVinculos.some(v => v.tipo === currentVinculoTipo && v.id === currentVinculoId)) {
                        setTempVinculos([...tempVinculos, { tipo: currentVinculoTipo, id: currentVinculoId, label: option.label }]);
                    } else {
                        showToast('Este vínculo já foi adicionado a esta tarefa.', 'info');
                    }
                }
                setCurrentVinculoId('');
            };

            const removeVinculo = (index) => setTempVinculos(tempVinculos.filter((_, i) => i !== index));

            const addResponsavel = () => {
                const nome = novoResponsavel.trim();
                if (nome && !responsaveis.includes(nome)) {
                    setResponsaveis([...responsaveis, nome]);
                    setNovoResponsavel('');
                }
            };

            const handleSave = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const newTask = {
                    ...data,
                    id: modalData.id || `TRF-${Date.now()}`,
                    dataCriacao: modalData.dataCriacao || new Date().toISOString(),
                    vinculos: tempVinculos,
                    responsaveis: responsaveis
                };

                delete newTask.vinculoTipo;
                delete newTask.vinculoId;
                delete newTask.responsavel; 

                if (modalData.id) {
                    setTarefas(tarefas.map(t => t.id === modalData.id ? newTask : t));
                    showToast('Tarefa atualizada com sucesso!');
                } else {
                    setTarefas([newTask, ...tarefas]);
                    showToast('Nova tarefa criada com sucesso!');
                }
                setModalData(null);
            };

            const changeStatus = (id, newStatus) => {
                setTarefas(tarefas.map(t => t.id === id ? { ...t, status: newStatus } : t));
                if(newStatus === 'Concluída') showToast('Tarefa concluída!', 'success');
            };

            const deleteTask = (id) => {
                if(window.confirm('Excluir esta tarefa permanentemente?')) {
                    setTarefas(tarefas.filter(t => t.id !== id));
                    showToast('Tarefa excluída.', 'success');
                }
            };

            const TaskCard = ({ task }) => {
                const priorityColors = { 'Alta': 'border-l-red-500', 'Média': 'border-l-yellow-500', 'Baixa': 'border-l-blue-500' };
                const bgColors = { 'Pendente': 'bg-white dark:bg-slate-800', 'Em Andamento': 'bg-blue-50 dark:bg-slate-700', 'Concluída': 'bg-gray-100 dark:bg-slate-900 opacity-60' };
                
                let displayVinculos = task.vinculos || [];
                if (displayVinculos.length === 0 && task.vinculoTipo && task.vinculoId) {
                    displayVinculos = [{ tipo: task.vinculoTipo, id: task.vinculoId, label: task.vinculoId }];
                }

                const displayResponsaveis = task.responsaveis && task.responsaveis.length > 0 
                    ? task.responsaveis 
                    : (task.responsavel ? [task.responsavel] : []);

                return (
                    <div className={`${bgColors[task.status]} rounded-lg shadow-sm border border-gray-200 dark:border-slate-600 p-4 border-l-4 ${priorityColors[task.prioridade] || 'border-l-gray-400'} hover:shadow-md transition cursor-pointer relative group`} onClick={() => openTaskModal(task)}>
                        <div className="flex justify-between items-start mb-2">
                            <h4 className="font-bold text-sm text-gray-800 dark:text-white leading-tight pr-6">{task.titulo}</h4>
                            <span className="text-xs font-bold text-gray-400 whitespace-nowrap">{task.dataLimite ? new Date(task.dataLimite).toLocaleDateString() : ''}</span>
                        </div>
                        
                        {displayResponsaveis.length > 0 && (
                            <div className="flex flex-wrap gap-1 mb-2">
                                {displayResponsaveis.map((resp, idx) => (
                                    <div key={idx} className="text-[10px] font-bold text-mercantil-blue dark:text-blue-300 bg-blue-100/50 dark:bg-slate-800 px-1.5 py-0.5 rounded flex items-center gap-1 border border-blue-200 dark:border-slate-600">
                                        <i className="fas fa-user-circle"></i> {resp}
                                    </div>
                                ))}
                            </div>
                        )}

                        <p className="text-xs text-gray-600 dark:text-gray-300 line-clamp-2 mb-3">{task.descricao}</p>
                        
                        {displayVinculos.length > 0 && (
                            <div className="flex flex-wrap gap-1 mb-3">
                                {displayVinculos.map((v, i) => (
                                    <span key={i} className="inline-flex items-center gap-1 px-2 py-1 bg-gray-100 dark:bg-slate-800 rounded text-[10px] font-bold text-gray-600 dark:text-gray-300">
                                        <i className="fas fa-link"></i> {v.tipo}: {String(v.label || v.id).substring(0,18)}
                                    </span>
                                ))}
                            </div>
                        )}

                        <div className="flex flex-wrap sm:flex-nowrap items-center gap-2 mt-auto" onClick={e => e.stopPropagation()}>
                            {task.status !== 'Pendente' && <button onClick={()=>changeStatus(task.id, 'Pendente')} className="w-full sm:flex-1 py-1 text-xs font-bold rounded border border-gray-300 dark:border-slate-500 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-600 transition-colors">Pendente</button>}
                            {task.status !== 'Em Andamento' && task.status !== 'Concluída' && <button onClick={()=>changeStatus(task.id, 'Em Andamento')} className="w-full sm:flex-1 py-1 text-xs font-bold rounded bg-mercantil-blue text-white hover:bg-blue-800 shadow-sm transition-colors">Iniciar</button>}
                            {task.status !== 'Concluída' && <button onClick={()=>changeStatus(task.id, 'Concluída')} className="w-full sm:flex-1 py-1 text-xs font-bold rounded bg-green-600 text-white hover:bg-green-700 shadow-sm transition-colors"><i className="fas fa-check"></i> Concluir</button>}
                        </div>
                        
                        <button onClick={(e)=>{e.stopPropagation(); deleteTask(task.id);}} className="absolute top-2 right-2 text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i className="fas fa-trash text-xs"></i></button>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full fade-in w-full">
                    <div className="p-5 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 rounded-t-xl w-full">
                        <div>
                            <h2 className="text-xl font-bold text-mercantil-dark dark:text-white flex items-center gap-3">
                                <div className="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-gray-200 dark:border-slate-700 flex items-center justify-center text-mercantil-orange shrink-0"><i className="fas fa-check-square"></i></div>
                                Gestão de Tarefas
                            </h2>
                            <p className="text-sm text-gray-500 mt-1">Quadro Kanban integrado com todas as áreas do ERP.</p>
                        </div>
                        <button onClick={() => openTaskModal()} className="w-full sm:w-auto bg-mercantil-blue hover:bg-blue-800 text-white px-5 py-2.5 rounded-lg font-bold transition shadow-sm flex items-center justify-center">
                            <i className="fas fa-plus mr-2"></i> Nova Tarefa
                        </button>
                    </div>

                    <div className="flex-1 overflow-x-auto p-6 bg-gray-100 dark:bg-slate-900 custom-scroll rounded-b-xl border border-t-0 border-gray-200 dark:border-slate-700 w-full">
                        <div className="flex gap-6 min-w-max h-full">
                            {['Pendente', 'Em Andamento', 'Concluída'].map(coluna => {
                                const columnTasks = tarefas.filter(t => t.status === coluna);
                                return (
                                    <div key={coluna} className="w-80 flex flex-col h-full">
                                        <div className={`mb-3 pb-2 border-b-2 font-bold text-sm text-gray-600 dark:text-gray-300 flex justify-between items-center ${coluna === 'Pendente' ? 'border-gray-400' : coluna === 'Em Andamento' ? 'border-mercantil-blue' : 'border-green-500'}`}>
                                            <span className="uppercase tracking-wider">{coluna}</span>
                                            <span className="bg-white dark:bg-slate-800 text-xs px-2 py-1 rounded shadow-sm">{columnTasks.length}</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto space-y-3 custom-scroll pr-2 pb-4">
                                            {columnTasks.map(task => <TaskCard key={task.id} task={task} />)}
                                            {columnTasks.length === 0 && <div className="text-center p-4 text-xs font-medium text-gray-400 border border-dashed border-gray-300 dark:border-slate-700 rounded-lg">Nenhuma tarefa</div>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {modalData && (
                        <Modal title={modalData.id ? 'Editar Tarefa' : 'Nova Tarefa'} onClose={() => setModalData(null)}>
                            <form id="taskForm" onSubmit={handleSave} className="space-y-4">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="md:col-span-2">
                                        <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Título da Tarefa *</label>
                                        <input type="text" name="titulo" required defaultValue={modalData.titulo} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white" placeholder="O que precisa ser feito?" />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Descrição</label>
                                        <textarea name="descricao" rows="3" defaultValue={modalData.descricao} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white" placeholder="Detalhes da tarefa..."></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Status</label>
                                        <select name="status" defaultValue={modalData.status} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white">
                                            <option value="Pendente">Pendente</option>
                                            <option value="Em Andamento">Em Andamento</option>
                                            <option value="Concluída">Concluída</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Prioridade</label>
                                        <select name="prioridade" defaultValue={modalData.prioridade} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white">
                                            <option value="Baixa">Baixa</option>
                                            <option value="Média">Média</option>
                                            <option value="Alta">Alta</option>
                                        </select>
                                    </div>
                                    
                                    <div className="md:col-span-1">
                                        <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Responsáveis</label>
                                        {responsaveis.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mb-2 p-2 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg">
                                                {responsaveis.map((resp, idx) => (
                                                    <span key={idx} className="inline-flex items-center gap-1 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 text-mercantil-blue dark:text-blue-400 px-2 py-1 rounded text-xs font-bold shadow-sm">
                                                        <i className="fas fa-user-circle"></i> {resp}
                                                        <button type="button" onClick={() => setResponsaveis(responsaveis.filter((_, i) => i !== idx))} className="text-red-500 hover:text-red-700 ml-1 focus:outline-none transition"><i className="fas fa-times-circle"></i></button>
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                        <div className="flex gap-2">
                                            <input 
                                                type="text" 
                                                value={novoResponsavel}
                                                onChange={(e) => setNovoResponsavel(e.target.value)}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter') {
                                                        e.preventDefault();
                                                        addResponsavel();
                                                    }
                                                }}
                                                className="flex-1 w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white" 
                                                placeholder="Adicionar nome..." 
                                            />
                                            <button 
                                                type="button" 
                                                onClick={addResponsavel}
                                                disabled={!novoResponsavel.trim()}
                                                className="bg-mercantil-blue hover:bg-blue-800 disabled:bg-gray-400 disabled:dark:bg-slate-700 text-white px-3 py-2 rounded transition flex items-center justify-center shadow-sm"
                                            >
                                                <i className="fas fa-plus"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Prazo / Data Limite</label>
                                        <input type="date" name="dataLimite" defaultValue={modalData.dataLimite} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white" />
                                    </div>
                                    
                                    <div className="md:col-span-2 border-t border-gray-200 dark:border-slate-700 pt-5 mt-2">
                                        <h4 className="text-sm font-bold text-mercantil-blue dark:text-blue-400 mb-3"><i className="fas fa-link mr-2"></i>Vínculos Múltiplos com o Sistema (Opcional)</h4>
                                        
                                        {tempVinculos.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mb-4 p-3 bg-gray-50 dark:bg-slate-800 rounded-lg border border-gray-200 dark:border-slate-700">
                                                {tempVinculos.map((v, i) => (
                                                    <span key={i} className="inline-flex items-center gap-1 px-2 py-1 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded text-xs font-bold text-gray-700 dark:text-gray-200 shadow-sm">
                                                        <span className="text-mercantil-blue dark:text-blue-400">{v.tipo}:</span> {v.label}
                                                        <button type="button" onClick={() => removeVinculo(i)} className="ml-1 text-red-500 hover:text-red-700 focus:outline-none transition-colors" title="Remover Vínculo"><i className="fas fa-times-circle"></i></button>
                                                    </span>
                                                ))}
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end bg-gray-50 dark:bg-slate-800 p-3 rounded-lg border border-gray-200 dark:border-slate-700">
                                            <div className="md:col-span-4">
                                                <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Módulo / Área</label>
                                                <select value={currentVinculoTipo} onChange={(e) => { setCurrentVinculoTipo(e.target.value); setCurrentVinculoId(''); }} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm">
                                                    <option value="">Selecione uma área...</option>
                                                    <option value="Produtos">Produtos / Peças</option>
                                                    <option value="Kits">Kits</option>
                                                    <option value="CRM (Atendimentos)">CRM (Atendimentos)</option>
                                                    <option value="Devoluções">Devoluções</option>
                                                    <option value="Qualidade">Qualidade (NCs)</option>
                                                    <option value="Marketing">Marketing</option>
                                                    <option value="Fretes">Fretes</option>
                                                    <option value="Tarefas">Tarefas</option>
                                                    <option value="Notas">Notas</option>
                                                </select>
                                            </div>
                                            <div className="md:col-span-6">
                                                <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Registro Específico</label>
                                                <select value={currentVinculoId} onChange={(e) => setCurrentVinculoId(e.target.value)} disabled={!currentVinculoTipo} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm disabled:bg-gray-200 disabled:dark:bg-slate-700">
                                                    <option value="">{currentVinculoTipo ? 'Selecione o registro...' : 'Escolha a área primeiro'}</option>
                                                    {currentVinculoTipo && getGlobalLinkOptions(currentVinculoTipo, db).map(opt => (
                                                        <option key={opt.id} value={opt.id}>{opt.label}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div className="md:col-span-2">

        // --- COMPONENTE GESTÃO DE BLOCO DE NOTAS ---
        const NotasManager = ({ notas, setNotas, db, showToast }) => {
            const [modalData, setModalData] = useState(null);
            const [tempVinculos, setTempVinculos] = useState([]);
            const [currentVinculoTipo, setCurrentVinculoTipo] = useState('');

                    setModalData(nota);
                    setTempVinculos(nota.vinculos ? [...nota.vinculos] : []);

                    setModalData({ titulo: '', conteudo: '', cor: 'bg-yellow-100 dark:bg-yellow-900/30 border-yellow-200 dark:border-yellow-700' });

                setCurrentVinculoTipo('');
                setCurrentVinculoId('');

            const addVinculo = () => {
                if (!currentVinculoTipo || !currentVinculoId) return;
                const option = getGlobalLinkOptions(currentVinculoTipo, db).find(o => o.id === currentVinculoId);
                if (option) {
                    if (!tempVinculos.some(v => v.tipo === currentVinculoTipo && v.id === currentVinculoId)) {
                        setTempVinculos([...tempVinculos, { tipo: currentVinculoTipo, id: currentVinculoId, label: option.label }]);

                        showToast('Vínculo já adicionado a esta nota.', 'info');

                setCurrentVinculoId('');

            const removeVinculo = (index) => setTempVinculos(tempVinculos.filter((_, i) => i !== index));

            const handleSave = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                
                const newNota = {
                    ...data,
                    conteudo: modalData.conteudo,
                    id: modalData.id || `NOTA-${Date.now()}`,
                    dataCriacao: modalData.dataCriacao || new Date().toISOString(),
                    vinculos: tempVinculos
                };

                if (!newNota.titulo.trim() && !newNota.conteudo.trim()) {
                    showToast('A nota não pode ficar totalmente vazia.', 'error');
                    return;
                }

                if (modalData.id) {
                    setNotas(notas.map(n => n.id === modalData.id ? newNota : n));
                    showToast('Nota atualizada!');
                } else {
                    setNotas([newNota, ...notas]);
                    showToast('Nota criada com sucesso!');
                }
                setModalData(null);
            };

            const deleteNota = (id) => {
                if(window.confirm('Excluir esta nota permanentemente?')) {

            const NotaCard = ({ nota }) => {
                return (
                    <div className={`${nota.cor || 'bg-white dark:bg-slate-800'} rounded-lg shadow-sm border p-4 hover:shadow-md transition cursor-pointer relative group flex flex-col h-full w-full`} onClick={() => openNotaModal(nota)}>

                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 items-start w-full">
                                {notas.map(nota => <NotaCard key={nota.id} nota={nota} />)}
                            </div>

                    </div>

                    {modalData && (
                        <Modal title={modalData.id ? 'Editar Nota' : 'Nova Nota'} onClose={() => setModalData(null)}>
                            <form id="notaForm" onSubmit={handleSave} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Título</label>
                                    <input type="text" name="titulo" defaultValue={modalData.titulo} className="w-full border rounded-lg p-3 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white font-bold" placeholder="Assunto da nota..." />

                                            { value: 'bg-white dark:bg-slate-800 border-gray-200 dark:border-slate-600', color: 'bg-gray-100' },
                                            { value: 'bg-yellow-100 dark:bg-yellow-900/30 border-yellow-200 dark:border-yellow-700', color: 'bg-yellow-300' },

                                </div>
                                
                                <div className="border-t border-gray-200 dark:border-slate-700 pt-5 mt-2">

                                    {tempVinculos.length > 0 && (
                                        <div className="flex flex-wrap gap-2 mb-4 p-3 bg-gray-50 dark:bg-slate-800 rounded-lg border border-gray-200 dark:border-slate-700">
                                            {tempVinculos.map((v, i) => (
                                                <span key={i} className="inline-flex items-center gap-1 px-2 py-1 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded text-xs font-bold text-gray-700 dark:text-gray-200 shadow-sm">
                                                    <span className="text-mercantil-blue dark:text-blue-400">{v.tipo}:</span> {v.label}
                                                    <button type="button" onClick={() => removeVinculo(i)} className="ml-1 text-red-500 hover:text-red-700 focus:outline-none transition-colors" title="Remover Vínculo"><i className="fas fa-times-circle"></i></button>
                                                </span>
                                            ))}
                                        </div>
                                    )}

                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end bg-gray-50 dark:bg-slate-800 p-3 rounded-lg border border-gray-200 dark:border-slate-700">
                                        <div className="md:col-span-4">
                                            <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Módulo / Área</label>
                                            <select value={currentVinculoTipo} onChange={(e) => { setCurrentVinculoTipo(e.target.value); setCurrentVinculoId(''); }} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm">
                                                <option value="">Selecione uma área...</option>
                                                <option value="Produtos">Produtos / Peças</option>
                                                <option value="Kits">Kits</option>
                                                <option value="CRM (Atendimentos)">CRM (Atendimentos)</option>
                                                <option value="Devoluções">Devoluções</option>
                                                <option value="Qualidade">Qualidade (NCs)</option>
                                                <option value="Marketing">Marketing</option>
                                                <option value="Fretes">Fretes</option>
                                                <option value="Tarefas">Tarefas</option>
                                            </select>
                                        </div>
                                        <div className="md:col-span-6">
                                            <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Registro Específico</label>
                                            <select value={currentVinculoId} onChange={(e) => setCurrentVinculoId(e.target.value)} disabled={!currentVinculoTipo} className="w-full border rounded p-2 focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm disabled:bg-gray-200 disabled:dark:bg-slate-700">
                                                <option value="">{currentVinculoTipo ? 'Selecione o registro...' : 'Escolha a área primeiro'}</option>
                                                {currentVinculoTipo && getGlobalLinkOptions(currentVinculoTipo, db).map(opt => (
                                                    <option key={opt.id} value={opt.id}>{opt.label}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="md:col-span-2">
                                            <button type="button" onClick={addVinculo} disabled={!currentVinculoTipo || !currentVinculoId} className="w-full bg-mercantil-blue hover:bg-blue-800 disabled:bg-gray-400 disabled:dark:bg-slate-600 text-white p-2 rounded text-sm font-bold transition shadow-sm flex items-center justify-center">
                                                <i className="fas fa-plus mr-1"></i> Adicionar
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-6 mt-4 border-t border-gray-200 dark:border-slate-700 w-full">
                                    <button type="button" onClick={() => setModalData(null)} className="w-full sm:w-auto px-5 py-2 border border-gray-300 dark:border-slate-600 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition font-medium text-center">Cancelar</button>
                                    <button type="submit" className="w-full sm:w-auto px-6 py-2 bg-mercantil-orange text-white rounded-lg hover:bg-orange-700 shadow-md font-medium flex items-center justify-center transition text-center"><i className="fas fa-save mr-2"></i> Salvar Nota</button>
                                </div>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        const BaseManager = ({ title, icon, data, columns, formConfig, onSave, onDelete, onValidate, showToast, db }) => {
            const [editModal, setEditModal] = useState(null);
            const [search, setSearch] = useState('');
            
            const filtered = Array.isArray(data) ? data.filter(item => 
                item && typeof item === 'object' && Object.values(item).some(val => 
                    val !== null && val !== undefined && String(val).toLowerCase().includes(search.toLowerCase())
                )
            ) : [];

            const handleSave = (formData) => {
                if(onValidate && !onValidate(formData)) return;
                const finalData = { ...formData, id: formData.id || `ID-${Date.now()}-${Math.random().toString(36).substr(2,5)}` };
                onSave(finalData);
                setEditModal(null);
            };

            const handleExportCSV = () => {
                if (!data || data.length === 0) return showToast('Nenhum dado para exportar', 'error');
                const keysToExport = ['id', ...Array.from(new Set(data.flatMap(Object.keys))).filter(k => k !== 'id')];
                const csvContent = [
                    keysToExport.join(','),
                    ...data.map(item => keysToExport.map(k => {
                        let val = item[k];
                        if (Array.isArray(val)) val = JSON.stringify(val);
                        return `"${(val||'').toString().replace(/"/g, '""')}"`;
                    }).join(','))
                ].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${title.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                showToast('CSV exportado com sucesso!', 'success');
            };

            return (
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 flex flex-col h-full fade-in w-full overflow-hidden">
                    <div className="p-5 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 rounded-t-xl w-full">
                        <h2 className="text-xl font-bold text-mercantil-dark dark:text-white flex items-center gap-3">
                            <div className="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-gray-200 dark:border-slate-700 flex items-center justify-center text-mercantil-blue shrink-0"><i className={icon}></i></div>
                            <span className="truncate">{title}</span>
                        </h2>
                        <div className="flex flex-col sm:flex-row flex-wrap w-full lg:w-auto gap-3">
                            <div className="relative w-full sm:w-64">
                                <i className="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                                <input type="text" placeholder="Buscar registros..." className="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-800 dark:border-slate-600 dark:text-white text-sm" value={search} onChange={e=>setSearch(e.target.value)} />
                            </div>
                            <div className="flex flex-col sm:flex-row w-full sm:w-auto gap-3">
                                <button onClick={handleExportCSV} className="w-full sm:w-auto bg-green-600 hover:bg-green-800 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm flex items-center justify-center whitespace-nowrap text-sm">
                                    <i className="fas fa-file-csv mr-2"></i>Exportar CSV
                                </button>
                                <button onClick={() => setEditModal({})} className="w-full sm:w-auto bg-mercantil-blue hover:bg-blue-800 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm flex items-center justify-center whitespace-nowrap text-sm">
                                    <i className="fas fa-plus mr-2"></i>Novo
                                </button>
                            </div>
                        </div>
                    </div>
                    <div className="w-full overflow-x-auto custom-scroll flex-1 p-0">
                        <table className="w-full text-sm text-left dark:text-slate-300">
