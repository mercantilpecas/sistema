    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {

            theme: {

                    colors: {

    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        /* Fundos Globais Suaves */
        body { 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            background-attachment: fixed;
            color: #334155;
            -webkit-font-smoothing: antialiased;
        }
        html.dark body {
            background: linear-gradient(135deg, #0b1121 0%, #020617 100%);
            color: #cbd5e1;
        }

        /* Scrollbar iOS-like */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); }
        .dark ::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.6); }
        .dark ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.8); }

        /* Animações */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.7); 
            border: 1px solid rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            color: inherit;
        }
        .dark .glass-input {
            background: rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f8fafc;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
            outline: none;
        }
        .dark .glass-input:focus {
            background: rgba(15, 23, 42, 1);
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .table-input { width: 100%; padding: 6px 10px; font-size: 0.875rem; background-color: transparent; border-bottom: 1px solid transparent; transition: all 0.2s; border-radius: 6px; color: inherit; }
        .table-input:focus { border-color: #3b82f6; background: rgba(255,255,255,0.7); outline: none; }
        .dark .table-input:focus { background: rgba(30,41,59,0.9); border-color: #3b82f6; }
        
        .custom-scroll { overflow-y: auto; overflow-x: auto; }
        
        /* Editor de Texto Rico */
        .rich-editor-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-editor-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-editor-content a { color: #3b82f6; text-decoration: underline; }
        
        /* Captcha Visual */
        .captcha-box { background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px); }
        .dark .captcha-box { background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px); }

        .checkerboard {
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .dark .checkerboard {
            background-image: linear-gradient(45deg, #1e293b 25%, transparent 25%), linear-gradient(-45deg, #1e293b 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1e293b 75%), linear-gradient(-45deg, transparent 75%, #1e293b 75%);
        }
    </style>
</head>
<body class="transition-colors duration-300">
    
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: #1E3A8A; margin-bottom: 20px;"></i>
            <h2 style="margin: 0; font-size: 1.5rem; font-weight: 700;">Iniciando Mercantil ERP...</h2>
            <p style="margin-top: 10px; font-size: 0.9rem; opacity: 0.7;">Carregando módulos e autenticação...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- INICIALIZAÇÃO DO SUPABASE ---
        const supabaseUrl = 'https://binjojpmcobdwdfofwtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpbmpvanBtY29iZHdkZm9md3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTg5MzcsImV4cCI6MjA5NjU5NDkzN30.-GvQXCJqGZ9uyf2nmc84mnPImUuhmKYDbZaRGLGhcww';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- VALIDADORES E FORMATADORES DE CPF/CNPJ ---
        const isValidCPF = (cpf) => {
            cpf = cpf.replace(/[^\d]+/g,'');
            if(cpf == '' || cpf.length != 11 || /^(\d)\1{10}$/.test(cpf)) return false;
            let add = 0;
            for (let i=0; i < 9; i ++) add += parseInt(cpf.charAt(i)) * (10 - i);
            let rev = 11 - (add % 11);
            if (rev == 10 || rev == 11) rev = 0;
            if (rev != parseInt(cpf.charAt(9))) return false;
            add = 0;
            for (let i = 0; i < 10; i ++) add += parseInt(cpf.charAt(i)) * (11 - i);
            rev = 11 - (add % 11);
            if (rev == 10 || rev == 11) rev = 0;
            if (rev != parseInt(cpf.charAt(10))) return false;
            return true;
        };

        const isValidCNPJ = (cnpj) => {
            cnpj = cnpj.replace(/[^\d]+/g,'');
            if(cnpj == '' || cnpj.length != 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
            let tamanho = cnpj.length - 2;
            let numeros = cnpj.substring(0,tamanho);
            let digitos = cnpj.substring(tamanho);
            let soma = 0;
            let pos = tamanho - 7;
            for (let i = tamanho; i >= 1; i--) { soma += numeros.charAt(tamanho - i) * pos--; if (pos < 2) pos = 9; }
            let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
            if (resultado != digitos.charAt(0)) return false;
            tamanho = tamanho + 1;
            numeros = cnpj.substring(0,tamanho);
            soma = 0; pos = tamanho - 7;
            for (let i = tamanho; i >= 1; i--) { soma += numeros.charAt(tamanho - i) * pos--; if (pos < 2) pos = 9; }
            resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
            if (resultado != digitos.charAt(1)) return false;
            return true;
        };

        const formatCpfCnpj = (v) => {
            v = v.replace(/\D/g,"");
            if (v.length <= 11) {
                v = v.replace(/(\d{3})(\d)/,"$1.$2");
                v = v.replace(/(\d{3})(\d)/,"$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
            } else {
                v = v.replace(/^(\d{2})(\d)/,"$1.$2");
                v = v.replace(/^(\d{2})\.(\d{3})(\d)/,"$1.$2.$3");
                v = v.replace(/\.(\d{3})(\d)/,".$1/$2");
                v = v.replace(/(\d{4})(\d)/,"$1-$2");
            }
            return v.substring(0, 18);
        };

        // --- HOOK GENÉRICO PARA SUPABASE (Tabela `data`) ---
        function useLocalStorage(key, initialValue) {
            const isLocalOnly = key === 'mrc_theme_dark' || key === 'mrc_last_backup_time';
            const tipo = key.replace('mrc_', ''); 

            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return (!item || item === 'null' || item === 'undefined') ? initialValue : JSON.parse(item);
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                if (isLocalOnly) return;
                let isMounted = true;
                const fetchFromSupabase = async () => {
                    const { data, error } = await supabase.from('data').select('dados').eq('tipo', tipo);
                    if (!error && data && isMounted) {
                        setStoredValue(data.map(item => item.dados));
                    }
                };
                fetchFromSupabase();

                const channel = supabase.channel(`public:data:tipo=eq.${tipo}`)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'data', filter: `tipo=eq.${tipo}` }, () => { fetchFromSupabase(); })
                    .subscribe();

                return () => { isMounted = false; supabase.removeChannel(channel); };
            }, [tipo, isLocalOnly]);

            const setValue = async (value) => {
                try {
                    let valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));

                    if (isLocalOnly) return;

                    let sanitizedValue = valueToStore;
                    if (Array.isArray(valueToStore)) {
                        sanitizedValue = valueToStore.map((item, idx) => {
                            if (item && typeof item === 'object' && !item.id && !item.ID) {
                                return { ...item, id: `FIX-${Date.now()}-${Math.random().toString(36).substr(2, 5)}-${idx}` };
                            }
                            return item;
                        });
                    }

                    const oldValue = Array.isArray(storedValue) ? storedValue : [];
                    if (!Array.isArray(sanitizedValue)) return;

                    const newIds = new Set(sanitizedValue.map(v => String(v.id || v.ID)));
                    const deletedItems = oldValue.filter(v => !newIds.has(String(v.id || v.ID)));
                    const oldMap = new Map(oldValue.map(v => [String(v.id || v.ID), JSON.stringify(v)]));
                    const upsertData = [];
                    
                    for (let item of sanitizedValue) {
                        const id = String(item.id || item.ID);
                        const strItem = JSON.stringify(item);
                        if (oldMap.get(id) !== strItem) upsertData.push({ id, tipo, dados: item });
                    }

                    if (upsertData.length > 0) await supabase.from('data').upsert(upsertData);
                    for (let item of deletedItems) await supabase.from('data').delete().eq('id', String(item.id || item.ID)).eq('tipo', tipo);

                } catch (error) { console.error("Erro de sincronização genérica:", error); }
            };

            return [storedValue, setValue];
        }

        // --- UTILS ---
        const copyToClipboard = (text, showToast) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast(`Copiado: ${text}`, 'success')).catch(() => showToast('Erro ao copiar', 'error'));
            } else {
                try {
                    const textarea = document.createElement('textarea'); textarea.value = text; document.body.appendChild(textarea);
                    textarea.select(); document.execCommand('copy'); document.body.removeChild(textarea); showToast(`Copiado: ${text}`, 'success');
                } catch (err) { showToast('Erro ao copiar', 'error'); }
            }
        };

        const LogoMercantil = () => (
            <div className="relative flex items-center justify-center w-10 h-10 shrink-0">
                <img src="https://raw.githubusercontent.com/mercantil/logo/main/2.png" alt="Mercantil Logo" className="w-10 h-10 rounded-xl object-cover shadow-sm z-10 border-2 border-transparent"
                    onError={(e) => { e.target.style.display = 'none'; e.target.nextElementSibling.style.display = 'flex'; }} />
                <div style={{ display: 'none' }} className="absolute inset-0 rounded-xl bg-white text-mercantil-orange items-center justify-center font-extrabold text-xl shadow-md border-2 border-mercantil-orange z-0">M</div>
            </div>
        );

        // --- COMPONENTES: VALIDADORES E GERENCIADORES ESPECÍFICOS ---

        const CpfCnpjInput = ({ value, onChange, readOnly, required }) => {
            const [isValid, setIsValid] = useState(null);
            
            useEffect(() => {
                const cleanVal = (value || '').replace(/\D/g, '');
                if (cleanVal.length === 11) setIsValid(isValidCPF(cleanVal));
                else if (cleanVal.length === 14) setIsValid(isValidCNPJ(cleanVal));
                else setIsValid(cleanVal.length === 0 ? null : false);
            }, [value]);

            const handleChange = (e) => {
                const formatted = formatCpfCnpj(e.target.value);
                onChange(formatted);
            };

            return (
                <div className="relative w-full">
                    <input 
                        type="text" 
                        value={value || ''} 
                        onChange={handleChange} 
                        readOnly={readOnly} 
                        required={required} 
                        className={`w-full rounded-xl p-3 text-sm glass-input pr-10 read-only:opacity-80 transition-all ${isValid === false && value ? 'border-red-500 focus:ring-red-500 ring-1 ring-red-500/50' : ''} ${isValid === true ? 'border-green-500 focus:ring-green-500 ring-1 ring-green-500/50' : ''}`} 
                        placeholder="000.000.000-00 ou 00.000.000/0000-00" 
                    />
                    <div className="absolute right-3 top-1/2 transform -translate-y-1/2 text-lg">
                        {isValid === true && <i className="fas fa-check-circle text-green-500"></i>}
                        {isValid === false && value && <i className="fas fa-times-circle text-red-500"></i>}
                    </div>
                </div>
            );
        };

        const ContactManager = ({ value = [], onChange, readOnly }) => {
            const [tipo, setTipo] = useState('Telefone');
            const [contato, setContato] = useState('');

            const handleAdd = () => {
                if (!contato.trim()) return;
                onChange([...(Array.isArray(value) ? value : []), { tipo, valor: contato }]);
                setContato('');
            };
            const handleRemove = (idx) => {
                onChange((Array.isArray(value) ? value : []).filter((_, i) => i !== idx));
            };

            return (
                <div className="border border-gray-300 dark:border-slate-600 rounded-2xl p-4 bg-black/5 dark:bg-slate-800/50 shadow-inner mt-1 w-full">
                    <div className="flex flex-wrap gap-2 mb-3">
                        {(Array.isArray(value) ? value : []).map((v, i) => (
                            <span key={i} className="inline-flex items-center gap-2 px-3 py-1.5 glass-panel rounded-xl text-xs font-bold shadow-sm transition">
                                <span className={v.tipo === 'Telefone' ? 'text-green-600 dark:text-green-400' : 'text-blue-600 dark:text-blue-400'}>
                                    <i className={v.tipo === 'Telefone' ? 'fas fa-phone-alt mr-1' : 'fas fa-envelope mr-1'}></i>{v.tipo}:
                                </span>
                                <span>{v.valor}</span>
                                {!readOnly && <button type="button" onClick={() => handleRemove(i)} className="text-red-500 hover:text-red-700 transition ml-1"><i className="fas fa-times-circle"></i></button>}
                            </span>
                        ))}
                        {(Array.isArray(value) ? value : []).length === 0 && <span className="text-xs text-gray-500 dark:text-gray-400 italic">Nenhum contato adicionado.</span>}
                    </div>
                    {!readOnly && (
                        <div className="flex flex-col sm:flex-row gap-2 items-end mt-2 pt-3 border-t border-black/5 dark:border-white/5">
                            <div className="w-full sm:w-1/3">
                                <label className="block text-xs font-bold mb-1 opacity-70">Tipo de Contato</label>
                                <select value={tipo} onChange={e => setTipo(e.target.value)} className="w-full rounded-xl p-2.5 text-sm glass-input">
                                    <option value="Telefone">Telefone/Celular</option>
                                    <option value="E-mail">E-mail</option>
                                </select>
                            </div>
                            <div className="w-full sm:flex-1">
                                <label className="block text-xs font-bold mb-1 opacity-70">Dado / Valor</label>
                                <input type="text" value={contato} onChange={e => setContato(e.target.value)} className="w-full rounded-xl p-2.5 text-sm glass-input" placeholder={tipo === 'Telefone' ? '(00) 00000-0000' : 'email@exemplo.com'} />
                            </div>
                            <button type="button" onClick={handleAdd} disabled={!contato} className="w-full sm:w-auto bg-mercantil-blue text-white px-5 rounded-xl hover:bg-blue-800 disabled:opacity-50 transition shadow h-[42px] flex items-center justify-center transform hover:scale-[1.02]">
                                <i className="fas fa-plus"></i>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- COMPONENTE: HISTÓRICO DE LOGS (CRM) ---
        const HistoryLogManager = ({ value = [], onChange, authContext, readOnly }) => {
            const [newText, setNewText] = useState('');
            const [isFetching, setIsFetching] = useState(false);
            const { isSuperAdmin, currentUser } = authContext || {};

            const handleAdd = async () => {
                if (!newText.trim()) return;
                setIsFetching(true);
                let dateIso = new Date().toISOString();
                try {
                    const res = await fetch('http://worldtimeapi.org/api/timezone/America/Sao_Paulo');
                    if (res.ok) { const json = await res.json(); dateIso = json.datetime; }
                } catch(e) { console.warn("Horário mundial indisponível, usando fallback local."); }
                
                const newItem = { id: `log-${Date.now()}`, date: dateIso, author: currentUser?.nome || 'Usuário', text: newText.trim() };
                onChange([...(Array.isArray(value) ? value : []), newItem]);
                setNewText('');
                setIsFetching(false);
            };

            const handleDelete = (id) => {
                if(window.confirm('Excluir esta observação do histórico?')) {
                    onChange((Array.isArray(value) ? value : []).filter(v => v.id !== id));
                }
            };

            return (
                <div className="border border-gray-300 dark:border-slate-600 rounded-2xl p-4 bg-black/5 dark:bg-slate-800/50 shadow-inner mt-1 w-full">
                    <div className="flex flex-col gap-3 mb-4 max-h-64 overflow-y-auto custom-scroll pr-2">
                        {(Array.isArray(value) ? value : []).map((log, i) => {
                            const isMe = log.author === currentUser?.nome;
                            return (
                                <div key={log.id || i} className={`p-3 rounded-xl shadow-sm border relative group transition-colors ${isMe ? 'bg-blue-50/50 dark:bg-blue-900/20 border-blue-100 dark:border-blue-800' : 'bg-white dark:bg-slate-700 border-black/5 dark:border-white/5'}`}>
                                    <div className="flex justify-between items-start mb-1.5">
                                        <span className={`text-xs font-bold ${isMe ? 'text-mercantil-blue dark:text-blue-400' : 'text-slate-600 dark:text-slate-300'}`}><i className="fas fa-user-circle mr-1"></i> {log.author}</span>
                                        <span className="text-[10px] font-mono opacity-60 bg-black/5 dark:bg-white/10 px-2 py-0.5 rounded-full">{new Date(log.date).toLocaleString('pt-BR')}</span>
                                    </div>
                                    <p className="text-sm whitespace-pre-wrap font-medium opacity-90 leading-relaxed">{log.text}</p>
                                    {isSuperAdmin && (
                                        <button type="button" onClick={() => handleDelete(log.id)} className="absolute top-2 right-2 w-7 h-7 bg-red-100 hover:bg-red-200 text-red-600 rounded-full opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center shadow-sm">
                                            <i className="fas fa-trash text-xs"></i>
                                        </button>
                                    )}
                                </div>
                            );
                        })}
                        {(Array.isArray(value) ? value : []).length === 0 && <div className="text-xs text-gray-500 dark:text-gray-400 italic text-center py-4 opacity-70 border-2 border-dashed border-gray-300 dark:border-slate-600 rounded-xl">Nenhuma observação registrada neste histórico.</div>}
                    </div>
                    
                    {!readOnly && (
                        <div className="flex flex-col gap-2 border-t border-black/10 dark:border-white/10 pt-4">
                            <label className="text-xs font-bold opacity-70 uppercase tracking-wider ml-1">Nova Inserção no Log</label>
                            <textarea value={newText} onChange={e=>setNewText(e.target.value)} placeholder="Detalhe a atualização ou comentário..." className="w-full rounded-xl p-3 text-sm glass-input" rows="2" />
                            <button type="button" onClick={handleAdd} disabled={!newText.trim() || isFetching} className="self-end bg-mercantil-blue text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-blue-800 disabled:opacity-50 transition-all transform hover:scale-[1.02] flex items-center">
                                {isFetching ? <i className="fas fa-spinner fa-spin mr-2"></i> : <i className="fas fa-plus-circle mr-2"></i>} Adicionar ao Histórico
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- COMPONENTE: EDITOR DE TEXTO RICO ---
        const RichTextEditor = ({ value, onChange, placeholder, readOnly }) => {
            const editorRef = useRef(null);
            const [showEmojis, setShowEmojis] = useState(false);

            useEffect(() => { if (editorRef.current && value !== editorRef.current.innerHTML && document.activeElement !== editorRef.current) editorRef.current.innerHTML = value || ''; }, [value]);
            const handleInput = () => { if (editorRef.current && !readOnly) onChange(editorRef.current.innerHTML); };
            const execCmd = (cmd, arg = null) => { if(readOnly) return; document.execCommand(cmd, false, arg); if (editorRef.current) editorRef.current.focus(); handleInput(); };
            const insertEmoji = (emoji) => { if(readOnly) return; execCmd('insertText', emoji); };

            return (
                <div className={`border border-gray-300 dark:border-slate-600 rounded-2xl overflow-visible flex flex-col transition-all glass-input ${readOnly ? 'opacity-90 bg-white/50 dark:bg-slate-800/50' : 'focus-within:ring-2 focus-within:ring-mercantil-light'}`}>
                    {!readOnly && (
                        <div className="bg-black/5 dark:bg-white/5 border-b border-gray-300 dark:border-slate-600 p-2 flex gap-1 flex-wrap items-center relative rounded-t-2xl">
                            <button type="button" onClick={() => execCmd('bold')} className="p-1.5 px-2.5 hover:bg-black/10 dark:hover:bg-white/10 rounded-lg transition"><i className="fas fa-bold"></i></button>
                            <button type="button" onClick={() => execCmd('italic')} className="p-1.5 px-2.5 hover:bg-black/10 dark:hover:bg-white/10 rounded-lg transition"><i className="fas fa-italic"></i></button>
                            <button type="button" onClick={() => execCmd('underline')} className="p-1.5 px-2.5 hover:bg-black/10 dark:hover:bg-white/10 rounded-lg transition"><i className="fas fa-underline"></i></button>
                            <div className="w-px h-5 bg-gray-300 dark:bg-slate-600 mx-1"></div>
                            <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-1.5 px-2.5 hover:bg-black/10 dark:hover:bg-white/10 rounded-lg transition" title="Lista"><i className="fas fa-list-ul"></i></button>
                            <button type="button" onClick={() => execCmd('insertOrderedList')} className="p-1.5 px-2.5 hover:bg-black/10 dark:hover:bg-white/10 rounded-lg transition" title="Lista Numerada"><i className="fas fa-list-ol"></i></button>
                            <div className="w-px h-5 bg-gray-300 dark:bg-slate-600 mx-1"></div>
                            <div className="relative">
                                <button type="button" onClick={() => setShowEmojis(!showEmojis)} className="p-1.5 px-2.5 hover:bg-black/10 dark:hover:bg-white/10 rounded-lg transition text-base" title="Emojis">😀</button>
                                {showEmojis && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setShowEmojis(false)}></div>
                                        <div className="absolute top-full left-0 mt-1 w-72 p-3 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-600 rounded-2xl shadow-2xl z-50 grid grid-cols-8 gap-1.5 max-h-56 overflow-y-auto custom-scroll fade-in">
                                            {emojis.map(e => <button type="button" key={e} onClick={() => { insertEmoji(e); setShowEmojis(false); }} className="hover:bg-black/10 dark:hover:bg-white/10 rounded-lg p-1 text-xl transition-transform hover:scale-110">{e}</button>)}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                    <div 
                        ref={editorRef} contentEditable={!readOnly} onInput={handleInput} onBlur={handleInput} data-placeholder={placeholder}
                        className={`p-4 min-h-[150px] outline-none text-sm rich-editor-content empty:before:content-[attr(data-placeholder)] empty:before:text-gray-400 ${readOnly ? 'cursor-default rounded-2xl' : 'rounded-b-2xl'}`}
                    />
                </div>
            );
        };

        // --- COMPONENTE: VÍNCULOS COMERCIAIS ---
        const ItensVinculadosManager = ({ value = [], onChange, produtosOptions = [], kitsOptions = [], readOnly }) => {
            const [tipo, setTipo] = useState('Produto');
            const [selecionado, setSelecionado] = useState('');
            const [qtd, setQtd] = useState(1);

            const handleAdd = () => { if (!selecionado || qtd <= 0) return; onChange([...(Array.isArray(value) ? value : []), { tipo, item: selecionado, qtd }]); setSelecionado(''); setQtd(1); };
            const handleRemove = (idx) => { onChange((Array.isArray(value) ? value : []).filter((_, i) => i !== idx)); };

            return (
                <div className="border border-gray-300 dark:border-slate-600 rounded-2xl p-4 bg-black/5 dark:bg-slate-800/50 shadow-inner mt-1">
                    <div className="flex flex-wrap gap-2 mb-3">
                        {(Array.isArray(value) ? value : []).map((v, i) => (
                            <span key={i} className="inline-flex items-center gap-2 px-3 py-1.5 glass-panel rounded-xl text-xs font-bold shadow-sm transition">
                                <span className={v.tipo === 'Produto' ? 'text-mercantil-light' : 'text-mercantil-orange'}>
                                    <i className={v.tipo === 'Produto' ? 'fas fa-box mr-1' : 'fas fa-boxes-stacked mr-1'}></i>{v.tipo}:
                                </span>
                                <span className="truncate max-w-[200px]" title={v.item}>{v.item}</span>
                                <span className="bg-black/10 dark:bg-white/10 px-2 py-0.5 rounded-lg">Qtd: {v.qtd}</span>
                                {!readOnly && <button type="button" onClick={() => handleRemove(i)} className="text-red-500 hover:text-red-700 transition ml-1"><i className="fas fa-times-circle"></i></button>}
                            </span>
                        ))}
                        {(Array.isArray(value) ? value : []).length === 0 && <span className="text-xs text-gray-500 dark:text-gray-400 italic">Nenhum item adicionado.</span>}
                    </div>
                    
                    {!readOnly && (
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end p-1">
                            <div className="md:col-span-3">
                                <label className="block text-xs font-bold mb-1 opacity-70">Tipo de Item</label>
                                <select value={tipo} onChange={e => {setTipo(e.target.value); setSelecionado('');}} className="w-full rounded-xl p-2.5 text-sm glass-input">
                                    <option value="Produto">Produto / Peça</option><option value="Kit">Kit Montado</option>
                                </select>
                            </div>
                            <div className="md:col-span-6">
                                <label className="block text-xs font-bold mb-1 opacity-70">Selecione o {tipo}</label>
                                <select value={selecionado} onChange={e => setSelecionado(e.target.value)} className="w-full rounded-xl p-2.5 text-sm glass-input">
                                    <option value="">Selecione na lista...</option>
                                    {(tipo === 'Produto' ? produtosOptions : kitsOptions).map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                                </select>
                            </div>
                            <div className="md:col-span-2">
                                <label className="block text-xs font-bold mb-1 opacity-70">Qtd</label>
                                <input type="number" min="1" value={qtd} onChange={e => setQtd(parseInt(e.target.value)||1)} className="w-full rounded-xl p-2.5 text-sm glass-input" />
                            </div>
                            <div className="md:col-span-1">
                                <button type="button" onClick={handleAdd} disabled={!selecionado} className="w-full bg-mercantil-blue text-white p-2.5 rounded-xl hover:bg-blue-800 disabled:opacity-50 transition shadow h-[42px] flex items-center justify-center transform hover:scale-[1.02]">
                                    <i className="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const getGlobalLinkOptions = (tipo, db) => {
            switch(tipo) {
                case 'Produtos': return (db.produtos||[]).filter(p=>p.SKU).map(p => ({ id: p.SKU, label: `${p.SKU} - ${p['Título']?.substring(0,30)}` }));
                case 'Kits': return (db.kits||[]).filter(k=>k.SKU).map(k => ({ id: k.SKU, label: `${k.SKU} - ${k['Título']?.substring(0,30)}` }));
                case 'CRM (Atendimentos)': return (db.atendimentos||[]).filter(a=>a.protocolo).map(a => ({ id: a.protocolo, label: `${a.protocolo} - ${a.cliente}` }));
                case 'Devoluções': return (db.devolucoes||[]).filter(d=>d.protocolo).map(d => ({ id: d.protocolo, label: `${d.protocolo} - ${d.cliente}` }));
                case 'Qualidade': return (db.qualidade||[]).filter(q=>q.data).map(q => ({ id: q.id, label: `NC: ${q.data} - ${q.tipo}` }));
                case 'Marketing': return (db.marketing||[]).filter(m=>m.data).map(m => ({ id: m.id, label: `Pauta: ${m.data} - ${m.plataforma}` }));
                case 'Fretes': return (db.fretes||[]).filter(f=>f.city).map(f => ({ id: f.id, label: `Frete: ${f.city} (${f.cepStart})` }));
                case 'Tarefas': return (db.tarefas||[]).filter(t=>t.titulo).map(t => ({ id: t.id, label: `Tarefa: ${t.titulo?.substring(0,30)}` }));
                case 'Notas': return (db.notas||[]).filter(n=>n.titulo).map(n => ({ id: n.id, label: `Nota: ${n.titulo?.substring(0,30)}` }));
                default: return [];
            }
        };

        const VinculosGlobaisManager = ({ value = [], onChange, db, readOnly }) => {
            const [tipo, setTipo] = useState('');
            const [selecionado, setSelecionado] = useState('');

            const handleAdd = () => {
                if (!tipo || !selecionado) return;
                const option = getGlobalLinkOptions(tipo, db).find(o => o.id === selecionado);
                if (option && !(Array.isArray(value)?value:[]).some(v => v.tipo === tipo && v.id === selecionado)) {
                    onChange([...(Array.isArray(value)?value:[]), { tipo, id: selecionado, label: option.label }]);
                }
                setSelecionado('');
            };

            return (
                <div className="border border-gray-300 dark:border-slate-600 rounded-2xl p-4 bg-black/5 dark:bg-slate-800/50 shadow-inner mt-1 w-full">
                    <div className="flex flex-wrap gap-2 mb-3">
                        {(Array.isArray(value) ? value : []).map((v, i) => (
                            <span key={i} className="inline-flex items-center gap-2 px-3 py-1.5 glass-panel rounded-xl text-xs font-bold shadow-sm transition">
                                <span className="text-mercantil-light"><i className="fas fa-link mr-1"></i>{v.tipo}:</span>
                                <span className="truncate max-w-[200px]" title={v.label || v.id}>{v.label || v.id}</span>
                                {!readOnly && <button type="button" onClick={() => onChange((Array.isArray(value)?value:[]).filter((_, idx) => idx !== i))} className="text-red-500 hover:text-red-700 transition ml-1"><i className="fas fa-times-circle"></i></button>}
                            </span>
                        ))}
                        {(Array.isArray(value) ? value : []).length === 0 && <span className="text-xs text-gray-500 dark:text-gray-400 italic">Nenhum vínculo adicionado.</span>}
                    </div>
                    
                    {!readOnly && (
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end p-1">
                            <div className="md:col-span-4">
                                <label className="block text-xs font-bold mb-1 opacity-70">Área / Módulo</label>
                                <select value={tipo} onChange={e => {setTipo(e.target.value); setSelecionado('');}} className="w-full rounded-xl p-2.5 text-sm glass-input">
                                    <option value="">Selecione a área...</option>
                                    {['Produtos', 'Kits', 'CRM (Atendimentos)', 'Devoluções', 'Qualidade', 'Tarefas', 'Notas', 'Marketing', 'Fretes'].map(o => <option key={o} value={o}>{o}</option>)}
                                </select>
                            </div>
                            <div className="md:col-span-6">
                                <label className="block text-xs font-bold mb-1 opacity-70">Registro Específico</label>
                                <select value={selecionado} onChange={e => setSelecionado(e.target.value)} disabled={!tipo} className="w-full rounded-xl p-2.5 text-sm glass-input disabled:opacity-50">
                                    <option value="">{tipo ? 'Selecione na lista...' : 'Escolha a área primeiro'}</option>
                                    {tipo && getGlobalLinkOptions(tipo, db).map((opt, i) => <option key={i} value={opt.id}>{opt.label}</option>)}
                                </select>
                            </div>
                            <div className="md:col-span-2">
                                <button type="button" onClick={handleAdd} disabled={!selecionado} className="w-full bg-mercantil-blue text-white p-2.5 rounded-xl hover:bg-blue-800 disabled:opacity-50 transition shadow h-[42px] flex items-center justify-center transform hover:scale-[1.02]">
                                    <i className="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- COMPONENTES UI COMPARTILHADOS ---
        const Modal = ({ title, children, onClose, onSave, extraButtons, readOnly }) => {
            const modalContent = (
                <div className="fixed inset-0 bg-slate-900/70 dark:bg-black/80 backdrop-blur-md flex items-start justify-center z-[9999] fade-in p-4 pt-10 sm:pt-16 overflow-y-auto">
                    <div className="bg-white dark:bg-slate-900 shadow-[0_0_50px_rgba(0,0,0,0.3)] rounded-3xl w-full max-w-4xl flex flex-col overflow-hidden relative border border-gray-200 dark:border-slate-700 m-auto">
                        <div className="flex justify-between items-center p-5 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900">
                            <h3 className="text-xl font-extrabold text-slate-800 dark:text-white">{title}</h3>
                            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="p-4 sm:p-6 overflow-y-auto flex-1 custom-scroll max-h-[75vh] bg-slate-50 dark:bg-slate-800/50">
                            {children}
                        </div>
                        <div className="p-4 sm:p-5 border-t border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 flex flex-col-reverse sm:flex-row justify-between items-center gap-3">
                            <div className="w-full sm:w-auto flex justify-center">{extraButtons}</div>
                            <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                                <button onClick={onClose} className="w-full sm:w-auto px-6 py-2.5 rounded-xl font-bold bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-white transition-colors text-center">Fechar</button>
                                {!readOnly && onSave && <button onClick={onSave} className="w-full sm:w-auto px-8 py-2.5 bg-gradient-to-r from-mercantil-orange to-orange-500 hover:from-orange-600 hover:to-orange-500 text-white rounded-xl shadow-lg font-bold transition-all transform hover:scale-[1.02] text-center">Salvar Alterações</button>}
                            </div>
                        </div>
                    </div>
                </div>
            );
            return ReactDOM.createPortal(modalContent, document.body);
        };

        const AutoForm = ({ config, initialData, onSave, onCancel, db, readOnly, authContext }) => {
            const [data, setData] = useState(() => {
                let initial = initialData || {};
                if (initial.descricao && (!initial.historico_obs || initial.historico_obs.length === 0)) {
                    initial = { ...initial, historico_obs: [{ id: `log-legacy-${Date.now()}`, date: initial.dataHoraOficial || new Date().toISOString(), author: 'Legado/Cliente', text: initial.descricao }] };
                    delete initial.descricao;
                }
                return initial;
            });
            return (
                <form onSubmit={e => { e.preventDefault(); if(!readOnly) onSave(data); }} className="space-y-5">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-5">
                        {config.map(f => {
                            const colClass = f.full ? 'col-span-1 md:col-span-4' : f.threeQuarters ? 'col-span-1 md:col-span-3' : f.half ? 'col-span-1 md:col-span-2' : 'col-span-1';
                            
                            return (
                                <div key={f.name} className={colClass}>
                                    <label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">{f.label}</label>
                                    
                                    {f.type === 'vinculos_comerciais' ? (
                                        <ItensVinculadosManager value={data[f.name]} onChange={v => setData({...data, [f.name]: v})} produtosOptions={f.produtos} kitsOptions={f.kits} readOnly={readOnly} />
                                    ) : f.type === 'vinculos_globais' ? (
                                        <VinculosGlobaisManager value={data[f.name]} onChange={v => setData({...data, [f.name]: v})} db={db} readOnly={readOnly} />
                                    ) : f.type === 'history_log' ? (
                                        <HistoryLogManager value={data[f.name]} onChange={v => setData({...data, [f.name]: v})} authContext={authContext} readOnly={readOnly} />
                                    ) : f.type === 'cpf_cnpj' ? (
                                        <CpfCnpjInput value={data[f.name]} onChange={v => setData({...data, [f.name]: v})} readOnly={f.readOnly || readOnly} required={f.required} />
                                    ) : f.type === 'contact_manager' ? (
                                        <ContactManager value={data[f.name]} onChange={v => setData({...data, [f.name]: v})} readOnly={f.readOnly || readOnly} />
                                    ) : (
                                        <div className="flex flex-col sm:flex-row gap-2 w-full">
                                            {f.type === 'select' ? (
                                                <select disabled={readOnly} required={f.required} className="w-full rounded-xl p-3 text-sm glass-input disabled:opacity-60" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})}>
                                                    <option value="">Selecione...</option>
                                                    {f.options && f.options.map((o, idx) => <option key={idx} value={o}>{o}</option>)}
                                                </select>
                                            ) : f.type === 'textarea' ? (
                                                <textarea readOnly={readOnly} required={f.required} className="w-full rounded-xl p-3 text-sm glass-input read-only:opacity-80" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})} rows="3" placeholder={f.placeholder || ''} />
                                            ) : (
                                                <input readOnly={f.readOnly || readOnly} required={f.required} type={f.type||'text'} min={f.min} step={f.step} className="w-full rounded-xl p-3 text-sm glass-input read-only:opacity-80" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})} placeholder={f.placeholder || ''} />
                                            )}
                                            {f.button && !readOnly && !data[f.name] && (
                                                <button type="button" onClick={() => f.action(setData)} className="w-full sm:w-auto bg-mercantil-blue text-white px-5 py-2.5 rounded-xl shadow-md hover:bg-blue-800 whitespace-nowrap text-sm font-bold flex items-center justify-center transition transform hover:scale-[1.02]">
                                                    <i className={`${f.icon || "fas fa-bolt"} mr-2`}></i> {f.button}
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    {!readOnly && (
                        <div className="hidden">
                            <button type="submit" id="hiddenSubmitBtn">Salvar</button>
                        </div>
                    )}
                </form>
            );
        };

        const BaseManager = ({ title, icon, data, columns, formConfig, onSave, onDelete, onValidate, showToast, db, readOnly, canDelete, authContext }) => {
            const [editModal, setEditModal] = useState(null);
            const [search, setSearch] = useState('');
            
            const filtered = Array.isArray(data) ? data.filter(item => 
                item && typeof item === 'object' && Object.values(item).some(val => 
                    val !== null && val !== undefined && String(val).toLowerCase().includes(search.toLowerCase())
                )
            ) : [];

            const handleSave = () => {
                if(readOnly) return;
                const formElement = document.getElementById('hiddenSubmitBtn');
                if (formElement) formElement.click();
            };

            const triggerSaveFlow = (formData) => {
                if(readOnly) return;
                if(onValidate && !onValidate(formData)) return;
                const finalData = { ...formData, id: formData.id || `ID-${Date.now()}-${Math.random().toString(36).substr(2,5)}` };
                onSave(finalData);
                setEditModal(null);
            };

            const handleExportCSV = () => {
                if (!data || data.length === 0) return showToast('Nenhum dado para exportar', 'error');
                const keysToExport = ['id', ...Array.from(new Set(data.flatMap(Object.keys))).filter(k => k !== 'id')];
                const csvContent = [keysToExport.join(','), ...data.map(item => keysToExport.map(k => { let val = item[k]; if (Array.isArray(val)) val = JSON.stringify(val); return `"${(val||'').toString().replace(/"/g, '""')}"`; }).join(','))].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `${title.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.csv`; link.click();
                showToast('CSV exportado com sucesso!', 'success');
            };

            return (
                <div className="glass-panel rounded-3xl shadow-sm flex flex-col h-full fade-in w-full overflow-hidden relative">
                    <div className="p-5 border-b border-black/5 dark:border-white/5 bg-white/40 dark:bg-black/20 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 w-full">
                        <h2 className="text-xl font-extrabold flex items-center gap-3">
                            <div className="w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-gray-200 dark:border-slate-700 flex items-center justify-center text-mercantil-blue shrink-0 text-xl"><i className={icon}></i></div>
                            <span className="truncate">{title}</span>
                        </h2>
                        <div className="flex flex-col sm:flex-row flex-wrap w-full lg:w-auto gap-3">
                            <div className="relative w-full sm:w-72">
                                <i className="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                                <input type="text" placeholder="Buscar registros..." className="w-full pl-11 pr-4 py-2.5 rounded-xl text-sm glass-input" value={search} onChange={e=>setSearch(e.target.value)} />
                            </div>
                            <div className="flex flex-col sm:flex-row w-full sm:w-auto gap-3">
                                <button onClick={handleExportCSV} className="w-full sm:w-auto bg-white/80 dark:bg-slate-800/80 hover:bg-white dark:hover:bg-slate-700 border border-gray-300 dark:border-slate-600 px-5 py-2.5 rounded-xl font-bold transition shadow-sm flex items-center justify-center whitespace-nowrap text-sm">
                                    <i className="fas fa-file-csv mr-2 text-green-600"></i>Exportar
                                </button>
                                {!readOnly && (
                                    <button onClick={() => setEditModal({})} className="w-full sm:w-auto bg-gradient-to-r from-mercantil-blue to-blue-600 hover:from-blue-700 hover:to-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md transform hover:scale-[1.02] transition-all flex items-center justify-center whitespace-nowrap text-sm">
                                        <i className="fas fa-plus mr-2"></i>Novo
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                    <div className="w-full overflow-x-auto custom-scroll flex-1 p-0">
                        <table className="w-full text-sm text-left">
                            <thead className="text-xs uppercase bg-black/5 dark:bg-white/5 font-extrabold tracking-wider">
                                <tr>
                                    {columns.map(c => <th key={c.field} className="px-6 py-4 whitespace-nowrap opacity-70">{c.header}</th>)}
                                    <th className="px-6 py-4 text-right whitespace-nowrap opacity-70">Ações</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-black/5 dark:divide-white/5">
                                {filtered.length === 0 ? <tr><td colSpan={columns.length + 1} className="text-center py-12 opacity-50 font-medium border-b border-black/5 dark:border-white/5">Nenhum registro encontrado.</td></tr> :
                                filtered.map((item, idx) => (
                                    <tr key={item.id || idx} className="hover:bg-black/5 dark:hover:bg-white/5 transition-colors group">
                                        {columns.map(c => (
                                            <td key={c.field} className="px-6 py-4 font-medium">
                                                {c.render ? c.render(item[c.field], item) : item[c.field] || '-'}
                                            </td>
                                        ))}
                                        <td className="px-6 py-4 text-right whitespace-nowrap">
                                            <button onClick={()=>setEditModal(item)} className="w-9 h-9 rounded-full bg-white dark:bg-slate-700 shadow-sm border border-gray-300 dark:border-slate-600 text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-600 mx-1 transition-all" title={readOnly ? "Visualizar" : "Editar"}>
                                                <i className={`fas ${readOnly ? 'fa-eye' : 'fa-edit'}`}></i>
                                            </button>
                                            {!readOnly && canDelete && (
                                                <button onClick={()=>{if(window.confirm('Excluir este registro?')) onDelete(item.id);}} className="w-9 h-9 rounded-full bg-white dark:bg-slate-700 shadow-sm border border-gray-300 dark:border-slate-600 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-slate-600 mx-1 transition-all" title="Excluir"><i className="fas fa-trash"></i></button>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editModal && (
                        <Modal title={editModal.id ? `${readOnly ? 'Visualizar' : 'Editar'}: ${title}` : `Novo Registro: ${title}`} onClose={()=>setEditModal(null)} onSave={readOnly ? undefined : handleSave} readOnly={readOnly}>
                            <AutoForm config={formConfig} initialData={editModal} onSave={triggerSaveFlow} onCancel={()=>setEditModal(null)} db={db} readOnly={readOnly} authContext={authContext} />
                        </Modal>
                    )}
                </div>
            );
        };

        // --- COMPONENTE GESTÃO DE TAREFAS (KANBAN) ---
        const TarefasManager = ({ tarefas, setTarefas, db, showToast, authContext, usuarios }) => {
            const [modalData, setModalData] = useState(null);
            const [tempVinculos, setTempVinculos] = useState([]);
            const [currentVinculoTipo, setCurrentVinculoTipo] = useState('');
            const [currentVinculoId, setCurrentVinculoId] = useState('');
            const [responsaveis, setResponsaveis] = useState([]);
            const [novoResponsavel, setNovoResponsavel] = useState('');

            const { currentUser, isSuperAdmin } = authContext;

            const visibleTarefas = tarefas.filter(t => 
                isSuperAdmin || 
                t.createdBy === currentUser.username || 
                (t.responsaveis && t.responsaveis.includes(currentUser.username))
            );

            const openTaskModal = (task = null, canModify = true) => {
                if (task) {
                    setModalData({ ...task, _modalReadOnly: !canModify });
                    setTempVinculos(task.vinculos ? [...task.vinculos] : []);
                    setResponsaveis(Array.isArray(task.responsaveis) ? [...task.responsaveis] : (task.responsavel ? [task.responsavel] : []));
                } else {
                    setModalData({ status: 'Pendente', prioridade: 'Média', _modalReadOnly: false });
                    setTempVinculos([]); setResponsaveis([]);
                }
                setCurrentVinculoTipo(''); setCurrentVinculoId(''); setNovoResponsavel('');
            };

            const addVinculo = () => {
                if (!currentVinculoTipo || !currentVinculoId) return;
                const option = getGlobalLinkOptions(currentVinculoTipo, db).find(o => o.id === currentVinculoId);
                if (option && !tempVinculos.some(v => v.tipo === currentVinculoTipo && v.id === currentVinculoId)) setTempVinculos([...tempVinculos, { tipo: currentVinculoTipo, id: currentVinculoId, label: option.label }]);
                setCurrentVinculoId('');
            };

            const addResponsavel = () => {
                if (novoResponsavel && !responsaveis.includes(novoResponsavel)) { 
                    setResponsaveis([...responsaveis, novoResponsavel]); 
                    setNovoResponsavel(''); 
                }
            };

            const handleSave = (e) => {
                e.preventDefault(); if(modalData._modalReadOnly) return;
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const newTask = { ...data, id: modalData.id || `TRF-${Date.now()}`, dataCriacao: modalData.dataCriacao || new Date().toISOString(), createdBy: modalData.createdBy || currentUser.username, vinculos: tempVinculos, responsaveis: responsaveis };
                if (modalData.id) { setTarefas(tarefas.map(t => t.id === modalData.id ? newTask : t)); showToast('Tarefa atualizada!'); } 
                else { setTarefas([newTask, ...tarefas]); showToast('Nova tarefa criada!'); }
                setModalData(null);
            };

            const changeStatus = (id, newStatus) => {
                setTarefas(tarefas.map(t => t.id === id ? { ...t, status: newStatus } : t));
                if(newStatus === 'Concluída') showToast('Tarefa concluída!', 'success');
            };

            const TaskCard = ({ task }) => {
                const isOwner = task.createdBy === currentUser.username;
                const isAssigned = task.responsaveis && task.responsaveis.includes(currentUser.username);
                const canModify = isSuperAdmin || isOwner || isAssigned;
                const canDelete = isSuperAdmin || isOwner;
                
                const priorityColors = { 'Alta': 'border-red-500', 'Média': 'border-mercantil-orange', 'Baixa': 'border-mercantil-light' };
                const bgColors = { 'Pendente': 'bg-white/80 dark:bg-slate-800/80', 'Em Andamento': 'bg-blue-50/80 dark:bg-blue-900/40', 'Concluída': 'bg-gray-50/50 dark:bg-slate-900/50 opacity-70' };
                return (
                    <div className={`${bgColors[task.status]} rounded-2xl shadow-sm border border-l-[6px] border-black/5 dark:border-white/5 ${priorityColors[task.prioridade] || 'border-l-gray-400'} p-4 hover:shadow-md transition-all cursor-pointer relative group backdrop-blur-sm`} onClick={() => openTaskModal(task, canModify)}>
                        <div className="flex justify-between items-start mb-2">
                            <h4 className="font-extrabold text-sm leading-tight pr-6 text-slate-800 dark:text-slate-100">{task.titulo}</h4>
                            <span className="text-[10px] font-bold opacity-50 whitespace-nowrap bg-black/5 dark:bg-white/10 px-2 py-0.5 rounded-full">{task.dataLimite ? new Date(task.dataLimite).toLocaleDateString() : ''}</span>
                        </div>
                        {(task.responsaveis || []).length > 0 && (
                            <div className="flex flex-wrap gap-1 mb-2">
                                {(task.responsaveis || []).map((resp, idx) => (
                                    <div key={idx} className="text-[10px] font-bold text-mercantil-blue dark:text-blue-300 bg-blue-100/50 dark:bg-blue-900/40 px-2 py-0.5 rounded-md flex items-center gap-1"><i className="fas fa-user-circle"></i> @{resp}</div>
                                ))}
                            </div>
                        )}
                        <p className="text-xs opacity-70 line-clamp-2 mb-3 font-medium">{task.descricao}</p>
                        {(task.vinculos || []).length > 0 && (
                            <div className="flex flex-wrap gap-1 mb-3">
                                {task.vinculos.map((v, i) => (
                                    <span key={i} className="inline-flex items-center gap-1 px-2 py-1 bg-black/5 dark:bg-white/10 rounded-md text-[10px] font-bold">
                                        <i className="fas fa-link opacity-70"></i> {String(v.label || v.id).substring(0,18)}
                                    </span>
                                ))}
                            </div>
                        )}
                        <div className="flex justify-between items-center mt-auto">
                            {task.createdBy && <span className="text-[9px] font-mono opacity-50">Por: @{task.createdBy}</span>}
                            {canModify && (
                                <div className="flex items-center gap-2 ml-auto" onClick={e => e.stopPropagation()}>
                                    {task.status !== 'Pendente' && <button onClick={()=>changeStatus(task.id, 'Pendente')} className="px-3 py-1.5 text-xs font-bold rounded-lg border border-gray-300 dark:border-slate-600 hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Pendente</button>}
                                    {task.status !== 'Em Andamento' && task.status !== 'Concluída' && <button onClick={()=>changeStatus(task.id, 'Em Andamento')} className="px-3 py-1.5 text-xs font-bold rounded-lg bg-mercantil-blue text-white shadow-sm hover:bg-blue-800 transition-colors">Iniciar</button>}
                                    {task.status !== 'Concluída' && <button onClick={()=>changeStatus(task.id, 'Concluída')} className="px-3 py-1.5 text-xs font-bold rounded-lg bg-green-500 text-white shadow-sm hover:bg-green-600 transition-colors"><i className="fas fa-check"></i> Concluir</button>}
                                </div>
                            )}
                        </div>
                        {canDelete && <button onClick={(e)=>{e.stopPropagation(); if(window.confirm('Excluir esta tarefa definitivamente?')) setTarefas(tarefas.filter(t=>t.id!==task.id));}} className="absolute top-2 right-2 w-7 h-7 flex items-center justify-center rounded-full bg-red-100 text-red-500 opacity-0 group-hover:opacity-100 transition-all shadow-sm"><i className="fas fa-trash text-xs"></i></button>}
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full fade-in w-full">
                    <div className="glass-panel p-5 rounded-t-3xl border-b border-black/5 dark:border-white/5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 w-full">
                        <h2 className="text-xl font-extrabold flex items-center gap-3">
                            <div className="w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-gray-200 dark:border-slate-700 flex items-center justify-center text-mercantil-orange shrink-0"><i className="fas fa-check-square"></i></div>
                            Gestão de Tarefas
                        </h2>
                        <button onClick={() => openTaskModal()} className="w-full sm:w-auto bg-gradient-to-r from-mercantil-blue to-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transform hover:scale-[1.02] transition-all flex items-center justify-center"><i className="fas fa-plus mr-2"></i> Nova Tarefa</button>
                    </div>
                    <div className="flex-1 overflow-x-auto p-6 bg-black/5 dark:bg-black/20 custom-scroll rounded-b-3xl border border-t-0 border-black/5 dark:border-white/5 w-full">
                        <div className="flex gap-6 min-w-max h-full">
                            {['Pendente', 'Em Andamento', 'Concluída'].map(coluna => {
                                const columnTasks = visibleTarefas.filter(t => t.status === coluna);
                                return (
                                    <div key={coluna} className="w-80 flex flex-col h-full">
                                        <div className={`mb-4 pb-3 border-b-2 font-extrabold text-sm flex justify-between items-center ${coluna === 'Pendente' ? 'border-gray-400' : coluna === 'Em Andamento' ? 'border-mercantil-blue' : 'border-green-500'}`}>
                                            <span className="uppercase tracking-wider">{coluna}</span>
                                            <span className="bg-white dark:bg-slate-800 text-xs px-2.5 py-1 rounded-lg shadow-sm border border-black/5 dark:border-white/5">{columnTasks.length}</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto space-y-4 custom-scroll pr-2 pb-4">
                                            {columnTasks.map(task => <TaskCard key={task.id} task={task} />)}
                                            {columnTasks.length === 0 && <div className="text-center p-6 text-sm font-medium opacity-50 border-2 border-dashed border-black/10 dark:border-white/10 rounded-2xl">Nenhuma tarefa</div>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    {modalData && (
                        <Modal title={modalData.id ? (modalData._modalReadOnly ? 'Visualizar Tarefa' : 'Editar Tarefa') : 'Nova Tarefa'} onClose={() => setModalData(null)} onSave={modalData._modalReadOnly ? undefined : () => { const form = document.getElementById('taskForm'); if(form) form.requestSubmit(); }} readOnly={modalData._modalReadOnly}>
                            <form id="taskForm" onSubmit={handleSave} className="space-y-5">
                                {modalData._modalReadOnly && <div className="bg-yellow-50 border border-yellow-200 text-yellow-800 p-3 rounded-xl text-xs font-bold"><i className="fas fa-lock mr-2"></i> Você não pode alterar tarefas onde não está vinculado ou é o proprietário.</div>}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div className="md:col-span-2">
                                        <label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Título da Tarefa *</label>
                                        <input type="text" name="titulo" readOnly={modalData._modalReadOnly} required defaultValue={modalData.titulo} className="w-full rounded-xl p-3 text-sm glass-input read-only:opacity-80" />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Descrição</label>
                                        <textarea name="descricao" rows="3" readOnly={modalData._modalReadOnly} defaultValue={modalData.descricao} className="w-full rounded-xl p-3 text-sm glass-input read-only:opacity-80"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Status</label>
                                        <select name="status" disabled={modalData._modalReadOnly} defaultValue={modalData.status} className="w-full rounded-xl p-3 text-sm glass-input disabled:opacity-60"><option value="Pendente">Pendente</option><option value="Em Andamento">Em Andamento</option><option value="Concluída">Concluída</option></select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Prioridade</label>
                                        <select name="prioridade" disabled={modalData._modalReadOnly} defaultValue={modalData.prioridade} className="w-full rounded-xl p-3 text-sm glass-input disabled:opacity-60"><option value="Baixa">Baixa</option><option value="Média">Média</option><option value="Alta">Alta</option></select>
                                    </div>
                                    <div className="md:col-span-1">
                                        <label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Usuários Vinculados</label>
                                        {responsaveis.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mb-2 p-2 bg-white/50 dark:bg-slate-800/50 rounded-xl border border-gray-200 dark:border-slate-700">
                                                {responsaveis.map((resp, idx) => (
                                                    <span key={idx} className="inline-flex items-center gap-1 bg-white dark:bg-slate-700 border border-black/5 dark:border-white/5 text-mercantil-blue dark:text-blue-400 px-2.5 py-1 rounded-lg text-xs font-bold shadow-sm">
                                                        <i className="fas fa-user-circle"></i> @{resp}
                                                        {!modalData._modalReadOnly && <button type="button" onClick={() => setResponsaveis(responsaveis.filter((_, i) => i !== idx))} className="text-red-500 hover:text-red-700 ml-1 focus:outline-none"><i className="fas fa-times-circle"></i></button>}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                        {!modalData._modalReadOnly && (
                                            <div className="flex gap-2">
                                                <select value={novoResponsavel} onChange={(e) => setNovoResponsavel(e.target.value)} className="flex-1 w-full rounded-xl p-3 text-sm glass-input">
                                                    <option value="">Selecione para vincular...</option>
                                                    {(usuarios || []).map(u => <option key={u.id} value={u.username}>{u.nome} (@{u.username})</option>)}
                                                </select>
                                                <button type="button" onClick={addResponsavel} disabled={!novoResponsavel} className="bg-mercantil-blue disabled:opacity-50 text-white px-4 rounded-xl shadow-md transition-all"><i className="fas fa-plus"></i></button>
                                            </div>
                                        )}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Prazo / Data Limite</label>
                                        <input type="date" name="dataLimite" readOnly={modalData._modalReadOnly} defaultValue={modalData.dataLimite} className="w-full rounded-xl p-3 text-sm glass-input read-only:opacity-80" />
                                    </div>
                                    <div className="md:col-span-2 border-t border-black/5 dark:border-white/5 pt-5 mt-2">
                                        <h4 className="text-sm font-extrabold mb-3 opacity-80"><i className="fas fa-link mr-2"></i>Vínculos Extras</h4>
                                        {tempVinculos.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mb-4 p-3 bg-white/50 dark:bg-slate-800/50 rounded-xl border border-gray-200 dark:border-slate-700">
                                                {tempVinculos.map((v, i) => (
                                                    <span key={i} className="inline-flex items-center gap-1 px-3 py-1.5 bg-white dark:bg-slate-700 border border-black/5 dark:border-white/5 rounded-lg text-xs font-bold shadow-sm">
                                                        <span className="text-mercantil-blue dark:text-blue-400">{v.tipo}:</span> {v.label}
                                                        {!modalData._modalReadOnly && <button type="button" onClick={() => removeVinculo(i)} className="ml-1 text-red-500 hover:text-red-700 focus:outline-none"><i className="fas fa-times-circle"></i></button>}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                        {!modalData._modalReadOnly && (
                                            <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end p-2 bg-black/5 dark:bg-white/5 rounded-xl border border-black/5 dark:border-white/5">
                                                <div className="md:col-span-4">
                                                    <label className="block text-xs font-bold mb-1 opacity-70">Módulo</label>
                                                    <select value={currentVinculoTipo} onChange={(e) => { setCurrentVinculoTipo(e.target.value); setCurrentVinculoId(''); }} className="w-full rounded-lg p-2 text-sm glass-input"><option value="">Selecione...</option><option value="Produtos">Produtos</option><option value="Kits">Kits</option><option value="CRM (Atendimentos)">CRM</option></select>
                                                </div>
                                                <div className="md:col-span-6">
                                                    <label className="block text-xs font-bold mb-1 opacity-70">Registro</label>
                                                    <select value={currentVinculoId} onChange={(e) => setCurrentVinculoId(e.target.value)} disabled={!currentVinculoTipo} className="w-full rounded-lg p-2 text-sm glass-input disabled:opacity-50"><option value="">Selecione...</option>{currentVinculoTipo && getGlobalLinkOptions(currentVinculoTipo, db).map(opt => <option key={opt.id} value={opt.id}>{opt.label}</option>)}</select>
                                                </div>
                                                <div className="md:col-span-2">
                                                    <button type="button" onClick={addVinculo} disabled={!currentVinculoTipo || !currentVinculoId} className="w-full bg-mercantil-blue text-white p-2 rounded-lg text-sm font-bold shadow-md flex justify-center items-center h-[38px] disabled:opacity-50"><i className="fas fa-plus"></i></button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                {!modalData._modalReadOnly && <div className="hidden"><button type="submit" id="hiddenTaskSubmitBtn">Salvar</button></div>}
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        // --- COMPONENTE GESTÃO DE BLOCO DE NOTAS ---
        const NotasManager = ({ notas, setNotas, db, showToast, authContext }) => {
            const [modalData, setModalData] = useState(null);
            const [tempVinculos, setTempVinculos] = useState([]);
            const { currentUser, isSuperAdmin } = authContext;

            const visibleNotas = notas.filter(n => isSuperAdmin || n.createdBy === currentUser.username);

            const openNotaModal = (nota = null) => {
                if (nota) { setModalData(nota); setTempVinculos(nota.vinculos ? [...nota.vinculos] : []); } 
                else { setModalData({ titulo: '', conteudo: '', cor: 'bg-amber-100 dark:bg-amber-900/30 border-amber-200 dark:border-amber-700/50' }); setTempVinculos([]); }
            };

            const handleSave = () => {
                const formElement = document.getElementById('hiddenNotaSubmitBtn');
                if (formElement) formElement.click();
            };

            const triggerSaveFlow = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target); const data = Object.fromEntries(formData.entries());
                const newNota = { ...data, conteudo: modalData.conteudo, id: modalData.id || `NOTA-${Date.now()}`, dataCriacao: modalData.dataCriacao || new Date().toISOString(), createdBy: modalData.createdBy || currentUser.username, vinculos: tempVinculos };
                if (modalData.id) setNotas(notas.map(n => n.id === modalData.id ? newNota : n)); else setNotas([newNota, ...notas]);
                showToast('Nota salva!'); setModalData(null);
            };

            return (
                <div className="flex flex-col h-full fade-in w-full">
                    <div className="glass-panel p-5 rounded-t-3xl border-b border-black/5 dark:border-white/5 flex justify-between items-center w-full">
                        <h2 className="text-xl font-extrabold flex items-center gap-3"><div className="w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-gray-200 dark:border-slate-700 flex items-center justify-center text-yellow-500 text-xl"><i className="fas fa-sticky-note"></i></div> Bloco de Notas</h2>
                        <button onClick={() => openNotaModal()} className="bg-gradient-to-r from-mercantil-blue to-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transform hover:scale-[1.02] transition-all flex items-center"><i className="fas fa-plus mr-2"></i> Nova Nota</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 bg-black/5 dark:bg-black/20 custom-scroll rounded-b-3xl border border-t-0 border-black/5 dark:border-white/5 w-full">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {visibleNotas.length === 0 ? <div className="col-span-full text-center py-12 opacity-50 font-medium border-2 border-dashed border-gray-300 dark:border-slate-600 rounded-3xl">Nenhuma anotação disponível.</div> : 
                            visibleNotas.map(nota => (
                                <div key={nota.id} className={`${nota.cor || 'bg-white'} rounded-3xl shadow-sm border p-5 hover:shadow-md hover:-translate-y-1 transition-all cursor-pointer relative group flex flex-col min-h-[200px] text-slate-800 dark:text-slate-200`} onClick={() => openNotaModal(nota)}>
                                    <h4 className="font-extrabold text-base mb-3 leading-tight pr-6">{nota.titulo || 'Sem Título'}</h4>
                                    <div className="text-sm opacity-80 line-clamp-4 flex-1 rich-editor-content font-medium" dangerouslySetInnerHTML={{ __html: nota.conteudo }} />

        const FretesManager = ({ data, onSaveData, showToast, readOnly, canDelete }) => {

            const handleSearch = (e) => {

                    if (weight) { const w = parseFloat(weight.replace(',', '.')); const wMin = parseFloat((row.weightMin || '').replace(',', '.')); const wMax = parseFloat((row.weightMax || '').replace(',', '.')); if (!isNaN(w) && ((!isNaN(wMin) && w < wMin) || (!isNaN(wMax) && w > wMax))) return false; }

                                    <div className="flex items-end"><button type="submit" className="w-full px-8 py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-mercantil-orange to-orange-500 hover:from-orange-600 hover:to-orange-500 shadow-md transition-all"><i className="fas fa-search"></i> Calcular</button></div>

                                            </div>

                                    </div>
                                </div>

                                            </tr>
