<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercantil ERP - Gestão Integrada (Cloud)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mercantil: { blue: '#1E3A8A', light: '#3B82F6', orange: '#EA580C', dark: '#0F172A', gray: '#F8FAFC' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Importação do Firebase (Cloud Database) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Deixa a API do Firebase disponível globalmente para o React usar
        window.FirebaseAPI = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <style>
        body { background-color: inherit; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .table-input { width: 100%; padding: 4px 8px; font-size: 0.875rem; background-color: transparent; border-bottom: 1px solid transparent; transition: all 0.2s; }
        .table-input:focus { border-bottom-color: #3b82f6; outline: none; }
        .custom-scroll { overflow-y: auto; }
        .rich-editor-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-editor-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-editor-content a { color: #3b82f6; text-decoration: underline; }
        .loader { border-top-color: #EA580C; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-200">
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; color: #475569;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: #1E3A8A; margin-bottom: 20px;"></i>
            <h2 style="margin: 0; font-size: 1.5rem; font-weight: 700;">Iniciando Mercantil ERP (Cloud)...</h2>
            <p style="margin-top: 10px; font-size: 0.9rem;">Conectando ao banco de dados em tempo real.</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UTILS ---
        const copyToClipboard = (text, showToast) => {
            try {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(`Copiado: ${text}`, 'success');
            } catch (err) {
                showToast('Erro ao copiar', 'error');
            }
        };

        // --- HOOK CUSTOMIZADO PARA SINCRONIZAÇÃO COM FIREBASE FIRESTORE ---
        const useFirestoreSync = (db, user, collectionName) => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!db || !user) return;

                // Configuração para funcionar tanto no ambiente de teste quanto no seu GitHub
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mercantil-erp-cloud';
                // Caminho da coleção adaptado
                const colPath = typeof __firebase_config !== 'undefined' 
                    ? `artifacts/${appId}/public/data/${collectionName}` 
                    : `empresas/mercantil/${collectionName}`; // Este será o caminho no seu Firebase oficial

                const colRef = window.FirebaseAPI.collection(db, colPath);
                
                // onSnapshot fica "escutando" mudanças em tempo real!
                const unsubscribe = window.FirebaseAPI.onSnapshot(colRef, (snapshot) => {
                    const items = [];
                    snapshot.forEach((doc) => items.push({ id: doc.id, ...doc.data() }));
                    // Ordena por data de criação (se existir) para manter a consistência
                    items.sort((a, b) => {
                        if (a.dataCriacao && b.dataCriacao) return new Date(b.dataCriacao) - new Date(a.dataCriacao);
                        return 0;
                    });
                    setData(items);
                    setLoading(false);
                }, (error) => {
                    console.error("Erro no Firestore:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [db, user, collectionName]);

            const saveItem = async (itemData) => {
                if (!db || !user) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mercantil-erp-cloud';
                const colPath = typeof __firebase_config !== 'undefined' 
                    ? `artifacts/${appId}/public/data/${collectionName}` 
                    : `empresas/mercantil/${collectionName}`;
                
                const itemId = itemData.id || `ID-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
                const itemToSave = { ...itemData, id: itemId };
                if (!itemToSave.dataCriacao) itemToSave.dataCriacao = new Date().toISOString();

                const docRef = window.FirebaseAPI.doc(db, colPath, itemId);
                await window.FirebaseAPI.setDoc(docRef, itemToSave); // Salva na nuvem
            };

            const deleteItem = async (itemId) => {
                if (!db || !user) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mercantil-erp-cloud';
                const colPath = typeof __firebase_config !== 'undefined' 
                    ? `artifacts/${appId}/public/data/${collectionName}` 
                    : `empresas/mercantil/${collectionName}`;
                    
                const docRef = window.FirebaseAPI.doc(db, colPath, itemId);
                await window.FirebaseAPI.deleteDoc(docRef); // Apaga na nuvem
            };

            const saveMultiple = async (itemsArray) => {
                 if (!db || !user) return;
                 for (const item of itemsArray) {
                     await saveItem(item);
                 }
            }

            return [data, saveItem, deleteItem, saveMultiple, loading];
        };

        // --- COMPONENTES COMPARTILHADOS (Minimizados para focar na lógica) ---
        const LogoMercantil = () => (
            <div className="relative flex items-center justify-center w-10 h-10 shrink-0">
                <img src="https://raw.githubusercontent.com/mercantil/logo/main/2.png" alt="Logo" className="w-10 h-10 rounded-full object-cover shadow-sm z-10 border-2 border-transparent" onError={(e) => { e.target.style.display = 'none'; e.target.nextElementSibling.style.display = 'flex'; }} />
                <div style={{ display: 'none' }} className="absolute inset-0 rounded-full bg-white text-mercantil-orange items-center justify-center font-bold text-xl shadow-md border-2 border-mercantil-orange z-0">M</div>
            </div>
        );

        const Modal = ({ title, children, onClose, onSave }) => (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 fade-in p-4 backdrop-blur-sm">
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden border dark:border-slate-700">
                    <div className="flex justify-between items-center p-5 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900">
                        <h3 className="text-xl font-bold text-mercantil-dark dark:text-white">{title}</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-red-500 transition"><i className="fas fa-times text-xl"></i></button>
                    </div>
                    <div className="p-6 overflow-y-auto flex-1 dark:text-slate-200 custom-scroll">{children}</div>
                    {(onSave) && (
                        <div className="p-5 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-slate-200 rounded-lg hover:bg-gray-300 transition">Cancelar</button>
                            <button onClick={onSave} className="px-6 py-2 bg-mercantil-orange text-white rounded-lg hover:bg-orange-700 font-medium shadow-md transition">Salvar Alterações</button>
                        </div>
                    )}
                </div>
            </div>
        );

        const AutoForm = ({ config, initialData, onSave, onCancel }) => {
            const [data, setData] = useState(initialData || {});
            return (
                <form onSubmit={e => { e.preventDefault(); onSave(data); }} className="space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {config.map(f => {
                            const colClass = f.full ? 'col-span-1 md:col-span-4' : f.half ? 'col-span-1 md:col-span-2' : 'col-span-1';
                            return (
                                <div key={f.name} className={colClass}>
                                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 uppercase tracking-wider">{f.label}</label>
                                    {f.type === 'select' ? (
                                        <select required={f.required} className="w-full border rounded p-2 outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})}>
                                            <option value="">Selecione...</option>
                                            {f.options && f.options.map((o, idx) => <option key={idx} value={o}>{o}</option>)}
                                        </select>
                                    ) : f.type === 'textarea' ? (
                                        <textarea required={f.required} className="w-full border rounded p-2 outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})} rows="3" />
                                    ) : (
                                        <input required={f.required} type={f.type||'text'} className="w-full border rounded p-2 outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white text-sm" value={data[f.name]||''} onChange={e => setData({...data, [f.name]: e.target.value})} readOnly={f.readOnly} placeholder={f.placeholder || ''} />
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex justify-end gap-3 pt-6 mt-4 border-t dark:border-slate-700">
                        <button type="button" onClick={onCancel} className="px-5 py-2 border rounded-lg text-gray-700 dark:text-slate-300 font-medium">Cancelar</button>
                        <button type="submit" className="px-6 py-2 bg-mercantil-orange text-white rounded-lg hover:bg-orange-700 font-medium flex items-center transition"><i className="fas fa-save mr-2"></i> Salvar</button>
                    </div>
                </form>
            );
        };

        const BaseManager = ({ title, icon, data, loading, columns, formConfig, onSave, onDelete, showToast }) => {
            const [editModal, setEditModal] = useState(null);
            const [search, setSearch] = useState('');
            
            const filtered = Array.isArray(data) ? data.filter(item => 
                item && typeof item === 'object' && Object.values(item).some(val => 
                    val !== null && val !== undefined && String(val).toLowerCase().includes(search.toLowerCase())
                )
            ) : [];

            const handleSave = async (formData) => {
                await onSave(formData);
                setEditModal(null);
                showToast('Salvo na nuvem com sucesso!');
            };

            const handleDelete = async (id) => {
                if(window.confirm('Excluir este registro permanentemente da nuvem?')) {
                    await onDelete(id);
                    showToast('Registro excluído!', 'success');
                }
            }

            return (
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 flex flex-col h-full fade-in w-full overflow-hidden">
                    <div className="p-5 border-b bg-gray-50 dark:bg-slate-900 dark:border-slate-700 flex flex-col lg:flex-row justify-between items-center gap-4">
                        <h2 className="text-xl font-bold text-mercantil-dark dark:text-white flex items-center gap-3">
                            <div className="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 flex items-center justify-center text-mercantil-blue"><i className={icon}></i></div>
                            <span>{title} {loading && <i className="fas fa-sync fa-spin text-sm ml-2 text-gray-400" title="Sincronizando..."></i>}</span>
                        </h2>
                        <div className="flex gap-3 w-full lg:w-auto">
                            <input type="text" placeholder="Buscar..." className="w-full pl-4 pr-4 py-2 border rounded-lg outline-none dark:bg-slate-800 dark:border-slate-600 dark:text-white" value={search} onChange={e=>setSearch(e.target.value)} />
                            <button onClick={() => setEditModal({})} className="bg-mercantil-blue text-white px-4 py-2 rounded-lg font-medium whitespace-nowrap"><i className="fas fa-plus mr-2"></i>Novo</button>
                        </div>
                    </div>
                    <div className="w-full overflow-x-auto custom-scroll flex-1 p-0">
                        <table className="w-full text-sm text-left dark:text-slate-300">
                            <thead className="text-xs text-gray-600 dark:text-gray-400 uppercase bg-gray-100 dark:bg-slate-700">
                                <tr>
                                    {columns.map(c => <th key={c.field} className="px-4 py-3 whitespace-nowrap">{c.header}</th>)}
                                    <th className="px-4 py-3 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                {loading && filtered.length === 0 ? <tr><td colSpan={columns.length + 1} className="text-center py-8">Carregando dados da nuvem...</td></tr> :
                                filtered.length === 0 ? <tr><td colSpan={columns.length + 1} className="text-center py-8 text-gray-500">Nenhum registro.</td></tr> :
                                filtered.map((item) => (
                                    <tr key={item.id} className="border-b dark:border-slate-700 hover:bg-blue-50 dark:hover:bg-slate-750 transition">
                                        {columns.map(c => <td key={c.field} className="px-4 py-3">{c.render ? c.render(item[c.field], item) : item[c.field]}</td>)}
                                        <td className="px-4 py-3 text-right">
                                            <button onClick={()=>setEditModal(item)} className="text-blue-600 p-2 mx-1"><i className="fas fa-edit"></i></button>
                                            <button onClick={()=>handleDelete(item.id)} className="text-red-600 p-2 mx-1"><i className="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editModal && (
                        <Modal title={editModal.id ? `Editar Registro` : `Novo Registro`} onClose={()=>setEditModal(null)}>
                            <AutoForm config={formConfig} initialData={editModal} onSave={handleSave} onCancel={()=>setEditModal(null)} />
                        </Modal>
                    )}
                </div>
            );
        };

        // --- APLICAÇÃO PRINCIPAL ---
        const App = () => {
            const [firebaseReady, setFirebaseReady] = useState(!!window.FirebaseAPI);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);

            const [toast, setToast] = useState({ visible: false, message: '', type: 'success' });
            const [darkMode, setDarkMode] = useState(false);
            const [activeMenu, setActiveMenu] = useState('painel');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            const showToast = (message, type = 'success') => {
                setToast({ visible: true, message, type });
                setTimeout(() => setToast(t => ({ ...t, visible: false })), 4000);
            };

            // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAo0q2CmP8uIHNeaozoe4W2w7yoZrznWHU",
  authDomain: "mercantil-e-commerce.firebaseapp.com",
  projectId: "mercantil-e-commerce",
  storageBucket: "mercantil-e-commerce.firebasestorage.app",
  messagingSenderId: "375252406705",
  appId: "1:375252406705:web:61021d6a03b6c67a456d90",
  measurementId: "G-5SWWX561JJ"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

                        // Lógica de Autenticação
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.FirebaseAPI.signInWithCustomToken(fireAuth, __initial_auth_token);
                        } else {
                            // Para o seu GitHub, usaremos login anônimo (qualquer um acessa e edita)
                            // Se quiser senha depois, basta mudar no painel do Firebase!
                            await window.FirebaseAPI.signInAnonymously(fireAuth);
                        }
                    } catch (error) {
                        console.error("Erro ao inicializar Firebase", error);
                        showToast("Erro de conexão com Banco de Dados. Preencheu suas chaves?", "error");
                        setAuthLoading(false);
                    }
                };

                if (firebaseReady) {
                    initFirebase();
                } else {
                    const handleReady = () => { setFirebaseReady(true); initFirebase(); };
                    window.addEventListener('firebase-loaded', handleReady);
                    return () => window.removeEventListener('firebase-loaded', handleReady);
                }
            }, [firebaseReady]);

            // 2. Escuta mudanças de Usuário logado
            useEffect(() => {
                if (!auth) return;
                const unsubscribe = window.FirebaseAPI.onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                    if(currentUser) showToast("Conectado à Nuvem com Sucesso!", "success");
                });
                return () => unsubscribe();
            }, [auth]);

            // 3. Conecta as Coleções (Tabelas) ao Firestore
            const [produtos, saveProduto, delProduto, , loadProd] = useFirestoreSync(db, user, 'produtos');
            const [kits, saveKit, delKit, , loadKits] = useFirestoreSync(db, user, 'kits');
            const [atendimentos, saveCrm, delCrm, , loadCrm] = useFirestoreSync(db, user, 'atendimentos');
            const [tarefas, saveTarefa, delTarefa, , loadTar] = useFirestoreSync(db, user, 'tarefas');

            // --- CONFIGURAÇÕES DE FORMULÁRIOS ---
            const produtosConfig = [
                { name: 'SKU', label: 'SKU *', required: true, half: true }, 
                { name: 'Título', label: 'Título do Produto *', required: true, full: true }, 
                { name: 'Status', label: 'Status', type: 'select', options: ['Ativo', 'Inativo'] }, 
                { name: 'Peso', label: 'Peso (kg)', type: 'number', step: '0.001', half: true }, 
                { name: 'Observações', label: 'Observações', type: 'textarea', full: true }
            ];

            const crmConfig = [
                { name: 'cliente', label: 'Nome do Cliente *', type: 'text', required: true, half: true },
                { name: 'canal', label: 'Canal de Origem', type: 'select', options: ['WhatsApp', 'E-mail', 'Telefone'], half: true },
                { name: 'status', label: 'Status', type: 'select', options: ['Aberto', 'Resolvido'], half: true },
                { name: 'descricao', label: 'Relato da Ocorrência', type: 'textarea', full: true, required: true }
            ];

            const catalogColumns = [
                { field: 'SKU', header: 'SKU', render: (val) => <span className="font-mono font-bold cursor-pointer text-blue-500" onClick={()=>copyToClipboard(val, showToast)}>{val}</span> },
                { field: 'Título', header: 'Título' },
                { field: 'Status', header: 'Status', render: (val) => <span className={`px-2 py-1 rounded text-xs font-bold ${val==='Ativo'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>{val || 'N/A'}</span> }
            ];

            const crmColumns = [
                { field: 'cliente', header: 'Cliente', render: (val) => <span className="font-bold">{val}</span> },
                { field: 'canal', header: 'Canal' },
                { field: 'status', header: 'Status', render: (val) => <span className={`px-2 py-1 rounded text-xs font-bold ${val==='Resolvido'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'}`}>{val || 'Aberto'}</span> }
            ];

            if (authLoading) return (
                <div className="flex flex-col items-center justify-center h-screen bg-gray-50 dark:bg-slate-900 text-mercantil-blue">
                    <div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-4"></div>
                    <h2 className="text-xl font-bold">Autenticando na Nuvem...</h2>
                </div>
            );

            return (
                <div className={`${darkMode ? 'dark' : ''}`}>
                    <div className="flex h-screen overflow-hidden dark:bg-slate-900 font-sans text-gray-800 dark:text-slate-200 w-full">
                        {toast.visible && (
                            <div className={`fixed top-5 right-5 z-50 px-6 py-3 rounded-lg shadow-xl text-white font-bold fade-in flex items-center gap-3 ${toast.type==='success'?'bg-green-600':toast.type==='error'?'bg-red-600':'bg-blue-600'}`}>
                                {toast.message}
                            </div>
                        )}

                        {/* Barra Lateral Ocultável no Mobile */}
                        {isSidebarOpen && <div className="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>}
                        
                        <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-slate-700 shadow-xl transform transition-transform duration-300 md:relative md:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-6 border-b border-gray-200 dark:border-slate-700 flex items-center gap-3">
                                <LogoMercantil />
                                <div>
                                    <h1 className="font-extrabold text-mercantil-blue dark:text-blue-400 text-xl">MERCANTIL</h1>
                                    <span className="text-[10px] text-green-500 font-bold"><i className="fas fa-cloud"></i> Cloud Sync Ativo</span>
                                </div>
                            </div>
                            <nav className="flex-1 p-4 space-y-2">
                                {[
                                    { id: 'painel', icon: 'fa-chart-pie', label: 'Painel Geral' },
                                    { id: 'produtos', icon: 'fa-box', label: 'Peças & Motores' },
                                    { id: 'kits', icon: 'fa-boxes-stacked', label: 'Kits Montados' },
                                    { id: 'crm', icon: 'fa-headset', label: 'Atendimento CRM' },
                                    { id: 'config', icon: 'fa-cog', label: 'Instruções GitHub' }
                                ].map(item => (
                                    <button key={item.id} onClick={() => { setActiveMenu(item.id); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition ${activeMenu === item.id ? 'bg-blue-50 dark:bg-slate-700 text-mercantil-blue dark:text-blue-400 border-l-4 border-mercantil-orange' : 'text-gray-600 dark:text-slate-400 hover:bg-gray-100'}`}>
                                        <i className={`fas ${item.icon} w-5`}></i> {item.label}
                                    </button>
                                ))}
                            </nav>
                        </aside>

                        <main className="flex-1 flex flex-col h-full overflow-hidden w-full relative">
                            {/* Header (Desktop & Mobile) */}
                            <header className="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 p-4 flex justify-between items-center shadow-sm z-10 w-full">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setIsSidebarOpen(true)} className="md:hidden text-gray-600 text-xl"><i className="fas fa-bars"></i></button>
                                    <h2 className="text-xl font-bold capitalize"><i className="fas fa-cloud text-blue-500 mr-2"></i> {activeMenu}</h2>
                                </div>
                                <button onClick={() => setDarkMode(!darkMode)} className="text-xl p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-700"><i className={`fas ${darkMode ? 'fa-sun text-yellow-400' : 'fa-moon text-slate-600'}`}></i></button>
                            </header>

                            <div className="flex-1 overflow-y-auto p-4 sm:p-6 custom-scroll w-full bg-gray-50 dark:bg-slate-900">
                                {activeMenu === 'painel' && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">
                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border-l-4 border-mercantil-blue shadow-sm">
                                            <p className="text-sm font-bold text-gray-500">Peças na Nuvem</p>
                                            <h2 className="text-3xl font-bold">{loadProd ? '...' : produtos.length}</h2>
                                        </div>
                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border-l-4 border-mercantil-orange shadow-sm">
                                            <p className="text-sm font-bold text-gray-500">Kits Comerciais</p>
                                            <h2 className="text-3xl font-bold">{loadKits ? '...' : kits.length}</h2>
                                        </div>
                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border-l-4 border-green-500 shadow-sm">
                                            <p className="text-sm font-bold text-gray-500">Chamados CRM</p>
                                            <h2 className="text-3xl font-bold">{loadCrm ? '...' : atendimentos.length}</h2>
                                        </div>
                                        <div className="md:col-span-3 bg-blue-50 dark:bg-slate-800 p-6 rounded-xl border border-blue-200 dark:border-slate-700 mt-4">
                                            <h3 className="text-xl font-bold text-blue-800 dark:text-blue-300 mb-2"><i className="fas fa-wifi mr-2"></i> Sistema Real-Time Ativado</h3>
                                            <p className="text-blue-900 dark:text-blue-200">Se você abrir este sistema em duas abas ou computadores diferentes, verá que, ao adicionar uma peça em um, ela aparecerá quase instantaneamente no outro. Os dados estão seguros na nuvem.</p>
                                        </div>
                                    </div>
                                )}

                                {activeMenu === 'produtos' && <BaseManager title="Peças" icon="fas fa-box" data={produtos} loading={loadProd} columns={catalogColumns} formConfig={produtosConfig} onSave={saveProduto} onDelete={delProduto} showToast={showToast} />}
                                {activeMenu === 'kits' && <BaseManager title="Kits" icon="fas fa-boxes-stacked" data={kits} loading={loadKits} columns={catalogColumns} formConfig={produtosConfig} onSave={saveKit} onDelete={delKit} showToast={showToast} />}
                                {activeMenu === 'crm' && <BaseManager title="CRM" icon="fas fa-headset" data={atendimentos} loading={loadCrm} columns={crmColumns} formConfig={crmConfig} onSave={saveCrm} onDelete={delCrm} showToast={showToast} />}
                                
                                {activeMenu === 'config' && (
                                    <div className="bg-white dark:bg-slate-800 p-8 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 max-w-4xl mx-auto fade-in">
                                        <h2 className="text-2xl font-bold mb-4 text-mercantil-orange"><i className="fas fa-rocket mr-2"></i>Como colocar isso no seu GitHub</h2>
                                        <p className="mb-4">Para que este código funcione no seu site (mercantilpecas.github.io/sistema/), você precisa criar o seu próprio banco de dados gratuito no Google Firebase e colocar as chaves no código acima.</p>
                                        
                                        <ol className="list-decimal pl-5 space-y-4 font-medium text-gray-700 dark:text-gray-300">
                                            <li>Acesse <a href="https://firebase.google.com/" target="_blank" className="text-blue-500 underline">firebase.google.com</a> e crie uma conta (use o seu Gmail).</li>
                                            <li>Clique em <strong>"Go to console"</strong> e depois em <strong>"Adicionar Projeto"</strong>. Dê o nome de "Mercantil ERP".</li>
                                            <li>No menu lateral esquerdo, clique em <strong>Firestore Database</strong> e depois em <strong>Criar banco de dados</strong>. Escolha <strong>"Iniciar no modo de teste"</strong> (Isso permite que você leia e grave dados inicialmente).</li>
                                            <li>Ainda no menu lateral, vá em <strong>Autenticação (Authentication)</strong> -> <strong>Vamos começar</strong> -> Aba <strong>Sign-in method</strong>. Ative o provedor <strong>"Anônimo"</strong>. (Isso permite que o sistema conecte sem pedir senha aos seus funcionários).</li>
                                            <li>Volte à tela inicial do seu projeto Firebase (clique no ícone da casinha no canto superior esquerdo). Clique no ícone de <strong>Web (</>)</strong> para adicionar um aplicativo à web.</li>
                                            <li>Registre o app com o nome "Mercantil Web". O Firebase vai te mostrar um código cheio de chaves (apiKey, authDomain, projectId...).</li>
                                            <li><strong>Copie essas chaves!</strong> Vá no código deste arquivo <code>index.html</code> que eu gerei para você. Procure pela linha onde está escrito <code>const myFirebaseConfig = { apiKey: "SUA_API_KEY", ... }</code> e substitua pelas suas chaves verdadeiras.</li>
                                            <li>Salve o arquivo <code>index.html</code> e faça o upload/commit dele no seu repositório do GitHub! Pronto, o sistema está online e colaborativo.</li>
                                        </ol>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
