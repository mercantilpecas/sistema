                                <tr>
                                    {columns.map(c => <th key={c.field} className="px-4 py-3 whitespace-nowrap">{c.header}</th>)}
                                    <th className="px-4 py-3 text-right whitespace-nowrap">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.length === 0 ? <tr><td colSpan={columns.length + 1} className="text-center py-8 text-gray-500">Nenhum registro encontrado.</td></tr> :
                                filtered.map((item, idx) => (
                                    <tr key={item.id || idx} className="border-b dark:border-slate-700 hover:bg-blue-50 dark:hover:bg-slate-750 transition">
                                        {columns.map(c => (
                                            <td key={c.field} className="px-4 py-3 font-medium text-sm">
                                                {c.render ? c.render(item[c.field], item) : item[c.field]}
                                            </td>
                                        ))}
                                        <td className="px-4 py-3 text-right whitespace-nowrap">
                                            <button onClick={()=>setEditModal(item)} className="text-blue-600 hover:text-blue-900 dark:text-blue-400 dark:hover:text-blue-300 p-2 mx-1 rounded transition" title="Editar"><i className="fas fa-edit"></i></button>
                                            <button onClick={()=>{if(window.confirm('Excluir este registro?')) onDelete(item.id);}} className="text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300 p-2 mx-1 rounded transition" title="Excluir"><i className="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editModal && (
                        <Modal title={editModal.id ? `Editar: ${title}` : `Novo Registro: ${title}`} onClose={()=>setEditModal(null)}>
                            <AutoForm config={formConfig} initialData={editModal} onSave={handleSave} onCancel={()=>setEditModal(null)} db={db} />
                        </Modal>
                    )}
                </div>
            );
        };

        // --- COMPONENTE CATÁLOGO INTEGRADO (Produtos & Kits) ---
        const CatalogoManager = ({ produtos, setProdutos, kits, setKits, produtosConfig, kitsConfig, catalogColumns, showToast, saveStateRecord, deleteStateRecord, db }) => {
            const [tab, setTab] = useState('produtos');

            return (
                <div className="flex flex-col h-full fade-in space-y-4 w-full">
                    <div className="bg-white dark:bg-slate-800 p-3 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 flex flex-wrap gap-2 w-full">
                        <button onClick={() => setTab('produtos')} className={`flex-1 sm:flex-none px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${tab === 'produtos' ? 'bg-mercantil-blue text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-300 dark:hover:bg-slate-600'}`}>
                            <i className="fas fa-box mr-2"></i> Peças & Motores
                        </button>
                        <button onClick={() => setTab('kits')} className={`flex-1 sm:flex-none px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${tab === 'kits' ? 'bg-mercantil-blue text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-300 dark:hover:bg-slate-600'}`}>
                            <i className="fas fa-boxes-stacked mr-2"></i> Kits Montados
                        </button>
                    </div>
                    <div className="flex-1 w-full h-full relative">
                        {tab === 'produtos' && (
                            <BaseManager title="Catálogo de Peças (Produtos)" icon="fas fa-box" data={produtos} formConfig={produtosConfig} showToast={showToast} db={db}
                                onSave={(data) => saveStateRecord(data, produtos, setProdutos)} onDelete={(id) => deleteStateRecord(id, produtos, setProdutos)}
                                columns={catalogColumns} />
                        )}
                        {tab === 'kits' && (
                            <BaseManager title="Catálogo de Kits" icon="fas fa-boxes-stacked" data={kits} formConfig={kitsConfig} showToast={showToast} db={db}
                                onSave={(data) => saveStateRecord(data, kits, setKits)} onDelete={(id) => deleteStateRecord(id, kits, setKits)}
                                columns={catalogColumns} />
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENTE GESTÃO DE FRETES ---
        const FretesManager = ({ data, onSaveData, showToast }) => {
            const [tab, setTab] = useState('consulta');
            const [query, setQuery] = useState('');
            const [weight, setWeight] = useState('');
            const [results, setResults] = useState([]);
            const [searched, setSearched] = useState(false);

            const handleSearch = (e) => {
                e.preventDefault();
                setSearched(true);
                const q = query.trim();
                
                if (!q) { setResults(data); return; }

                const cleanQuery = q.replace(/\D/g, '');
                const isNumericSearch = cleanQuery.length >= 7;

                const res = data.filter(row => {
                    let matchRegion = false;
                    if (isNumericSearch) {
                        const queryCepNum = parseInt(cleanQuery.substring(0, 8), 10);
                        const startCep = parseInt((row.cepStart || '').replace(/\D/g, ''), 10);
                        const endCep = parseInt((row.cepEnd || '').replace(/\D/g, ''), 10);
                        if (!isNaN(startCep) && !isNaN(endCep) && queryCepNum >= startCep && queryCepNum <= endCep) matchRegion = true;
                    } else {
                        const cityStr = (row.city || '').toLowerCase();
                        if (cityStr.includes(q.toLowerCase())) matchRegion = true;
                    }
                    if (!matchRegion) return false;
                    if (weight) {
                        const wMin = parseFloat((row.weightMin || '').replace(',', '.'));
                        const wMax = parseFloat((row.weightMax || '').replace(',', '.'));
                        const wQuery = parseFloat(weight.replace(',', '.'));
                        if (!isNaN(wQuery)) {
                            if (!isNaN(wMin) && wQuery < wMin) return false;
                            if (!isNaN(wMax) && wQuery > wMax) return false;
                        }
                    }
                    return true;
                });
                setResults(res);
            };

            const updateRow = (id, field, value) => {
                const newData = data.map(row => row.id === id ? { ...row, [field]: value } : row);
                onSaveData(newData);
            };

            const addRow = () => {
                const newId = data.length > 0 ? Math.max(...data.map(d => Number(d.id) || 0)) + 1 : 1;
                onSaveData([{ id: String(newId), city: '', cepStart: '', cepEnd: '', weightMin: '', weightMax: '', price: '' }, ...data]);
                showToast('Nova linha adicionada no topo.');
            };

            const removeRow = (id) => {
                if(window.confirm("Remover esta regra de frete?")) {
                    onSaveData(data.filter(row => row.id !== id));
                    showToast('Linha removida.', 'success');
                }
            };

            const handleImportUniversal = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (typeof XLSX === 'undefined') {
                    showToast("Biblioteca de planilhas não carregada.", "error");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const fileData = evt.target.result;
                        const workbook = XLSX.read(fileData, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                        const startIndex = json[0] && json[0][0] && String(json[0][0]).toLowerCase().includes('munic') ? 1 : 0;
                        
                        const newData = [];
                        for (let i = startIndex; i < json.length; i++) {
                            const row = json[i];
                            if (!row || row.length === 0 || !row[0]) continue;
                            
                            newData.push({
                                id: `FRT-${Date.now()}-${i}`,
                                city: String(row[0] || '').trim(),
                                cepStart: String(row[1] || '').trim(),
                                cepEnd: String(row[2] || '').trim(),
                                weightMin: String(row[3] || '').trim(),
                                weightMax: String(row[4] || '').trim(),
                                price: String(row[5] || '').trim()
                            });
                        }

                        if (newData.length > 0) {
                            if(window.confirm(`Deseja SUBSTITUIR a base atual pelos ${newData.length} novos registros? (Cancelar irá ADICIONAR aos existentes)`)){
                                onSaveData(newData);
                            } else {
                                onSaveData([...newData, ...data]);
                            }
                            showToast(`${newData.length} registros importados com sucesso!`);
                        } else {
                            showToast("Planilha vazia ou em formato não reconhecido.", "error");
                        }
                    } catch (error) {
                        console.error(error);
                        showToast("Erro ao processar o arquivo.", "error");
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };

            const handleExport = () => {
                if (typeof XLSX === 'undefined') { showToast("Biblioteca não carregada.", "error"); return; }
                const exportData = [['Município', 'Faixa CEP Inicial', 'Faixa CEP Final', 'Peso Mínimo (kg)', 'Peso Máximo (kg)', 'Valor do Frete (R$)']];
                data.forEach(row => exportData.push([row.city, row.cepStart, row.cepEnd, row.weightMin, row.weightMax, row.price]));

                const ws = XLSX.utils.aoa_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Fretes");
                XLSX.writeFile(wb, `Base_Fretes_${new Date().toISOString().split('T')[0]}.xlsx`);
                showToast("Planilha de fretes exportada!");
            };

            return (
                <div className="flex flex-col h-full fade-in space-y-6">
                    <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 flex flex-wrap gap-2 w-full">
                        <button onClick={() => setTab('consulta')} className={`flex-1 sm:flex-none px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${tab === 'consulta' ? 'bg-mercantil-blue text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-300 dark:hover:bg-slate-600'}`}>
                            <i className="fas fa-search mr-2"></i> Consulta Cotação
                        </button>
                        <button onClick={() => setTab('gestao')} className={`flex-1 sm:flex-none px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${tab === 'gestao' ? 'bg-mercantil-blue text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-300 dark:hover:bg-slate-600'}`}>
                            <i className="fas fa-database mr-2"></i> Gestão da Base (Excel)
                        </button>
                    </div>

                    {tab === 'consulta' && (
                        <div className="space-y-6 fade-in w-full">
                            <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700">
                                <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-6 flex items-center gap-2">
                                    <i className="fas fa-truck text-mercantil-orange"></i> Buscar Cotação de Frete
                                </h2>
                                
                                <form onSubmit={handleSearch} className="flex flex-col md:flex-row gap-4">
                                    <div className="flex-1 w-full">
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">CEP ou Bairro/Município</label>
                                        <div className="relative">
                                            <i className="fas fa-map-marker-alt absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                            <input type="text" value={query} onChange={e=>setQuery(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:text-white" placeholder="Ex: 30123-456 ou Belo Horizonte" />
                                        </div>
                                    </div>
                                    <div className="w-full md:w-48">
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Peso Opc. (kg)</label>
                                        <div className="relative">
                                            <i className="fas fa-box absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                            <input type="number" step="0.01" value={weight} onChange={e=>setWeight(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:text-white" placeholder="Ex: 5.5" />
                                        </div>
                                    </div>
                                    <div className="flex items-end w-full md:w-auto">
                                        <button type="submit" className="w-full md:w-auto px-6 py-3 rounded-lg font-bold text-white bg-mercantil-orange hover:bg-orange-700 transition-colors shadow-sm flex items-center justify-center gap-2">
                                            <i className="fas fa-search"></i> Calcular
                                        </button>
                                    </div>
                                </form>
                            </div>

                            {searched && (
                                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden fade-in w-full">
                                    <div className="bg-gray-50 dark:bg-slate-900 px-6 py-4 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center">
                                        <h3 className="font-bold text-gray-800 dark:text-white">Resultados da Pesquisa</h3>
                                        <span className="text-sm font-medium text-gray-500 dark:text-gray-400">{results.length} resultado(s)</span>
                                    </div>
                                    <div className="divide-y divide-gray-100 dark:divide-slate-700">
                                        {results.length === 0 ? (
                                            <div className="p-8 text-center text-red-600 dark:text-red-500 flex flex-col items-center">
                                                <i className="fas fa-times-circle text-5xl mb-3 drop-shadow-md"></i>
                                                <p className="text-xl font-bold">Fora da faixa de entrega</p>
                                                <p className="text-sm mt-1 text-gray-500 dark:text-gray-400">Verifique o CEP digitado ou os limites de peso.</p>
                                            </div>
                                        ) : (
                                            results.map(result => (
                                                <div key={result.id} className="p-6 hover:bg-gray-50 dark:hover:bg-slate-750 transition-colors flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 dark:text-slate-300">
                                                    <div>
                                                        <h4 className="text-lg font-bold text-mercantil-blue dark:text-blue-400">{result.city || 'Região não especificada'}</h4>
                                                        <p className="text-sm mt-1 flex items-center gap-2"><i className="fas fa-map-marker-alt"></i> CEP: <span className="font-mono">{result.cepStart || '00000-000'}</span> até <span className="font-mono">{result.cepEnd || '99999-999'}</span></p>
                                                        <p className="text-sm mt-1 flex items-center gap-2"><i className="fas fa-box"></i> Peso: <span className="font-bold">{result.weightMin ? result.weightMin + 'kg' : '0kg'}</span> a <span className="font-bold">{result.weightMax ? result.weightMax + 'kg' : 'Ilimitado'}</span></p>
                                                    </div>
                                                    <div className="bg-green-50 dark:bg-green-900/30 border border-green-100 dark:border-green-800 rounded-lg px-6 py-3 text-center w-full sm:w-auto min-w-[150px]">
                                                        <span className="block text-xs font-bold text-green-700 dark:text-green-400 uppercase tracking-wider mb-1">Valor do Frete</span>
                                                        <span className="text-2xl font-bold text-green-700 dark:text-green-400 flex items-center justify-center gap-1">R$ {result.price || 'A Combinar'}</span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {tab === 'gestao' && (
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 flex flex-col flex-1 min-h-[500px] fade-in overflow-hidden w-full">
                            <div className="p-4 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                                <div>
                                    <h2 className="text-lg font-bold text-gray-800 dark:text-white">Editor da Base de Dados</h2>
                                    <p className="text-xs text-gray-500 dark:text-gray-400">Edite na tabela. Salve como planilha para não perder os dados.</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-2 w-full lg:w-auto">
                                    <input type="file" id="file-input-frete" accept=".csv, .xlsx, .xls" className="hidden" onChange={handleImportUniversal} />
                                    <button onClick={() => document.getElementById('file-input-frete').click()} className="w-full sm:w-auto flex justify-center items-center gap-2 px-3 py-2 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-600 rounded-md text-sm font-bold text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
                                        <i className="fas fa-upload"></i> Importar (XLSX/CSV)
                                    </button>
                                    <button onClick={handleExport} className="w-full sm:w-auto flex justify-center items-center gap-2 px-3 py-2 bg-mercantil-blue text-white rounded-md text-sm font-bold hover:bg-blue-800 transition-colors shadow-sm">
                                        <i className="fas fa-download"></i> Exportar
                                    </button>
                                </div>
                            </div>
                            <div className="w-full overflow-x-auto custom-scroll p-0 flex-1">
                                <table className="w-full min-w-[800px] text-left border-collapse dark:text-slate-300">
                                    <thead className="bg-gray-100 dark:bg-slate-700 sticky top-0 z-10 shadow-sm text-gray-600 dark:text-gray-300">
                                        <tr>
                                            <th className="px-4 py-3 text-xs font-bold uppercase w-12 text-center">#</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase">Município / Região</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase">CEP Inicial</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase">CEP Final</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase text-right">Peso Mín (kg)</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase text-right">Peso Máx (kg)</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase text-right">Valor (R$)</th>
                                            <th className="px-4 py-3 text-xs font-bold uppercase w-16 text-center">Ação</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-200 dark:divide-slate-700">
                                        {data.length === 0 ? <tr><td colSpan="8" className="px-4 py-12 text-center text-gray-500">Nenhuma base importada.</td></tr> :
                                         data.map((row, index) => (
                                            <tr key={row.id} className="hover:bg-gray-50 dark:hover:bg-slate-750 transition-colors group">
                                                <td className="px-4 py-2 text-sm text-gray-400 text-center">{index + 1}</td>
                                                <td className="px-2 py-2"><input type="text" className="table-input dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.city||''} onChange={(e)=>updateRow(row.id, 'city', e.target.value)} placeholder="Região" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input font-mono text-xs dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.cepStart||''} onChange={(e)=>updateRow(row.id, 'cepStart', e.target.value)} placeholder="00000-000" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input font-mono text-xs dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.cepEnd||''} onChange={(e)=>updateRow(row.id, 'cepEnd', e.target.value)} placeholder="99999-999" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input text-right dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.weightMin||''} onChange={(e)=>updateRow(row.id, 'weightMin', e.target.value)} placeholder="0" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input text-right dark:bg-slate-900 dark:text-white dark:border-slate-700 rounded p-1" value={row.weightMax||''} onChange={(e)=>updateRow(row.id, 'weightMax', e.target.value)} placeholder="10" /></td>
                                                <td className="px-2 py-2"><input type="text" className="table-input text-right font-bold text-green-600 dark:text-green-400 dark:bg-slate-900 dark:border-slate-700 rounded p-1" value={row.price||''} onChange={(e)=>updateRow(row.id, 'price', e.target.value)} placeholder="15.00" /></td>
                                                <td className="px-4 py-2 text-center">
                                                    <button onClick={()=>removeRow(row.id)} className="p-1.5 text-gray-400 hover:text-red-500 rounded transition" title="Remover"><i className="fas fa-trash"></i></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <div className="p-4 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 rounded-b-xl flex flex-col sm:flex-row justify-between items-center gap-3">
                                <span className="text-sm text-gray-500 dark:text-gray-400 font-bold">Total de registros: {data.length}</span>
                                <button onClick={addRow} className="w-full sm:w-auto flex justify-center items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-600 text-mercantil-blue dark:text-blue-400 rounded-md text-sm font-bold hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
                                    <i className="fas fa-plus"></i> Adicionar Linha
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- APLICAÇÃO PRINCIPAL ---
        const MainApp = ({ onLogout }) => {
            const [toast, setToast] = useState({ visible: false, message: '', type: 'success' });
            
            const showToast = (message, type = 'success') => {
                setToast({ visible: true, message, type });
                setTimeout(() => setToast(t => ({ ...t, visible: false })), 4000);
            };

            const [darkMode, setDarkMode] = useLocalStorage('mrc_theme_dark', false);
            const [activeMenu, setActiveMenu] = useState('painel');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            // Controle do Menu de Usuário e Alteração de Senha
            const [isUserMenuOpen, setIsUserMenuOpen] = useState(false);
            const [isPwdModalOpen, setIsPwdModalOpen] = useState(false);
            const [pwdData, setPwdData] = useState({ current: '', new1: '', new2: '', captcha: '' });
            const [captchaText, setCaptchaText] = useState('');
            
            const [produtos, setProdutos] = useLocalStorage('mrc_produtos', []);
            const [kits, setKits] = useLocalStorage('mrc_kits', []);
            const [atendimentos, setAtendimentos] = useLocalStorage('mrc_atendimentos', []);
            const [devolucoes, setDevolucoes] = useLocalStorage('mrc_devolucoes', []);
            const [qualidade, setQualidade] = useLocalStorage('mrc_qualidade', []);
            const [marketing, setMarketing] = useLocalStorage('mrc_marketing', []);
            const [gerencia, setGerencia] = useLocalStorage('mrc_gerencia', []);
            const [compliance, setCompliance] = useLocalStorage('mrc_compliance', []);
            const [fretes, setFretes] = useLocalStorage('mrc_fretes', []);
            const [tarefas, setTarefas] = useLocalStorage('mrc_tarefas', []);
            const [notas, setNotas] = useLocalStorage('mrc_notas', []);
            const [lastBackup, setLastBackup] = useLocalStorage('mrc_last_backup_time', null);

            const db = useMemo(() => ({ produtos, kits, atendimentos, devolucoes, qualidade, fretes, marketing, gerencia, compliance, tarefas, notas }), [produtos, kits, atendimentos, devolucoes, qualidade, fretes, marketing, gerencia, compliance, tarefas, notas]);

            // --- TIMER DE INATIVIDADE (15 MINUTOS) ---
            useEffect(() => {
                let timeoutId;
                const resetTimer = () => {
                    clearTimeout(timeoutId);
                    // 15 minutos = 15 * 60 * 1000 = 900000ms
                    timeoutId = setTimeout(() => {
                        onLogout();
                    }, 900000); 
                };

                const events = ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'];
                events.forEach(event => window.addEventListener(event, resetTimer));
                resetTimer(); // Inicia o contador

                return () => {
                    clearTimeout(timeoutId);
                    events.forEach(event => window.removeEventListener(event, resetTimer));
                };
            }, [onLogout]);

            // --- GERAÇÃO DE CAPTCHA VISUAL ---
            const generateCaptcha = () => {
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let result = '';
                for (let i = 0; i < 5; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                setCaptchaText(result);
            };

            useEffect(() => {
                if (isPwdModalOpen) generateCaptcha();
            }, [isPwdModalOpen]);

            const handlePwdChangeSubmit = (e) => {
                e.preventDefault();
                const savedPwd = localStorage.getItem('mrc_user_pwd') || '152416';
                
                if (pwdData.current !== savedPwd) {
                    return showToast('A senha atual está incorreta.', 'error');
                }
                if (pwdData.new1 !== pwdData.new2) {
                    return showToast('As novas senhas não coincidem.', 'error');
                }
                if (pwdData.new1.length < 6) {
                    return showToast('A nova senha deve ter no mínimo 6 caracteres.', 'error');
                }
                if (pwdData.captcha.toUpperCase() !== captchaText) {
                    generateCaptcha();
                    return showToast('Captcha incorreto. Tente novamente.', 'error');
                }

                localStorage.setItem('mrc_user_pwd', pwdData.new1);
                showToast('Senha alterada com sucesso!', 'success');
                setIsPwdModalOpen(false);
                setPwdData({ current: '', new1: '', new2: '', captcha: '' });
            };


            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const forceSystemBackup = () => {
                    const fullSystemDump = { produtos, kits, atendimentos, devolucoes, qualidade, marketing, gerencia, compliance, fretes, tarefas, notas };
                    localStorage.setItem('mrc_auto_backup_dump', JSON.stringify(fullSystemDump));
                    setLastBackup(new Date().toISOString());
                };
                const intervalId = setInterval(() => {
                    if (!lastBackup) { forceSystemBackup(); } 
                    else {
                        const lastTime = new Date(lastBackup).getTime();
                        const nowTime = new Date().getTime();
                        if ((nowTime - lastTime) >= 1800000) forceSystemBackup(); // 30 minutos
                    }
                }, 60000);
                return () => clearInterval(intervalId);
            }, [produtos, kits, atendimentos, devolucoes, qualidade, marketing, gerencia, compliance, fretes, tarefas, notas, lastBackup, setLastBackup]);

            const saveStateRecord = (data, stateArray, setter) => {
                const arr = [...(stateArray || [])];
                const idx = arr.findIndex(i => i.id === data.id);
                if(idx >= 0) arr[idx] = data; else arr.unshift(data);
                setter(arr);
                showToast('Registro salvo com sucesso!');
            };

            const deleteStateRecord = (id, stateArray, setter) => {
                setter(stateArray.filter(i => i.id !== id));
                showToast('Registro excluído!', 'success');
            };

            const handleUploadUniversal = (e, type) => {
                const file = e.target.files[0];
                if(!file) return;

                if (typeof XLSX === 'undefined') {
                    showToast("Biblioteca de planilhas não carregada.", "error");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                        
                        if(json.length === 0) { showToast('Arquivo vazio ou formato inválido.', 'error'); return; }

                        const processedData = json.map((row, index) => {
                            let obj = { ...row };
                            if (!obj.id && !obj.ID) obj.id = `IMP-${Date.now()}-${index}-${Math.random().toString(36).substr(2, 5)}`;
                            if (obj.ID) { obj.id = obj.ID; delete obj.ID; } 
                            if(typeof obj.Observações === 'string') obj.Observações = obj.Observações.replace(/\\n/g, '\n');
                            if(typeof obj['EAN/GTIN'] === 'string') obj['EAN/GTIN'] = obj['EAN/GTIN'].replace(/\\n/g, '\n');
                            return obj;
                        });

                        if(type === 'produtos') {
                            if(window.confirm(`Substituir a base de Produtos atual pelos ${processedData.length} novos? (Cancelar irá adicionar)`)) {
                                setProdutos(processedData);
                            } else { setProdutos([...processedData, ...produtos]); }
                        } else {
                            if(window.confirm(`Substituir a base de Kits atual pelos ${processedData.length} novos? (Cancelar irá adicionar)`)) {
                                setKits(processedData);
                            } else { setKits([...processedData, ...kits]); }
                        }
                        showToast(`${processedData.length} ${type} processados com sucesso!`, 'success');

                                        <button type="button" onClick={generateCaptcha} className="p-2 text-gray-500 hover:text-mercantil-blue transition" title="Gerar novo código">
                                            <i className="fas fa-sync-alt text-xl"></i>
                                        </button>
                                        <input 
                                            type="text" 
                                            required 
                                            value={pwdData.captcha} 
                                            onChange={(e) => setPwdData({...pwdData, captcha: e.target.value.toUpperCase()})}
                                            className="w-full sm:flex-1 border rounded-lg p-3 text-lg text-center font-mono focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:border-slate-600 dark:text-white uppercase" 
                                            placeholder="Digite o código"
                                        />
                                    </div>
                                </div>
                                
                                <div className="flex justify-end gap-3 pt-6 w-full">
                                    <button type="button" onClick={() => setIsPwdModalOpen(false)} className="px-5 py-2.5 border border-gray-300 dark:border-slate-600 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition font-medium">Cancelar</button>
                                    <button type="submit" className="px-6 py-2.5 bg-mercantil-blue text-white rounded-lg hover:bg-blue-800 shadow-md font-bold transition flex items-center"><i className="fas fa-save mr-2"></i> Confirmar Alteração</button>
                                </div>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        // --- COMPONENTE DE LOGIN ---
        const LoginScreen = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [attempts, setAttempts] = useState(0);
            const [error, setError] = useState('');
            const [blocked, setBlocked] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                if (blocked) return;

                // Busca a senha atual salva ou a senha padrão
                const currentPassword = localStorage.getItem('mrc_user_pwd') || '152416';

                if (username === 'isaac' && password === currentPassword) {
                    onLogin();
                } else {
                    const newAttempts = attempts + 1;
                    setAttempts(newAttempts);
                    if (newAttempts >= 3) {
                        setBlocked(true);
                        setError('');
                        enviarEmail();
                    } else {
                        setError(`Credenciais incorretas. Tentativa ${newAttempts} de 3.`);
                    }
                }
            };

            const enviarEmail = () => {
                setLoading(true);
                
                // Simulação de requisição para envio de e-mail (necessitaria de um backend/API real)
                setTimeout(() => {
                    setLoading(false);
                    setError('Limite de 3 tentativas excedido. A senha de recuperação foi enviada para o e-mail c*****f@gmail.com');
                }, 1500);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-gray-50 dark:bg-slate-900 p-4 w-full transition-colors duration-200">
                    <div className="w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-gray-200 dark:border-slate-700 p-8 fade-in">
                        <div className="flex flex-col items-center justify-center mb-8">
                            <LogoMercantil />
                            <h1 className="text-2xl font-extrabold text-mercantil-blue dark:text-blue-400 mt-4 tracking-tight">MERCANTIL ERP</h1>
                            <p className="text-sm text-gray-500 dark:text-gray-400 font-medium mt-1">Acesso Restrito</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Usuário</label>
                                <div className="relative">
                                    <i className="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                    <input 
                                        type="text" 
                                        value={username} 
                                        onChange={e => setUsername(e.target.value)} 
                                        disabled={blocked || loading}
                                        className="w-full pl-11 pr-4 py-3 border border-gray-300 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:text-white transition-all" 
                                        placeholder="Digite o usuário" 
                                        required 
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Senha</label>
                                <div className="relative">
                                    <i className="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                    <input 
                                        type="password" 
                                        value={password} 
                                        onChange={e => setPassword(e.target.value)} 
                                        disabled={blocked || loading}
                                        className="w-full pl-11 pr-4 py-3 border border-gray-300 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-mercantil-blue outline-none dark:bg-slate-900 dark:text-white transition-all" 
                                        placeholder="Digite a senha" 
                                        required 
                                    />
                                </div>
                            </div>

                            {error && (
                                <div className={`p-4 rounded-xl text-sm font-bold flex items-start gap-3 ${blocked ? 'bg-orange-50 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400 border border-orange-200 dark:border-orange-800' : 'bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-400 border border-red-200 dark:border-red-800'}`}>
                                    <i className={`fas ${blocked ? 'fa-envelope mt-0.5 text-lg' : 'fa-exclamation-triangle mt-0.5 text-lg'}`}></i>
                                    <span>{error}</span>
                                </div>
                            )}

                            <button 
                                type="submit" 
                                disabled={blocked || loading}
                                className="w-full bg-mercantil-blue hover:bg-blue-800 disabled:bg-gray-400 disabled:dark:bg-slate-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2 mt-2"
                            >
                                {loading ? (
                                    <><i className="fas fa-circle-notch fa-spin"></i> Autenticando...</>
                                ) : blocked ? (
                                    <><i className="fas fa-ban"></i> Acesso Bloqueado</>
                                ) : (
                                    <><i className="fas fa-sign-in-alt"></i> Entrar no Sistema</>
                                )}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            // O sessionStorage garante que ao fechar a aba/navegador, a sessão expira e o login seja exigido.
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return sessionStorage.getItem('mrc_auth') === 'true';
            });

            const handleLogin = () => {
                sessionStorage.setItem('mrc_auth', 'true');
                setIsAuthenticated(true);
            };

            const handleLogout = () => {
                sessionStorage.removeItem('mrc_auth');
                setIsAuthenticated(false);
            }

            if (!isAuthenticated) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return <MainApp onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
