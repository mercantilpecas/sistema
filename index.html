        const ImageOptimizer = ({ showToast }) => {
            const [originalFile, setOriginalFile] = useState(null); const [compressedFile, setCompressedFile] = useState(null); const [isCompressing, setIsCompressing] = useState(false); const [maxSizeMB, setMaxSizeMB] = useState(1);
            const handleUpload = async (e) => { const file = e.target.files[0]; if(file) { setOriginalFile(file); setCompressedFile(null); } };
            const compressImage = async () => {
                if(!originalFile) return; setIsCompressing(true);
                try { const options = { maxSizeMB: Number(maxSizeMB), maxWidthOrHeight: 1920, useWebWorker: true }; const compressed = await imageCompression(originalFile, options); setCompressedFile(compressed); showToast('Imagem otimizada com sucesso!', 'success'); } 
                catch (error) { showToast('Erro ao comprimir imagem', 'error'); } finally { setIsCompressing(false); }
            };
            const download = () => { if(!compressedFile) return; const url = URL.createObjectURL(compressedFile); const a = document.createElement('a'); a.href = url; a.download = `opt_${originalFile.name}`; a.click(); };

            return (
                <div className="glass-panel p-6 sm:p-8 rounded-3xl shadow-sm fade-in max-w-4xl mx-auto w-full">
                    <h2 className="text-2xl font-extrabold mb-2 flex items-center gap-3"><div className="w-10 h-10 rounded-xl bg-green-100 text-green-600 flex items-center justify-center"><i className="fas fa-compress-arrows-alt"></i></div> Otimizador de Imagens</h2>
                    <p className="text-sm opacity-70 mb-8 ml-14">Reduza o peso das imagens para enviar ao site ou WhatsApp sem perder qualidade visual.</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="border-2 border-dashed border-gray-300 dark:border-slate-600 rounded-3xl p-8 flex flex-col items-center justify-center text-center bg-white/50 dark:bg-black/20 relative transition-colors hover:bg-black/5 dark:hover:bg-white/5 group">
                            <input type="file" accept="image/*" onChange={handleUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            <i className="fas fa-cloud-upload-alt text-5xl opacity-40 mb-4 group-hover:scale-110 transition-transform"></i>
                            <p className="font-bold">Clique ou arraste a imagem</p>
                            {originalFile && <p className="text-sm text-mercantil-blue mt-3 font-bold bg-blue-50 dark:bg-blue-900/30 px-3 py-1 rounded-lg break-all">{originalFile.name} ({(originalFile.size/1024/1024).toFixed(2)} MB)</p>}
                        </div>
                        <div className="flex flex-col justify-center space-y-6">
                            <div className="glass-input p-5 rounded-2xl">
                                <label className="block text-sm font-extrabold mb-3">Tamanho Máximo Alvo: <span className="text-mercantil-blue">{maxSizeMB} MB</span></label>
                                <input type="range" min="0.1" max="5" step="0.1" value={maxSizeMB} onChange={e=>setMaxSizeMB(e.target.value)} className="w-full accent-mercantil-blue h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                            </div>
                            <button onClick={compressImage} disabled={!originalFile || isCompressing} className="w-full bg-mercantil-blue text-white font-extrabold py-4 rounded-2xl shadow-lg disabled:opacity-50 hover:bg-blue-800 transition-all flex justify-center items-center transform hover:scale-[1.02]">
                                {isCompressing ? <><i className="fas fa-spinner fa-spin mr-2"></i> Comprimindo...</> : <><i className="fas fa-magic mr-2"></i> Otimizar Agora</>}
                            </button>
                            {compressedFile && (

        const ImageConverter = ({ showToast }) => {

            const handleUpload = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (event) => { const img = new Image(); img.onload = () => setImage(img); img.src = event.target.result; }; reader.readAsDataURL(file); } };
            const download = () => { if(!image || !canvasRef.current) return; const canvas = canvasRef.current; canvas.width = image.width; canvas.height = image.height; const ctx = canvas.getContext('2d'); ctx.drawImage(image, 0, 0); const url = canvas.toDataURL(format, 0.9); const a = document.createElement('a'); a.href = url; a.download = `convertida.${format.split('/')[1]}`; a.click(); showToast(`Imagem convertida para ${format.split('/')[1].toUpperCase()}!`, 'success'); };

        const ImageEditor = ({ showToast }) => {
            const [image, setImage] = useState(null); const [settings, setSettings] = useState({ brightness: 100, contrast: 100, saturate: 100, text: '', textY: 90 }); const canvasRef = useRef(null);
            const handleUpload = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (evt) => { const img = new Image(); img.onload = () => { setImage(img); setSettings({ brightness: 100, contrast: 100, saturate: 100, text: '', textY: 90 }); }; img.src = evt.target.result; }; reader.readAsDataURL(file); } };
            const drawCanvas = () => { if(!image || !canvasRef.current) return; const cvs = canvasRef.current; const ctx = cvs.getContext('2d'); cvs.width = image.width; cvs.height = image.height; ctx.filter = `brightness(${settings.brightness}%) contrast(${settings.contrast}%) saturate(${settings.saturate}%)`; ctx.drawImage(image, 0, 0); ctx.filter = 'none'; if(settings.text) { ctx.fillStyle = 'white'; ctx.font = `bold ${Math.floor(image.height * 0.05)}px Arial`; ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10; ctx.fillText(settings.text, image.width / 2, (image.height * settings.textY) / 100); } };
            useEffect(() => { drawCanvas(); }, [image, settings]);
            const download = () => { if(!canvasRef.current) return; const url = canvasRef.current.toDataURL('image/jpeg', 0.9); const a = document.createElement('a'); a.href = url; a.download = `editada_${Date.now()}.jpg`; a.click(); showToast('Imagem exportada!', 'success');};

            return (
                <div className="glass-panel p-6 sm:p-8 rounded-3xl shadow-sm fade-in max-w-6xl mx-auto flex flex-col lg:flex-row gap-8 w-full">
                    <div className="flex-1 flex flex-col">

                        </label>

                            {!image ? <span className="text-gray-400 font-extrabold text-xl opacity-50">Studio Vazio</span> : <canvas ref={canvasRef} className="max-w-full max-h-[600px] object-contain shadow-2xl rounded-lg"></canvas>}
                        </div>
                    </div>
                    <div className="w-full lg:w-80 flex flex-col space-y-5 lg:pt-16">
                        <div className="glass-input p-5 rounded-3xl shadow-sm">

                            <label className="block text-xs font-bold opacity-70 mb-1">Contraste ({settings.contrast}%)</label>
                            <input type="range" min="0" max="200" value={settings.contrast} onChange={e=>setSettings({...settings, contrast: e.target.value})} className="w-full mb-4 accent-mercantil-blue" disabled={!image}/>
                            <label className="block text-xs font-bold opacity-70 mb-1">Saturação ({settings.saturate}%)</label>
                            <input type="range" min="0" max="200" value={settings.saturate} onChange={e=>setSettings({...settings, saturate: e.target.value})} className="w-full accent-mercantil-blue" disabled={!image}/>
                        </div>

            );

        // --- COMPONENTE DADOS & BACKUP ---
        const ImportExport = ({ produtos, setProdutos, kits, setKits, atendimentos, devolucoes, qualidade, marketing, gerencia, compliance, fretes, tarefas, notas, usuarios, setLastBackup, showToast, supabase }) => {
            const forceBackupNow = () => {
                const fullSystemDump = { usuarios, produtos, kits, atendimentos, devolucoes, qualidade, marketing, gerencia, compliance, fretes, tarefas, notas };
                localStorage.setItem('mrc_auto_backup_dump', JSON.stringify(fullSystemDump));
                const now = new Date().toISOString();
                setLastBackup(now);
                showToast('Backup manual gravado com sucesso no navegador.', 'success');
            };

            const downloadBackup = () => {
                const data = localStorage.getItem('mrc_auto_backup_dump');
                if(!data) { showToast('Gere um backup primeiro clicando no botão ao lado!', 'error'); return; }
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a"); link.href = url; link.download = `Mercantil_ERP_Backup_${new Date().toISOString().split('T')[0]}.json`; link.click();
                showToast('Download do backup concluído.');
            };

            const handleRestoreJSON = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        if (data.produtos || data.kits || data.fretes || data.atendimentos || data.tarefas || data.notas || data.devolucoes) {
                            if (window.confirm("ATENÇÃO CRÍTICA: Restaurar um backup irá APAGAR E SUBSTITUIR todos os dados da NUVEM e LOCAL pelo conteúdo deste arquivo. Tem certeza absoluta?")) {
                                if(data.produtos) setProdutos(data.produtos); if(data.kits) setKits(data.kits);
                                showToast("Restauração concluída! (Recarregue a página se não ver os itens na nuvem).", "success");
                            }
                        } else { showToast("Arquivo JSON não reconhecido pelo sistema Mercantil ERP.", "error"); }
                    } catch(err) { showToast("Erro ao processar o arquivo. JSON inválido.", "error"); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const handleUploadUniversal = (e, type) => {
                const file = e.target.files[0]; if(!file) return;
                if (typeof XLSX === 'undefined') { showToast("Biblioteca de planilhas não carregada.", "error"); return; }
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result; const workbook = XLSX.read(data, { type: 'array' }); const firstSheetName = workbook.SheetNames[0]; const worksheet = workbook.Sheets[firstSheetName]; const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                        if(json.length === 0) { showToast('Arquivo vazio ou formato inválido.', 'error'); return; }
                        const processedData = json.map((row, index) => {
                            let obj = { ...row };
                            if (!obj.id && !obj.ID) obj.id = `IMP-${Date.now()}-${index}-${Math.random().toString(36).substr(2, 5)}`;
                            if (obj.ID) { obj.id = obj.ID; delete obj.ID; } 
                            if(typeof obj.Observações === 'string') obj.Observações = obj.Observações.replace(/\\n/g, '\n');
                            if(typeof obj['EAN/GTIN'] === 'string') obj['EAN/GTIN'] = obj['EAN/GTIN'].replace(/\\n/g, '\n');
                            return obj;
                        });
                        if(type === 'produtos') { if(window.confirm(`Substituir a base atual pelos ${processedData.length} novos? (Cancelar irá adicionar)`)) { setProdutos(processedData); } else { setProdutos([...processedData, ...produtos]); } } 
                        else { if(window.confirm(`Substituir a base atual pelos ${processedData.length} novos? (Cancelar irá adicionar)`)) { setKits(processedData); } else { setKits([...processedData, ...kits]); } }
                        showToast(`${processedData.length} ${type} processados com sucesso!`, 'success');
                    } catch (error) { showToast('Erro ao ler arquivo. Formato não suportado.', 'error'); }
                };
                reader.readAsArrayBuffer(file); e.target.value = ''; 
            };

            return (
                <div className="fade-in space-y-6 max-w-6xl mx-auto">

                            </div>

                                <label className="flex items-center justify-center w-full p-4 glass-input rounded-xl hover:bg-blue-50 dark:hover:bg-slate-800 cursor-pointer transition font-bold shadow-sm text-center text-mercantil-blue dark:text-blue-400">

                            <p className="text-sm opacity-70 mb-6 max-w-xs">Destruição total da base de dados na Nuvem e Local. Ação irreversível.</p>
                            <button onClick={() => {
                                if(window.confirm('TEM CERTEZA ABSOLUTA? Tudo será apagado da nuvem (Supabase) e do navegador.')) {
                                    localStorage.clear();

        };

        // --- COMPONENTE DE GESTÃO DE USUÁRIOS ---
        const UsuariosManager = ({ usuarios, setUsuarios, showToast, loggedUsername }) => {
            const [editUser, setEditUser] = useState(null);

            const modulosList = [
                { id: 'painel', label: 'Painel Geral' }, { id: 'tarefas', label: 'Tarefas (Kanban)' }, { id: 'notas', label: 'Bloco de Notas' },

                { id: 'devolucoes', label: 'Devoluções' }, { id: 'qualidade', label: 'Gestão de Qualidade' }, { id: 'marketing', label: 'Marketing' },
                { id: 'gerencia', label: 'Gerência Interna' }, { id: 'compliance', label: 'Compliance' }, { id: 'ferramentas', label: 'Ferramentas de Imagem' },

            ];

            const handleSave = (e) => {
                e.preventDefault(); const formData = new FormData(e.target); const data = Object.fromEntries(formData.entries());
                
                // Correção definitiva do BUG do ID de login: pega do editUser se já existir
                const finalUsername = editUser.id ? editUser.username : data.username;

                if(!editUser.id && usuarios.find(u => u.username === finalUsername)) {
                    return showToast('Este nome de usuário já existe.', 'error');
                }
                
                const permissoes = {}; modulosList.forEach(m => { permissoes[m.id] = data[`perm_${m.id}`] || 'none'; });
                
                const isIsaac = editUser.username === 'isaac' || finalUsername === 'isaac';
                
                const newUser = { 
                    id: editUser.id || `USR-${Date.now()}`, 
                    nome: data.nome, 
                    username: isIsaac ? 'isaac' : finalUsername, 
                    password: data.password || editUser.password, 
                    ativo: isIsaac ? true : data.ativo === 'true', 
                    permissoes: isIsaac ? { all: 'edit' } : permissoes 
                };
                
                if (editUser.id) { 
                    // Update user
                    const updatedUsers = usuarios.map(u => u.id === editUser.id ? newUser : u);
                    setUsuarios(updatedUsers); 
                    showToast('Usuário atualizado!');

                else { 
                    // Create user
                    const newUsersList = [...usuarios, newUser];
                    setUsuarios(newUsersList); 
                    showToast('Usuário criado!'); 
                }
                setEditUser(null);
            };

            const isCurrent = (u) => u.username === loggedUsername; const isSuperAdmin = (u) => u.username === 'isaac' || u.permissoes?.all === 'edit';

            return (
                <div className="glass-panel rounded-3xl shadow-sm flex flex-col h-full fade-in w-full overflow-hidden">

                        <button onClick={() => setEditUser({})} className="bg-gradient-to-r from-mercantil-blue to-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md transform hover:scale-[1.02] transition-all flex items-center"><i className="fas fa-user-plus mr-2"></i> Novo Usuário</button>
                    </div>
                    <div className="p-0 overflow-x-auto flex-1 custom-scroll">

                            </thead>
                            <tbody className="divide-y divide-black/5 dark:divide-white/5">
                                {usuarios.map(u => (
                                    <tr key={u.id} className="hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                                        <td className="px-6 py-4">
                                            <div className="font-extrabold text-base">{u.nome} {isCurrent(u) && <span className="text-[10px] bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full ml-2">Você</span>} {u.username === 'isaac' && <span className="text-[10px] bg-orange-100 text-orange-800 px-2 py-0.5 rounded-full ml-2"><i className="fas fa-crown"></i> Admin Master</span>}</div>
                                            <div className="text-xs opacity-60 font-mono mt-1">@{u.username}</div>
                                        </td>
                                        <td className="px-6 py-4">
                                            <span className={`px-3 py-1 rounded-full text-xs font-bold ${u.ativo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{u.ativo ? 'Ativo / Liberado' : 'Bloqueado'}</span>
                                        </td>
                                        <td className="px-6 py-4 text-right">
                                            <button onClick={()=>setEditUser(u)} className="w-9 h-9 rounded-full bg-white dark:bg-slate-700 shadow-sm border border-gray-300 dark:border-slate-600 text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-600 mx-1 transition-all"><i className="fas fa-edit"></i></button>
                                            {u.username !== 'isaac' && !isCurrent(u) && <button onClick={()=>{if(window.confirm('Excluir este usuário?')) setUsuarios(usuarios.filter(x=>x.id!==u.id));}} className="w-9 h-9 rounded-full bg-white dark:bg-slate-700 shadow-sm border border-gray-300 dark:border-slate-600 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-slate-600 mx-1 transition-all"><i className="fas fa-trash"></i></button>}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editUser && (
                        <Modal title={editUser.id ? `Editar: ${editUser.nome}` : 'Novo Usuário'} onClose={() => setEditUser(null)}>
                            <form onSubmit={handleSave} className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div><label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Nome Completo *</label><input type="text" name="nome" required defaultValue={editUser.nome} className="w-full rounded-xl p-3 text-sm glass-input" /></div>
                                    <div><label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Login (Usuário) *</label><input type="text" name="username" required defaultValue={editUser.username} disabled={!!editUser.id} className="w-full rounded-xl p-3 text-sm glass-input disabled:opacity-50" /></div>

                                    <div>

                                {editUser.username !== 'isaac' && (
                                    <div className="border-t border-black/5 dark:border-white/5 pt-5 mt-2">
                                        <h4 className="font-extrabold text-sm mb-4"><i className="fas fa-shield-alt mr-2 text-mercantil-blue"></i>Permissões de Módulos</h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[40vh] overflow-y-auto custom-scroll p-1 pr-3">
                                            {modulosList.map(mod => {
                                                const currentVal = editUser.permissoes?.[mod.id] || 'none';
                                                return (

                                                        <span className="text-xs font-bold">{mod.label}</span>

                                                            <option value="none">Sem Acesso</option>
                                                            <option value="read">Visualizar</option>
                                                            <option value="edit_no_delete">Criar/Editar (Sem Excluir)</option>
                                                            <option value="edit">Controle Total</option>
                                                        </select>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                                {editUser.username === 'isaac' && <div className="p-4 bg-orange-50/80 border border-orange-200 text-orange-800 rounded-xl font-bold text-sm text-center"><i className="fas fa-crown text-xl block mb-2"></i> Usuário Mestre (Administrador)<br/><span className="font-normal opacity-80">Acesso total e inalterável a todo o ERP.</span></div>}
                                <div className="hidden"><button type="submit" id="hiddenUserSubmitBtn">Salvar</button></div>
                                <div className="flex justify-end pt-4"><button type="submit" className="w-full bg-mercantil-blue text-white py-3.5 rounded-xl font-bold shadow-md transform hover:scale-[1.02] transition-all">Salvar Configurações de Usuário</button></div>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        // --- APLICAÇÃO PRINCIPAL ---
        const MainApp = ({ onLogout, loggedUsername }) => {
            const [toast, setToast] = useState({ visible: false, message: '', type: 'success' });
            const showToast = (message, type = 'success') => { setToast({ visible: true, message, type }); setTimeout(() => setToast(t => ({ ...t, visible: false })), 4000); };

            const [darkMode, setDarkMode] = useLocalStorage('mrc_theme_dark', false);
            const [activeMenu, setActiveMenu] = useState('painel');
            
            // Controle dinâmico da Sidebar com base no tamanho da tela
            const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth >= 1024);
            useEffect(() => {
                const handleResize = () => setIsSidebarOpen(window.innerWidth >= 1024);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            
            const [isUserMenuOpen, setIsUserMenuOpen] = useState(false);
            const [isPwdModalOpen, setIsPwdModalOpen] = useState(false);
            const [pwdData, setPwdData] = useState({ current: '', new1: '', new2: '', captcha: '' });
            const [captchaText, setCaptchaText] = useState('');
            
            // --- INSTANCIAÇÃO DE ESTADOS E TABELAS (TUDO NA TABELA 'DATA') ---
            const adminIsaac = { id: 'usr-admin-isaac', username: 'isaac', password: '002366', nome: 'Isaac (Administrador)', ativo: true, permissoes: { all: 'edit' } };
            
            // Raw state pulled exactly like any other table via useLocalStorage
            const [rawUsuarios, setRawUsuarios] = useLocalStorage('mrc_usuarios', []); 
            
            // Derived array that unconditionally protects Isaac
            const usuarios = useMemo(() => {
                let arr = Array.isArray(rawUsuarios) ? [...rawUsuarios] : [];
                const idx = arr.findIndex(u => u.username === 'isaac');
                if (idx === -1) arr.push(adminIsaac);
                else arr[idx] = { ...arr[idx], ...adminIsaac }; // Reforça Isaac
                return arr;
            }, [rawUsuarios]);

            // Wrapped setter that ensures Isaac is present before sending to Supabase 'data' table
            const setUsuarios = (newUsers) => {
                let arr = Array.isArray(newUsers) ? [...newUsers] : [];
                const idx = arr.findIndex(u => u.username === 'isaac');
                if (idx === -1) arr.push(adminIsaac);
                else arr[idx] = { ...arr[idx], ...adminIsaac }; // Reforça Isaac
                setRawUsuarios(arr); // Isso faz o Upsert na tabela 'data' onde tipo='usuarios'
            };

            const [produtos, setProdutos] = useLocalStorage('mrc_produtos', []);
            const [kits, setKits] = useLocalStorage('mrc_kits', []);
            const [atendimentos, setAtendimentos] = useLocalStorage('mrc_atendimentos', []);
            const [devolucoes, setDevolucoes] = useLocalStorage('mrc_devolucoes', []);
            const [qualidade, setQualidade] = useLocalStorage('mrc_qualidade', []);
            const [marketing, setMarketing] = useLocalStorage('mrc_marketing', []);
            const [gerencia, setGerencia] = useLocalStorage('mrc_gerencia', []);
            const [compliance, setCompliance] = useLocalStorage('mrc_compliance', []);
            const [fretes, setFretes] = useLocalStorage('mrc_fretes', []);
            const [tarefas, setTarefas] = useLocalStorage('mrc_tarefas', []);
            const [notas, setNotas] = useLocalStorage('mrc_notas', []);
            const [lastBackup, setLastBackup] = useLocalStorage('mrc_last_backup_time', null);

            const db = useMemo(() => ({ produtos, kits, atendimentos, devolucoes, qualidade, fretes, marketing, gerencia, compliance, tarefas, notas, usuarios }), [produtos, kits, atendimentos, devolucoes, qualidade, fretes, marketing, gerencia, compliance, tarefas, notas, usuarios]);

            // Sistema de Permissões Consolidado
            const currentUser = usuarios.find(u => u.username === loggedUsername) || adminIsaac;
            const isSuperAdminFunc = (u) => u?.username === 'isaac' || u?.permissoes?.all === 'edit';
            const isSuperAdmin = isSuperAdminFunc(currentUser);

            const checkPerm = (modulo) => { if (isSuperAdmin) return 'edit'; return currentUser.permissoes?.[modulo] || 'none'; };
            const canEdit = (modulo) => { const p = checkPerm(modulo); return p === 'edit' || p === 'edit_no_delete'; };
            const canDelete = (modulo) => checkPerm(modulo) === 'edit';

                                {showComercial && <div className="pt-5 pb-2"><p className="px-5 text-[10px] font-extrabold opacity-40 uppercase tracking-widest">Comercial</p></div>}
                                <MenuItem id="catalogo" icon="fas fa-cubes" label="Catálogo / Peças" />
                                <MenuItem id="fretes" icon="fas fa-truck" label="Gestão de Fretes" />
                                
                                {showQualidade && <div className="pt-5 pb-2"><p className="px-5 text-[10px] font-extrabold opacity-40 uppercase tracking-widest">Atendimento e Qualidade</p></div>}
                                <MenuItem id="crm" icon="fas fa-headset" label="CRM Integrado" />
                                <MenuItem id="devolucoes" icon="fas fa-undo-alt" label="Devoluções" />
                                <MenuItem id="qualidade" icon="fas fa-medal" label="Gestão de Qualidade" />
                                
                                {showFerramentas && (
                                    <>
                                        <div className="pt-5 pb-2"><p className="px-5 text-[10px] font-extrabold opacity-40 uppercase tracking-widest">Ferramentas App</p></div>
                                        <MenuItem id="image-editor" icon="fas fa-paint-brush" label="Editor Visual" sub />
                                        <MenuItem id="image-converter" icon="fas fa-exchange-alt" label="Conversor (WEBP)" sub />
                                        <MenuItem id="image-optimizer" icon="fas fa-compress-arrows-alt" label="Otimizar Peso" sub />
                                    </>
                                )}

                                {showAdmin && <div className="pt-5 pb-2"><p className="px-5 text-[10px] font-extrabold opacity-40 uppercase tracking-widest">Administração</p></div>}
                                <MenuItem id="marketing" icon="fas fa-bullhorn" label="Marketing" />
                                <MenuItem id="gerencia" icon="fas fa-briefcase" label="Gerência Interna" />
                                <MenuItem id="compliance" icon="fas fa-shield-alt" label="Compliance" />

                                {showSistema && <div className="pt-5 pb-2"><p className="px-5 text-[10px] font-extrabold opacity-40 uppercase tracking-widest">Sistema</p></div>}
                                <MenuItem id="usuarios" icon="fas fa-users-cog" label="Gestão de Usuários" />
                                <MenuItem id="dados" icon="fas fa-database" label="Dados & Backup" />
                            </nav>
                            <div className="p-5 border-t border-black/5 dark:border-white/5 bg-white/30 dark:bg-black/20 text-center flex items-center justify-center gap-3">
                                <button onClick={() => setDarkMode(!darkMode)} className="w-10 h-10 rounded-full bg-black/5 hover:bg-black/10 dark:bg-white/10 dark:hover:bg-white/20 transition-colors flex items-center justify-center"><i className={`fas ${darkMode ? 'fa-sun text-yellow-400' : 'fa-moon text-slate-600'} text-lg`}></i></button>
                                <span className="text-xs font-bold opacity-50">V 5.2 (Liquid UI)</span>
                            </div>
                        </aside>
                    </div>

                    {/* Cabeçalho Mobile */}
                    <div className="lg:hidden fixed top-0 left-0 right-0 glass-panel border-b border-black/5 dark:border-white/5 z-[60] p-4 flex justify-between items-center w-full">
                        <div className="flex gap-4 items-center"><button onClick={() => setIsSidebarOpen(true)} className="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/10 flex items-center justify-center"><i className="fas fa-bars text-lg"></i></button><div className="font-extrabold text-mercantil-blue dark:text-blue-400 text-lg flex items-center gap-2 tracking-tight"><LogoMercantil /> MERCANTIL</div></div>
                        <button onClick={() => setDarkMode(!darkMode)} className="w-10 h-10 rounded-full bg-black/5 hover:bg-black/10 dark:bg-white/10 dark:hover:bg-white/20 transition-colors flex items-center justify-center"><i className={`fas ${darkMode ? 'fa-sun text-yellow-400' : 'fa-moon text-slate-600'} text-lg`}></i></button>
                    </div>

                    <main className="flex-1 flex flex-col h-full overflow-hidden mt-[76px] lg:mt-0 relative w-full">
                        {/* Cabeçalho Desktop */}
                        <header className="glass-panel border-b border-black/5 dark:border-white/5 px-8 py-5 hidden lg:flex justify-between items-center shadow-sm w-full relative z-[60]">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 flex items-center justify-center transition-colors">
                                    <i className="fas fa-bars text-lg opacity-80"></i>
                                </button>
                                <h2 className="text-2xl font-extrabold capitalize flex items-center gap-3 tracking-tight">
                                    {activeMenu.replace('-', ' ')}
                                    {isReadOnly(activeMenu) && activeMenu !== 'painel' && activeMenu !== 'ferramentas' && activeMenu !== 'dados' && <span className="text-[10px] bg-red-100 text-red-600 border border-red-200 px-2.5 py-1 rounded-lg uppercase tracking-widest font-extrabold shadow-sm"><i className="fas fa-eye mr-1"></i> Somente Leitura</span>}
                                </h2>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="relative">
                                    <div onClick={() => setIsUserMenuOpen(!isUserMenuOpen)} className="h-11 w-11 rounded-full bg-gradient-to-br from-mercantil-blue to-blue-600 text-white flex items-center justify-center font-bold shadow-lg cursor-pointer hover:scale-105 transition-transform border-2 border-white/50"><i className="fas fa-user-astronaut text-xl"></i></div>
                                    {isUserMenuOpen && (
                                        <>
                                            <div className="fixed inset-0 z-[60]" onClick={() => setIsUserMenuOpen(false)}></div>
                                            <div className="absolute right-0 mt-3 w-64 glass-panel rounded-2xl shadow-2xl border border-white/20 py-2 z-[70] fade-in">
                                                <div className="px-5 py-4 border-b border-black/5 dark:border-white/5 mb-2 bg-white/40 dark:bg-black/20"><p className="text-xs font-bold opacity-50 uppercase tracking-widest">Conectado como</p><p className="text-base font-extrabold truncate mt-1 text-mercantil-blue dark:text-blue-400">{currentUser.nome}</p></div>
                                                <button onClick={() => { setIsPwdModalOpen(true); setIsUserMenuOpen(false); }} className="w-full text-left px-5 py-3 text-sm font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-colors flex items-center"><div className="w-8 h-8 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-mercantil-blue dark:text-blue-400 flex items-center justify-center mr-3"><i className="fas fa-key"></i></div> Alterar Senha</button>
                                                <button onClick={onLogout} className="w-full text-left px-5 py-3 text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors flex items-center"><div className="w-8 h-8 rounded-lg bg-red-50 dark:bg-red-900/30 text-red-500 flex items-center justify-center mr-3"><i className="fas fa-power-off"></i></div> Sair do Sistema</button>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scroll w-full relative z-[10]">
                            {activeMenu === 'painel' && <Dashboard />}
                            {activeMenu === 'tarefas' && <TarefasManager tarefas={tarefas} setTarefas={setTarefas} usuarios={usuarios} showToast={showToast} db={db} authContext={{ currentUser, isSuperAdmin }} />}
                            {activeMenu === 'notas' && <NotasManager notas={notas} setNotas={setNotas} showToast={showToast} db={db} authContext={{ currentUser, isSuperAdmin }} />}
                            {activeMenu === 'catalogo' && <CatalogoManager produtos={produtos} setProdutos={setProdutos} kits={kits} setKits={setKits} produtosConfig={produtosConfig} kitsConfig={kitsConfig} catalogColumns={catalogColumns} showToast={showToast} saveStateRecord={saveStateRecord} deleteStateRecord={deleteStateRecord} db={db} readOnly={!canEdit('catalogo')} canDelete={canDelete('catalogo')} authContext={{ currentUser, isSuperAdmin }} />}
                            
                            {/* CRM Integrado modificado */}
                            {activeMenu === 'crm' && <BaseManager title="CRM Integrado" icon="fas fa-headset" data={atendimentos} formConfig={crmConfig} showToast={showToast} db={db} readOnly={!canEdit('crm')} canDelete={canDelete('crm')} authContext={{ currentUser, isSuperAdmin }} 
                                onValidate={d=>{
                                    if(!d.protocolo) { showToast('Gere o protocolo antes de salvar.', 'error'); return false; }
                                    if(!handleCpfCnpjValidation(d.documento)) { showToast('Preencha um CPF ou CNPJ válido!', 'error'); return false; }
                                    return true;
                                }} 
                                onSave={d=>saveStateRecord(d, atendimentos, setAtendimentos)} onDelete={id=>deleteStateRecord(id, atendimentos, setAtendimentos)} columns={[{field:'protocolo',header:'Prot.',render:v=><span className="font-mono font-bold text-mercantil-light"><i className="fas fa-hashtag opacity-50 text-xs"></i> {v}</span>},{field:'cliente',header:'Cliente'},{field:'status',header:'Status'}]} />}
                                
                            {/* Devoluções modificado */}
                            {activeMenu === 'devolucoes' && <BaseManager title="Gestão de Devoluções" icon="fas fa-undo-alt" data={devolucoes} formConfig={devolucoesConfig} showToast={showToast} db={db} readOnly={!canEdit('devolucoes')} canDelete={canDelete('devolucoes')} authContext={{ currentUser, isSuperAdmin }} 
                                onValidate={d=>{
                                    if(!d.protocolo) { showToast('Gere o protocolo de devolução.', 'error'); return false; }
                                    if(!handleCpfCnpjValidation(d.documento)) { showToast('Preencha um CPF ou CNPJ válido!', 'error'); return false; }
                                    return true;
                                }} 
                                onSave={d=>saveStateRecord(d, devolucoes, setDevolucoes)} onDelete={id=>deleteStateRecord(id, devolucoes, setDevolucoes)} columns={[{field:'protocolo',header:'Prot.',render:v=><span className="font-mono font-bold text-mercantil-light"><i className="fas fa-hashtag opacity-50 text-xs"></i> {v}</span>},{field:'cliente',header:'Cliente'},{field:'status',header:'Status'}]} />}
                                
                            {activeMenu === 'qualidade' && <BaseManager title="Gestão de Qualidade" icon="fas fa-medal" data={qualidade} formConfig={qualidadeConfig} showToast={showToast} db={db} readOnly={!canEdit('qualidade')} canDelete={canDelete('qualidade')} authContext={{ currentUser, isSuperAdmin }} onSave={d=>saveStateRecord(d, qualidade, setQualidade)} onDelete={id=>deleteStateRecord(id, qualidade, setQualidade)} columns={[{field:'data',header:'Data',render:v=><span className="font-mono font-bold opacity-80">{v}</span>},{field:'tipo',header:'Tipo'},{field:'status',header:'Status'}]} />}
                            {activeMenu === 'marketing' && <BaseManager title="Marketing" icon="fas fa-bullhorn" data={marketing} formConfig={marketingConfig} showToast={showToast} db={db} readOnly={!canEdit('marketing')} canDelete={canDelete('marketing')} authContext={{ currentUser, isSuperAdmin }} onSave={d=>saveStateRecord(d, marketing, setMarketing)} onDelete={id=>deleteStateRecord(id, marketing, setMarketing)} columns={[{field:'data',header:'Data',render:v=><span className="font-mono font-bold opacity-80">{v}</span>},{field:'plataforma',header:'Mídia'},{field:'status',header:'Status'}]} />}
                            {activeMenu === 'gerencia' && <BaseManager title="Gerência Interna" icon="fas fa-briefcase" data={gerencia} formConfig={gerenciaConfig} showToast={showToast} db={db} readOnly={!canEdit('gerencia')} canDelete={canDelete('gerencia')} authContext={{ currentUser, isSuperAdmin }} onSave={d=>saveStateRecord(d, gerencia, setGerencia)} onDelete={id=>deleteStateRecord(id, gerencia, setGerencia)} columns={[{field:'data',header:'Data',render:v=><span className="font-mono font-bold opacity-80">{v}</span>},{field:'tipo',header:'Categoria'},{field:'titulo',header:'Assunto'}]} />}
                            {activeMenu === 'compliance' && <BaseManager title="Compliance" icon="fas fa-shield-alt" data={compliance} formConfig={complianceConfig} showToast={showToast} db={db} readOnly={!canEdit('compliance')} canDelete={canDelete('compliance')} authContext={{ currentUser, isSuperAdmin }} onSave={d=>saveStateRecord(d, compliance, setCompliance)} onDelete={id=>deleteStateRecord(id, compliance, setCompliance)} columns={[{field:'codigo',header:'Cód.',render:v=><span className="font-mono font-extrabold text-mercantil-orange">{v}</span>},{field:'titulo',header:'Título'},{field:'status',header:'Status'}]} />}
                            {activeMenu === 'fretes' && <FretesManager data={fretes} onSaveData={setFretes} showToast={showToast} readOnly={!canEdit('fretes')} canDelete={canDelete('fretes')} />}
                            {activeMenu === 'usuarios' && <UsuariosManager usuarios={usuarios} setUsuarios={setUsuarios} showToast={showToast} loggedUsername={loggedUsername} />}
                            
                            {/* Ferramentas */}
                            {activeMenu === 'image-optimizer' && <ImageOptimizer showToast={showToast} />}
                            {activeMenu === 'image-converter' && <ImageConverter showToast={showToast} />}
                            {activeMenu === 'image-editor' && <ImageEditor showToast={showToast} />}
                            
                            {/* Dados & Backup Completo */}
                            {activeMenu === 'dados' && <ImportExport produtos={produtos} setProdutos={setProdutos} kits={kits} setKits={setKits} atendimentos={atendimentos} devolucoes={devolucoes} qualidade={qualidade} marketing={marketing} gerencia={gerencia} compliance={compliance} fretes={fretes} tarefas={tarefas} notas={notas} usuarios={usuarios} setLastBackup={setLastBackup} showToast={showToast} supabase={supabase} />}
                        </div>
                    </main>

                    {isPwdModalOpen && (
                        <Modal title="Alterar Minha Senha" onClose={() => setIsPwdModalOpen(false)}>
                            <form onSubmit={handlePwdChangeSubmit} className="space-y-5 px-1 sm:px-4 py-2">
                                <div><label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Senha Atual *</label><input type="password" required value={pwdData.current} onChange={(e) => setPwdData({...pwdData, current: e.target.value})} className="w-full rounded-xl p-3.5 text-sm glass-input font-bold tracking-widest" /></div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                    <div><label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Nova Senha *</label><input type="password" required value={pwdData.new1} onChange={(e) => setPwdData({...pwdData, new1: e.target.value})} className="w-full rounded-xl p-3.5 text-sm glass-input font-bold tracking-widest" placeholder="Mín. 6 char"/></div>
                                    <div><label className="block text-xs font-bold mb-1 opacity-70 uppercase tracking-wider ml-1">Confirmar Senha *</label><input type="password" required value={pwdData.new2} onChange={(e) => setPwdData({...pwdData, new2: e.target.value})} className="w-full rounded-xl p-3.5 text-sm glass-input font-bold tracking-widest" /></div>
                                </div>
                                <div className="pt-5 border-t border-gray-200 dark:border-slate-700 mt-4">
                                    <label className="block text-xs font-bold mb-3 opacity-70 uppercase tracking-wider ml-1">Confirmação (Captcha)</label>
                                    <div className="flex flex-col sm:flex-row gap-4 items-center">
                                        <div className="captcha-box p-4 rounded-xl font-mono text-2xl font-extrabold line-through decoration-gray-400 opacity-80 w-full sm:w-auto min-w-[140px] text-center shadow-inner bg-black/5 dark:bg-white/5">{captchaText}</div>
                                        <button type="button" onClick={generateCaptcha} className="w-12 h-12 rounded-full bg-black/5 hover:bg-black/10 dark:bg-white/10 flex items-center justify-center transition-colors"><i className="fas fa-sync-alt"></i></button>
                                        <input type="text" required value={pwdData.captcha} onChange={(e) => setPwdData({...pwdData, captcha: e.target.value.toUpperCase()})} className="w-full sm:flex-1 rounded-xl p-4 font-mono text-center text-lg font-bold glass-input uppercase" placeholder="CÓDIGO" />
                                    </div>
                                </div>
                                <div className="flex justify-end pt-8"><button type="submit" className="w-full bg-gradient-to-r from-mercantil-blue to-blue-600 text-white py-4 rounded-xl font-extrabold shadow-lg transform hover:scale-[1.02] transition-transform text-lg"><i className="fas fa-lock mr-2"></i> Confirmar Alteração</button></div>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [username, setUsername] = useState(''); 
            const [password, setPassword] = useState(''); 
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            
            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                setError('');
                
                const targetUser = username.toLowerCase().trim();
                const adminIsaac = { id: 'usr-admin-isaac', username: 'isaac', password: '002366', nome: 'Isaac (Administrador)', ativo: true, permissoes: { all: 'edit' } };
                
                // 1. FAILSAFE: Admin Mestre sempre autentica imediatamente
                if (targetUser === 'isaac' && password === '002366') {
                    window.localStorage.setItem('mrc_usuarios', JSON.stringify([adminIsaac]));
                    onLogin('isaac');
                    return;
                }

                try {
                    // 2. BUSCA DIRETO DA TABELA 'DATA' NO SUPABASE (Onde tipo = 'usuarios')
                    const { data: cloudData, error: fetchError } = await supabase.from('data').select('dados').eq('tipo', 'usuarios');
                    
                    let usersList = [];
                    
                    if (fetchError || !cloudData) {
                        try { 
                            const localData = window.localStorage.getItem('mrc_usuarios'); 
                            if (localData) usersList = JSON.parse(localData); 
                        } catch(err) {}
                    } else {
                        // Extrai os dados do campo JSONB 'dados' da tabela 'data'
                        usersList = cloudData.map(item => item.dados);
                    }

                    // Garante que o Isaac conste na lista validada
                    const isaacIdx = usersList.findIndex(u => u.username === 'isaac');
                    if (isaacIdx === -1) {
                        usersList.push(adminIsaac);
                    } else {
                        usersList[isaacIdx] = { ...usersList[isaacIdx], ...adminIsaac };
                    }

                    // Valida as credenciais lidas da NUVEM
                    const user = usersList.find(u => u.username === targetUser && u.password === password);
                    
                    if (user) { 
                        if (user.ativo === false) { 
                            setError('Acesso bloqueado. Contate o administrador.'); 
                        } else { 
                            // Salva a lista fresca da nuvem no aparelho para a aplicação principal carregar
                            window.localStorage.setItem('mrc_usuarios', JSON.stringify(usersList));
                            onLogin(user.username); 
                        } 
                    } else { 
                        setError('Credenciais incorretas ou usuário inexistente.'); 
                    }

                } catch (err) {
                    setError('Erro ao conectar ao servidor. Verifique a internet.');
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen relative p-4 w-full overflow-hidden">
                    <div className="absolute inset-0 bg-gray-100 dark:bg-slate-900 z-0 transition-colors duration-300">
                        <div className="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] bg-blue-300/30 dark:bg-blue-900/30 rounded-full blur-[120px] mix-blend-multiply"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] bg-orange-300/30 dark:bg-orange-900/20 rounded-full blur-[120px] mix-blend-multiply"></div>
                    </div>

                    <div className="w-full max-w-md glass-panel rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] dark:shadow-none border border-white/40 dark:border-white/10 p-8 sm:p-10 fade-in z-10 relative">
                        <div className="flex flex-col items-center justify-center mb-10">
                            <div className="w-20 h-20 mb-4 bg-white rounded-3xl shadow-xl flex items-center justify-center p-1"><LogoMercantil /></div>
                            <h1 className="text-3xl font-extrabold text-mercantil-blue dark:text-blue-400 tracking-tight text-center transition-colors">MERCANTIL <br/><span className="text-mercantil-orange dark:text-orange-400">ERP</span></h1>
                            <p className="text-sm font-bold opacity-50 mt-2 uppercase tracking-widest transition-opacity">Acesso Corporativo</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div>
                                <div className="relative">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 w-8 h-8 bg-black/5 dark:bg-white/10 rounded-lg flex items-center justify-center transition-colors"><i className="fas fa-user text-mercantil-blue dark:text-blue-400"></i></div>
                                    <input type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full pl-16 pr-4 py-4 rounded-2xl font-bold glass-input text-base transition-colors" placeholder="Usuário" required />
                                </div>
                            </div>
                            <div>
                                <div className="relative">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 w-8 h-8 bg-black/5 dark:bg-white/10 rounded-lg flex items-center justify-center transition-colors"><i className="fas fa-lock text-mercantil-orange dark:text-orange-400"></i></div>
                                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full pl-16 pr-4 py-4 rounded-2xl font-bold glass-input text-base tracking-widest transition-colors" placeholder="Senha" required />
                                </div>
                            </div>
                            {error && <div className="p-4 rounded-2xl text-sm font-bold flex gap-3 bg-red-100/80 text-red-700 backdrop-blur-md border border-red-200 shadow-sm transition-all"><i className="fas fa-exclamation-triangle mt-0.5"></i> {error}</div>}
                            <button type="submit" disabled={isLoading} className="w-full bg-gradient-to-r from-mercantil-blue to-blue-600 hover:from-blue-700 hover:to-blue-600 disabled:opacity-70 text-white font-extrabold text-lg py-4 rounded-2xl transition-all shadow-[0_10px_20px_-10px_rgba(30,58,138,0.5)] transform hover:-translate-y-1 mt-4">
                                {isLoading ? <i className="fas fa-spinner fa-spin"></i> : <><i className="fas fa-arrow-right mr-2"></i> Entrar</>}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [authState, setAuthState] = useState(() => { const logged = sessionStorage.getItem('mrc_auth_user'); return { isAuthenticated: !!logged, username: logged || null }; });
            const handleLogin = (username) => { sessionStorage.setItem('mrc_auth_user', username); setAuthState({ isAuthenticated: true, username }); };
            const handleLogout = () => { sessionStorage.removeItem('mrc_auth_user'); setAuthState({ isAuthenticated: false, username: null }); }
            if (!authState.isAuthenticated) return <LoginScreen onLogin={handleLogin} />;
            return <MainApp onLogout={handleLogout} loggedUsername={authState.username} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
